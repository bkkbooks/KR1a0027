body:
  text: 易變體義卷五宋都潔撰上經五噬嗑至復震下離上噬嗑初九屨校滅趾無咎此噬嗑之晉也而爻辭云爾者蓋晉有明義有進義屨校滅趾則正之于其早而懲于其小乃自不仁而進于仁自不義而進于義舍德之昏而進德之明日遷善逺罪而不知為之者以其治之于其始爾故于卦之初爻滅趾而使之不行夫不行于不善則必進于善而所以正之者罔不在厥初也然噬嗑者用刑之卦蓋因用刑而小懲之然後能進于善故為噬嗑之晉而與夫所謂自昭明德者異矣六二噬膚滅鼻無咎此噬嗑之睽也而爻辭云爾者蓋邪正善惡如薰蕕之不同器君子有化小人之道而小人乃有害君子之心近而不相得則凶害悔吝之所不免也有君子于此德稱其位而其才則柔乃乘近已之剛資其才以為助故除間為甚易而有噬膚之象惟除間甚易此小人所以逺而變體為睽蓋火動而上澤動而下二女志不同行睽有相逺之義焉昔舜舉臯陶以治冦賊姦宄之罪而不仁者逺湯舉伊尹以易簡賢附勢之俗而不仁者逺其義噬嗑之睽也經曰同人先號咷而後笑大師克相遇又曰井通而困相遇蓋所喜者欲其近故同人以遇而利所惡者欲其逺故困以遇而窮然則君子欲逺小人而去之蓋可知矣然澤火二女之異趣蓋睽之自然也此因除間而後逺則為噬嗑之睽而與其本體異矣六三噬臘肉遇毒小吝無咎此噬嗑之離也而爻辭云爾者蓋噬嗑除間之卦而離也者明也六三雖柔不得中而材不稱位然應上九之剛除小人之間則其義明矣雖除間遇毒有不量力之吝然與君子同心以除間則公議亦明矣何咎之有哉惟在已之義明而不處于嫌疑公議能明之而不受其黯暗故變體為離取至明之義然除間小吝而終于明白人亦見察而為之辨明因是而為噬嗑之離則與其本體之明異矣九四噬乾胏得金矢利艱貞吉此噬嗑之頤也而爻辭云爾者夫君臣相遇而人民未得其養者間未除也除間而後人民得其養矣頤中有物而口體未得其養者物未噬也噬嗑而後口體得其養矣頤下動上止而食所自入有自養之義故噬乾胏而後得其所養乃為頤之變體焉雖然中爻所噬皆可以自養而獨九四變體為頤者蓋頤之卦爻初上皆剛而實中爻皆柔而虛實則如頤之上下虛乃如頤之中焉至噬嗑之九四乃以剛實之體介乎二三與五衆柔之間故為頤中有物而象則有間也有物則必噬噬而後嗑則間既除而得所養矣變九四之陽以為隂則若間之已除然後上下實而中虛之體全矣此其所以變體為頤而非九四不足以當之也然則上下實而中虛頤之自然也除九四之間而後成頤之體故為噬嗑之頤而與其本體異矣六五噬乾肉得黃金貞厲無咎此噬嗑之無妄也而爻辭云爾者夫無妄之繇曰無妄元亨利貞其匪正有眚蓋君子小人之所異者正與妄而已君子除小人之間則有正而無妄然必于六五言之則噬嗑之主也猶如天本無妄以雷感物則無妄矣物于是乎應之亦無妄也故歸于噬嗑之主焉然此因除小人之間乃致無妄故為噬嗑之無妄而與其本體異矣上九何校滅耳凶此噬嗑之震也而爻辭云爾者夫為間之罪其極至于惡積罪大除間之刑其著至于何校滅耳則此震怒于上而彼震恐于下矣故于上爻變體為震焉然此因除間用刑而後成震則為噬嗑之震而與其本體所謂驚逺懼邇與夫恐懼修省者異矣夫噬嗑二體兼震與離而其材兼明與動然六三明有餘而動不足故其動不足道而全體為離上九動有餘而明不足故其明不足道而全體為震蓋除間而反遇毒則動不足可知矣不能小懲大誡則明不足可知矣離下艮上賁初九賁其趾舍車而徒此賁之艮也而爻辭云爾者蓋君子于辭受趣舍之際未嘗苟也與其苟得于勢榮不若辭之以義則用義榮以致飾而美于勢榮多矣賁其趾者義榮也舍車者辭勢榮而不受也其象則初九舍比已之二以從正應之四也舍車則得艮之止矣徒行則所謂時行也艮以止為主而時行則行故賁其趾舍車而徒而變體為艮然因以義榮致飾于行止之際則與艮之本體異焉乃為賁之艮而已六二賁其須此賁之大畜也而爻辭云爾者蓋六以柔附剛自下附上而飾之以中正之德若須比上體以生而九三近而相得則猶上體之于須焉須之為物雖柔而下垂然陽氣外發而上達猶六二以柔順從上而有中正之德也首至陽之體若元首之尊而須之所比以生猶九三之剛正而與六二近而相得也大畜之義君以剛而止健臣以健而受畜非特止之而已又有養賢之禮焉須比上體以生而能發生以資養之之象也故六二言賁其須而變為大畜然因柔順比上飾以中正而在上之剛正者兼收並畜與之同升故為賁之大畜而與其本體異矣九三賁如濡如永貞吉此賁之頥也而爻辭云爾者頥之彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也蓋頥義訓養而養貴乎正自養正則有以成已矣賁之九三以陽居陽自飾正也六二柔正來比而我以剛正成之所飾正也人之德性本正惟誠其意則自飾正而無以害吾之性矣惟責以善則飾人以正而有以全彼之性矣故賁飾以正而有養正之義于是變體為頥而物我兩全近而相得非他爻之所能預也然因致飾以正而有自養所養皆正之義故為賁之頥而與頥之本體異矣六四賁如皤如白馬翰如匪冦婚媾此賁之離也而爻辭云爾者蓋父子君臣夫婦長幼朋友五者粲然相接所謂人文也而有天合者焉莊子曰輾市人之足則辭以放驁兄則以嫗大親則已矣然則五者雖皆人文而兄弟之視他人致飾簡矣而父子尤簡其致飾皆不足道而六四之于初九其君臣夫婦朋友之義致飾之文不可苟也則其相應也離之文明于是為至蓋離者萬物相見之時文以交之有附麗之義而必于六四言之者初與四為正應而為六二所間故言白馬蓋致飾之未成也然六二終不能間初而初九終應乎四故言翰如言其來比之速也其為文明附麗之義尤可貴矣故變為離之體焉然因致飾而後有文明附麗之義故為賁之離而與離之本體異矣且賁具文明以止之義而後成卦初九在內卦之下舍車而弗乘則非車服以彰之而文明之義為不足以其舍車之徒則具時止時行之義而已是以獨為艮之體焉六四之于初有皤如之疑矣有白馬之疑矣有冦至之疑矣則艮之義為不足以其受翰如之應善比已之親則具文明附麗之義而已是以獨為離之體焉六五賁于丘園束帛戔戔吝終吉此賁之家人也而爻辭云爾者夫賢者之隱于丘園家居而未立朝家食而未受祿人君或未可召也將欲起之于其家而恭敬不可以無實必以幣先焉而將其意所謂賢者亦未當拜賜于庭也受之于其家而已湯之于伊尹聘諸畎畝之中魯君之于顔闔使者亦至其家焉而曰此闔之家也去就雖殊而賁于丘園變體為家人之義則一矣若乃束帛戔戔亦克儉于家之道夫儉于家可也用儉以聘賢者則猶出納之吝矣然君子惟不可虛拘苟有恭敬之實則不以厚薄為去就故終能得賢而有慶賀之吉若齊國之衆三賀于其君是已故曰六五之吉有慶也雖然此因幣聘于賢者而欲起之于其家且束帛戔戔有克儉于家之義故為賁之家人而與其本體異矣上九白賁無咎此賁之明夷也而爻辭云爾者蓋君子非不明而常自晦故能致樂告之善猶白非無色故能致五采之所施也自晦猶之白也致樂告之善則猶致五采之彰施焉蓋賁之義也何則素乃可作繪質乃能生文此白賁之實也上九在一卦之外而居六位之上則似之矣隂虛而資陽月魄之溯日此白賁之象也明夷務暗而君子用晦而明則似之矣向使君子飾智以驚愚修身以明汙昭昭若揭日月而行則安有樂告以善者哉故不自以為明則人皆獻厥明矣不自以為聰則人皆獻厥聰矣此用晦而明之道而白賁之義如之故為明夷之變體焉然此特因白賁有用晦而明之象故為賁之明夷而與其本體異矣坤下艮上剝初六剝牀以足蔑貞凶此剝之頥也而爻辭云爾者夫頤之為言養也而其彖曰天地養萬物聖人養賢以及萬民蓋下不厚則剝之所以起剝不已則上之所以危厚下之道無他焉養之而已有六府以養其外則既庶且富而無相凌之志有三事以養其內則既富方榖而無相害之心由是歸美報上而君臣並受其福尚何剝之有哉且聖人體天地之德而養萬民也必先之以養賢仁且有禮以養而至于賢人衆多則天下雖有懷邪之人欲為害治之事必有以正之而不馴至于剝矣剝牀以足言民之不可不養也蔑正則凶言賢之不可不養也故是爻言剝自下起而變體為頥然因剝之起無以正之而知養賢及民之不可緩故為剝之頥而與頥之本體異矣六二剝牀以辨蔑貞凶此剝之蒙也而爻辭云爾者蓋蒙有暗義有雜義君子小人固若薰蕕之殊而其所以難辨者以道之不明也道固有時乎不明而小人蔽蒙而不自知顓蒙而好自用乃乘時之昏暗道之不明疾君子之異已而剝喪是務自下侵上其勢滋長君子難于自明而上下相蒙雖有柔順中正之道其誰使正之哉此其所以變體為蒙也雖然蒙有養正之道雖暗而終于明雖雜而終于著君子雖以養正之道包蒙者而納之然有終身不靈者說桎梏以往而終于為冦則擊蒙以正之而從上下之願焉剝之六二承乘皆隂如君子之孤立而未有與者至于上九剛在上與吾正應近而相得則始所謂未有與者終有與始所謂蔑正者終可得而正由是暗終于明雜終于著而蒙終于亨矣此又蒙與剝之終也雖然此因剝牀蔑貞有蒙之義故為剝之蒙而與蒙之本體異矣六三剝之無咎此剝之艮也而爻辭云爾者剝雖小人侵盛咸欲剝喪君子之時而君子所恃者道與位而已所謂道者陽爻也所謂位者居上也六雖非陽而所應者陽三雖下體而居一體之上且應乎上九而離上下之羣隂小人雖剝之而終不可得蓋若山之止而不可搖固不可傾也故其變體為艮而曰剝之無咎然因小人雖剝之而不可剝故為剝之艮而與艮之本體異矣雖然剝以山附于地故為坤下艮上之象而是爻乃取艮之全體者何哉蓋上體為山而已則猶山之巍峩而下不厚也下體亦為山則猶山之廣大而下亦厚焉下不厚則其頽也易而下厚則其圮也難故全體為艮而後不可剝之義明矣六四剝牀以膚凶此剝之晉也而爻辭云爾者蓋五隂為剝而此則四隂已成六四承乘皆隂且切近乎災矣隂猶上進未已于是乎以膚受剝而害浸深焉故變體為晉雖然晉乃君子自昭明德進而上行之時而此乃言小人進而未已者蓋初之晉如摧如二之晉如愁如者君子之進也至九四晉如鼫鼠則小人之進爾剝之六四變體為晉而適當九四之地故言小人之進而貪竊畏人有鼫鼠之象以卦象言其常而爻言其變故雖卦象主言君子而爻亦言小人之進焉蓋剝之六四以隂居隂正也故為君子之遇剝晉之九四以陽居隂不正也故為小人之冒進然君子之剝知小人之進故為剝之晉而與晉之本體異矣六五貫魚以宫人寵無不利此剝之觀也而爻辭云爾者蓋剝為亂之極而亂常生乎小人女子左右近習之人左右近習柔巽隱伏其情狀蓋若魚然制得其道則易不得其道則難矣將法貫魚之道以制而一之非柔中不能也柔則有以寵之與逺之則怨者異矣中則雖寵而有以制之與近之則不遜者異矣非特如此而已且示之以中正之道使之觀而化焉則自內以及外自近以及逺皆惟我是化而無不利矣所謂中正以觀天下觀民以觀我生而知君子之無咎者也故六五柔得尊位大中雖居剝之時而獨不言剝乃言貫魚以宫人寵無不利蓋知所以致剝之道既不至于剝而又有中正以觀天下之義焉此所以變體為觀也雖然觀以九居五乃盡中正之道今以六居五謂之中可也而兼正以言者以柔中之道施寵于宫人而無害于分義則其治內也可謂至公而盡正矣此所以變為觀之九五而兼中正以言之也然因以中正之道治天下之剝而又能以此示天下使之觀而化故為剝之觀而與觀之本體異矣上九碩果不食君子得輿小人剝廬此剝之坤也而爻辭云爾者蓋碩果者以君子充實光輝之道遇小人剝喪之時雖不見傷亦不見用于理不為順矣然遇剝之極有剛實之材天下于此厭亂而思治知君子之終不可舍而載之使居上知小人之終不可用而剝之使失所進君子而退小人是乃天下之大順也故變體為坤焉蓋仁者宜在髙位而不仁則非所宜矣以宜不宜之辭知順不順之理而經以坤為天下之至順又以擊蒙禦冦為順上下之願則變體之義可知矣然因剝之終復進君子退小人而為天下之大順故為剝之坤而與坤之本體異矣且坤之上六亦先曰𤣥黃者天地之雜而終曰天𤣥地黃亦與此同義乎雖然剝之二體兼順與止之義而至此乃全體為順者小人既已剝廬則止之之術不足道也惟君子進而小人退為天下之大順故其上下皆為坤之體焉震下坤上復初九不逺復無祇悔元吉此復之坤也而爻辭云爾者蓋陽動而隂靜陽闢而隂闔自然之分也然陽或潜藏乾或靜専者適然之時也初九爻則陽也故潜萌而動然時則冬也故至丑而未泰如是則出入無疾朋來無咎矣所謂時者無他當其可而已自人道言之動而不當其可非善時也然不善未嘗不知知之而未嘗復行則不逺而復矣不逺而復則終得坤道之靜矣故法地道而無祗悔盡人道而元吉祗言地道之神元言人道之善而人則法地者也故其變體為坤焉然因不逺復無祗悔而後為復之坤則與坤之本體異矣雖然兼坤與震而後復之卦具此乃具坤之全體而無震體者震動而坤靜也以二體有震故初九潜萌而動然五隂猶盛于其外故不逺而復方動而遽復故震不足坤有餘而全體為坤焉六二休復吉此復之臨也而爻辭云爾者蓋六隂既純已為坤矣一陽生而為復二陽長而為臨復之本體一陽雖生而其辰建子五隂猶盛也其為變體二陽雖長而其辰建丑四隂未衰則猶足以陷陽不可不知險而冒進故陽氣之在子丑猶未若春之動以散之也初九既以動矣以其知險故不逺而遂復六二雖變體為臨然亦知險故下比乎初而休息以待之所謂下仁者以初為復之先至而二則繼之皆陽之朋而二則下比之也智言動而仁言靜知仁者之能靜而與之同志休息以待時而不干時以犯難則休復之義可知矣自君子出處言之則道雖可以漸進而小人猶盛故初九一陽為復矣姑為六隂之坤蓋與知雄守雌同義六二變體為臨則二陽長矣姑與初九之一陽同志而休息焉則以退為進之義也且臨之本體方二陽長矣而六三乃變體為三陽之泰則先時而過中故曰甘臨無攸利復之六二變體為臨則是方一陽之時已有二陽之義是亦先時而起矣然所以異于甘臨者以其柔順中正退而下比乎內爾此其所以言休復吉也然則初九退而為復之坤六二進而為復之臨故與二卦之本體異矣六三頻復厲無咎此復之明夷也而爻辭云爾者蓋初九陽爻而明故能知其不善而不行且在卦之初也故曰不逺復六三則異此矣其爻隂則不明之象位過中則頻而復之象其所以終能復者以變隂為陽而明入地中有時而出乎地焉爾且能見其過而內自訟者明于自知也人告之以有過則喜者明于聼言也過而能改善莫大焉者明于保身也苟不明晦則不能見其過而自訟人雖告之而不喜至于名辱身危然後不得已而改乃能復歸于善則其知之者晚矣而視不能復者為愈焉所謂雖危無咎也頻謂嚬蹙之嚬不得已之貌與子路之喜異矣經曰夷者傷也明入地中明夷則言所傷者德傷于外者必反于家則言所傷者形蓋德傷于內則形亦傷于外矣晦而能返所以雖危無咎然因頻而為復故為復之明夷則與明夷之本體異矣六四中行獨復此復之震也而爻辭云爾者蓋復五隂而一陽則一陽為之主初九以一陽主五隂則彖所謂反復其道者也故即其下卦之本體言之則于一體為震矣六四在五隂之中而獨應初九之陽則惟道是從而與之俱化是以爻變為陽而全體為震焉蓋乾純陽而無隂則所謂反復其道者陽之道爾君子之道爾復一陽而五隂則所謂反復其道者謂陽也而非隂謂君子也而非小人故言其道以别之則六四之所謂從道者從初九之道也初九之畫陽道也君子之道也六四從之而不違則變為陽爻而亦為震體明矣然自復而變則為復之震而與震之本體異焉且兼坤與震而後復乃成卦初乃全體為坤則以在內卦而尚居五隂之下故也四乃全體為震則以在外卦而能從一陽之應故也此其所以盡變者歟六五敦復無悔此復之屯也而爻辭云爾者經曰屯者物之始生也在物言之則草昧而未甲坼之時若在人言之則嬰孩而未為童子之時故屯未至于蒙而為解之始人之所謂赤子者此其時爾又曰屯見而不失其居謂屯雖將出見然未失其居亦方為草昧嬰孩之義也孟子曰大人者不失其赤子之心蓋赤子之心人初有之惟大人能盡其性故德至同于初而其為赤子之心未嘗失也老子亦曰含德之厚比于赤子毒蟲不螫猛獸不攫鷙鳥不搏夫在異類猶然則人孰得而害之哉六五居位之尊而盡坤之體坤靜翕而厚載也惟即動而靜不遷其厚乃復其厚而為厚之至于是人物莫得而害之何悔之有此蓋所謂含德之厚比于赤子者也故變體為屯而有敦復無悔之辭然自復性之厚而德至同于初乃有物之始生見而不失其居之義故為復之屯而與屯之本體異矣上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征此復之頤也而爻辭云爾者蓋君道無他正已以正人而已性本自正迷則失之迷而後復則尤在所養焉迷則凶矣能復而不能養則災眚亦不能免苟得其養則眚未必有也孟子曰養心莫善于寡欲又曰存其心養其性所以事天此養正所以成已也書曰德惟善政政在養民故有三事以養其心而六府以養其身此養正所以成物也經曰頥者養也又曰頥養正則吉而繼之以觀其所養觀其自養蓋向也迷則猶之疾也今也復則猶疾之愈也疾之方愈則必調其節宣而助其氣體以養之君子之養德亦然此其所以變體為頥者歟然因既迷乃復而戒之以不可不養又勉之以能養故為復之頥而與頥之本體異矣
