body:
  text: 易變體義卷十二宋都絜撰下經六渙至未濟坎下巽上渙初六用拯馬壯吉此渙之中孚也而爻辭云爾者傳曰小信未孚而經曰中孚信也中孚之信則其信至矣至信可以貫金石而况于人乎然則人而无信固不可以相與况資人之才勢以違害而就利也哉唯至信乃能爾而非小信之所及故為渙之中孚而曰用拯馬壯吉盖初六當難散之始而以柔居下其才其勢不足以違害就利然九二以剛中近己而在上欲資其才勢其可无孚乎拯馬而壯所以資九二之剛中也剛上而柔下剛柔正而順矣中孚之象也馬健行之才而壯則健之至也拯言升也附驥之謂也夫中孚之用大矣上足以應天而下足以化邦无往而不可者是爻則言以至誠之道資人以違害就利故為渙之中孚而已九二渙奔其机悔亡此渙之觀也而爻辭云爾者觀之為言示乎上而觀乎下也九五以剛健中正為渙之主而命足以敷其意位足以行其德方險難之初散天下所恃以為安者也惟播告之言傳矣崇髙之位顯矣而九二眀足以知時剛足以制事觀國之光可恃以為安而難散之初勢不可緩且與之同德而有相應之理于是以強敏之才奔而從之故變體為觀而有奔其机之辭焉盖机之器人所憑以為安者也所以悔者始未徃應後知其可以憑恃而悔其緩也悔所以亡者終能徃應而得其所憑恃而安焉也居隂故有悔以才剛故悔亡以其悔也是以奔之速而免後至之禍焉與比之所謂後夫凶者異矣夫觀之本體或觀生而進退或觀國之光而尚賔不必速也是爻所以奔之速者特以避難而求安故為渙之觀而與其本體異焉六三渙其躬无悔此渙之巽也而爻辭云爾者巽伏也下伏而上承者也一隂孚乎下而上承二陽此其所以行權而无所不入也渙之六三苟以過中自恱志在内以臨其下則乗剛而有難唯能柔巽以自屈志在外而承其上則難散而悔亡矣故變體為巽而曰渙其躬无悔躬亦身也言身之屈也言六三之所以渙其乗剛之難者能屈其身以應上九也屈身以承上則巽之義著矣以乗剛而有難故有悔從陽而後難散故悔亡然巽之本體以剛巽中正柔順乎剛而後利有攸徃利見大人是爻則言柔以屈身以應上九之陽而免乗剛之難故為渙之巽而與其本體異焉巽之九三剛過乎中不得已而後巽其巽之所以不可已者將以免乎難也渙之六三柔過乎中以乗剛而有難其難之所以至于渙者終能體乎巽也二爻之義一也卦各有主而相為先後凡欲巽以免乎難而已六四渙其羣元吉渙有丘匪夷所思此渙之訟也而爻辭云爾者經曰同人親也又曰親寡旅也至訟則曰不親盖旅之親寡則不若同人而訟之不親則不若親寡自人言之或曰親仁或曰親親固以親為貴矣自道言之則有所謂无所甚親者有所謂不可得而親者又有謂親交益踈者故又以不親為貴焉渙之六四以柔居柔至正之象也唯至正而不為邪故能捨下從上而壊植散羣乃能以至仁之徳居大臣之位近不為三所承逺不為初所應雖等夷亦相忘而况其他乎是道也我于彼則无所甚親彼于我則不可得而親于是親交益疎徒友益散而以光大之道一志從上以相與散天下之難成仁濟之功焉盖得乎訟不親之義故曰渙其羣元吉渙有丘匪夷所思夫訟以上剛下險而不親是爻則因渙其羣而匪夷所思特取其不親之義而已非有上剛下險訟之實也故為渙之訟而與其本體異焉且訟九四言下險而不克訟則无患矣故訟之四則取无難之義渙六四言壊植而渙其羣則无私矣故渙之訟則取不親之義九五渙汗其大號渙王居无咎此渙之蒙也而爻辭云爾者蒙不眀也必待乎有以明之者以其有可眀之理也盖民至愚而神者也以其神故雖昧而可眀以其愚故難與慮始而有待于眀之者焉五者所以敷心腹腎腸德意志慮以歴告于萬民若家至而戸曉者以其蒙而不明必以是而明之使知哉之王心而莫不丕應徯志然後可以中天下而立定四海之民也于難之已散如此故變體為蒙而曰渙汗其大號渙王居无咎夫蒙之本體言性之未明也是爻則言聖人當難散之初正王者之位而德意志慮民之愚者未知也乃渙汗其大號以明之故為渙之蒙而與蒙之本體異焉且蒙之渙指在上者言之蓋蒙未明而有難德既明而後難乃散也渙之蒙指在下者言之蓋難己散而出命命既行而後蒙者曉也上九渙其血去逖出无咎此渙之坎也而爻辭云爾者蓋坎之為言險也知險者宜逺之矣然六三于體為坎而柔過乎中乃乗剛而見傷焉隂險之象也上九有巽入之材與三為應苟不能逺之則與之俱傷而失渙之宜矣唯居一卦之外逺下體之險故曰渙其血去謂離隂傷之應而去之也去矣而又逺之逖矣然後出焉則所以逺乎險而渙其難者至矣與三為應之咎于是乎可免也故曰逖出无咎渙言離也去言不與之合也逖言與之逺也出則免乎險矣蓋離而後去去而後逺逺而後出乎險焉其言如此者甚言出險之道不可緩也故變體為坎而其辭云爾然坎之本體險而已矣渙之坎則言能離險而逺之故與其本體異焉夫渙之為卦兼坎巽而後成六三言事上之道欲其不以險臨下而用巽以承上故全體為巽上九言全身之道欲其不以巽應二而知險之為害故全體為坎且坎之上六言治人之非理其所以用險者恐其離也故為坎之渙而曰係用徽纆寘于叢棘渙之上九言行已之當理其所以能渙者逺其險也故為渙之坎而曰渙其血去逖出无咎而小象有逺害之辭焉兌下坎上節初九不出戸庭无咎此節之坎也而爻辭云爾者節之為言止也坎之為言陷也旣節矣而又為坎已坎矣而又居下且以九二剛在前而為之難其可由其户而行其庭哉故曰不出户庭无咎所以有咎者以兌體有見乎外之材而終无咎者以變坎而有陷乎内之義所以能慎密而不出也然坎之本體所主在陷故初六言入于坎窞是爻則為節之坎非坎之本體也故言不出户庭而已夫坎雖言陷猶可流也故曰水流而不盈亦可行也故曰行險而不失其信若夫節之為義則止而已矣无流行之義故坎之節則不特陷也又入于坎窞而凶節之坎則雖陷而不害其流故但不出户庭而已不出户庭猶可優游一室之内焉九二不出門庭凶此節之屯也而爻辭云爾者經曰雲雷屯蓋言雲雷而未雨也夫雲雷可以為雨而雨之所以未施者屯也又曰屯者物之始生蓋言始生而未甲坼也物生可以甲坼而未坼者屯也九二雖居節之時无剛在前之難可以出而不出者以陽居陰也猶屯為解之始可以解而未解者以陽氣未壯而陰盛為之難也蓋陽為行陰為止以陽居陰而未離下體故為節之屯焉然則屯之終有解之道而節之屯則止而未解也故宜出門庭而弗出至于失時已甚而凶焉六三不節若則嗟若无咎此節之需也而爻辭云爾者經曰需不進也蓋有待也六三柔過中則過分而不知節者也柔不知節所以致其憂然憂其所憂故不進而有待焉蓋六三柔過中矣比四而四莫之比應上而上莫之應然兌體柔外又過乎中故不節若而嗟若柔雖過中未離下體知其可嗟而能嗟則不輕進以求四之比上之應也于是而有待焉故變體為需而曰不節之嗟又誰咎也然需之本體以險在前能未進而有待是爻則已過中而後能節節而後不進以待之故為需之節而與本體異焉六四安節亨此節之兌也而爻辭云爾者兌之為言說也君臣上下有自然之常分而君乃制其節以命之臣當安其節以承之所謂安節者非利而行之非勉强而行之也安土樂天說孰甚焉故變體為兌而曰安節亨唯安而說之是以亨也蓋九五剛健中正制節者也六四柔静以正近承乎五故有安節亨之辭然兌之說或以孚或以和或引而後兌是爻則安節而說也故為節之兌而與其本體異焉夫節之成卦兼坎與兌初九在下慎密不出故全體為坎六四近君安節而亨故全體為兌坎言陷而兌言說也九五甘節吉徃有尚此節之臨也而爻辭云爾者臨之六五曰知臨大君之宜而夫子釋之曰行中之謂也臨人之道唯中是宜況節人情以從禮其可咈之已甚哉苟節之太過則衆所弗安非臨人之道也唯節不過中則人心之所恱用此道以行則人必尚之如此然後足以有臨矣故九五節不過中變體為臨乃曰甘節吉徃有尚而夫子釋之以居位中也蓋九剛也有節之道五尊矣有節之勢剛不過中則人所甘也尊而无二則人因其可尚而尚之矣六二應則人所甘而尚之之謂也然臨之六五所以為知臨大君之宜者柔得中而已是爻則言節不過中而其道足以臨人故為節之臨而與其本體異焉且臨之六五以柔臨人而能濟之以中故能中禮而為節節之九五以剛節物而能納之以中故能治人而為臨上六苦節貞凶悔亡此節之中孚也而爻辭云爾者中孚之彖曰柔在内而剛得中說而巽孚乃化邦也蓋由中道以為孚而孚不過中則不必尚威而足以化邦矣况出命制節而不約之以中則其道窮極人所苦而弗堪也苟不以此為正而俯就乎中則誠足以化人而窮極之悔亡矣故節之上六變體為中孚有苦節貞凶悔亡之辭而夫子釋之曰其道窮也蓋上六柔也而居六位之上當節之時而過乎中人所苦而弗堪也故曰苦節然有坎之體其性趨下則不必以此為正而約之以中由中以為孚則人信之而悔亡矣故曰貞凶悔亡然中孚本體唯以信為主故其彖曰信及豚魚又曰中孚信也是爻則以苦節而未失中孚之道不以是為正則復乎中而人信之故為節之中孚而與中孚之本體異焉兑下巽上中孚初九虞吉有他不燕九二鳴鶴在陰其子和之我有好爵吾與爾靡之六三得敵或鼓或罷或泣或歌六四月幾望馬匹亡无咎九五有孚攣如无咎上九翰音登于天貞凶艮下震上小過初六飛鳥以凶此小過之豐也而爻辭云爾者豐有盛大之義又有盈滿之義故曰日中則昃月盈則食天地盈虚與時消息是爻在六位之下而有盈盛之義者器小易盈如雨集于溝澮然蓋初六无其才而有其位位雖居下已為盛矣猶上應于九四則非知足不辱知止不殆者也故為小者之過且變體為豐而有飛鳥以凶之辭焉鳥言小物飛言下順而上逆以柔居下上應九四之象也小物上逆而不知止此其所以凶歟然豐言日中而後昃月盈而後食而此乃于初六言下順上逆者蓋位雖居下亦已盈矣故為小過之豐而與其本體異焉且豐之初九剛也而剛為大然與上同德而以過旬為戒故為豐之小過小過初六柔也而柔為小故進而應上則以盛大為戒而為小過之豐六二過其祖遇其妣不及其君遇其臣无咎此小過之恒也而爻辭云爾者蓋天下有常分古今所不可易者也而父子君臣之際在五典尤大焉然閨門恩勝義則祖可過朝廷義勝恩則君不可過祖雖可過而不可廢其順事之禮君不可過而又不可廢其欽承之道此有常而不可易之大者也故小過變為恒而有過其祖遇其妣不及其君遇其臣无咎之辭焉所謂過其祖者亦小過而已可也君則雖小過亦不可而况于大乎雖然此特常道而已若夫傅說之于高宗則君固可過矣文王之于先公則祖亦可大過之矣此蓋非常之事而道其常者所不言是爻之變體所以為恒而已蓋初為一卦之始而二居其上過其祖之象二雖在乎初之上而柔順中正以比之遇其妣之象也三為下卦之主而二居其下不及其君之象二居三之下而柔順中正以承之遇其臣之象也遇其妣者言法妣之道遇其臣者言盡臣之道然恒之卦爻所主不一三才之道元非恒者是爻言過其祖遇其妣不及其君遇其臣故為小過之恒而與其本體異焉九三弗過防之從或戕之凶此小過之豫也而爻辭云爾者豫之為言怠也恱也而般樂怠敖者或不防其外故言弗過防之以勉焉以喜隨人者或不慮其禍故言從或戕之以戒焉蓋九三君子之象上六小人之象九三才足以過上六而位不足以過之則或因其才之不及以嫉之因其位之有餘以陵之不可不防也所謂弗過防之也然二爻本正應也苟不能防之而反從之且自三以至上必由九四以徃而九四以剛在上必見傷焉所謂從或戕之也夫順以動者所以致豫也是爻非順以動矣故為小過之豫而與其本體異焉九四无咎弗過遇之徃厲必戒勿用永貞此小過之謙也而爻辭云爾者小者過越疑其失謙之道也唯其能謙是以不嫌于過所謂无咎弗過遇之者取其剛而能謙也所謂徃厲必戒勿用永貞者戒其謙而不終也蓋九四以陽居陰才雖至剛而濟之柔静則有守己之德矣自下比上而以剛動之才承柔中之主則无勝人之心矣此言剛而能謙也故有无咎弗過遇之之辭其才既剛矣其體又為震焉則疑徃而有厲然震體雖剛而居陰好静亦能以恐致福故雖厲而能戒且以陽居隂隂能守靜而无為故曰勿用陰能有常而持乆故曰永貞蓋言勿用有攸徃而永守謙下之正也此言謙而有終也然謙之本體言君子德盛而禮恭是爻則以小者過越為危咎之道于是取其能謙而戒其謙之无終故為小過之謙而與其本體異焉且謙之德有餘小過之才不足故謙之小過則安而行之也取行過乎恭之義蓋以謙為主也小過之謙則勉强而行之也與无不利撝謙異矣六五密雲不雨自我西郊公弋取彼在穴此小過之咸也而爻辭云爾者經曰山澤通氣故山上有澤為咸咸之義訓感而其彖曰二氣感應以相與又曰天地感而萬物化生蓋山澤通氣然後出雲雲出乎地而天氣下應則雨矣故山澤本乎地小者之象也升而為雲小者過而亨也咸則地氣上而天應之矣故曰天地感而萬物化生小過之咸則地氣上而天未應也故有密雲不雨自我西郊之辭焉雲地氣也西陰所也郊逺于有事之地也自天地言之密雲上行而雨未施則化生之事未成也能廕物而已自君臣言之則臣道太盛而上莫應人臣之事業未成也可小事而已故曰公弋取彼在穴公言人臣之極位也弋言興事之小與狩逺矣與田亦異矣穴陰之宅小者之所居也六五居人臣之極位上不得君下无所應僅得九四承己而已九四陰位而在五之下與五近而相得取彼在穴之象也且咸之道有餘小過之才不足故雖小者之過越亦可小事而不可大事唯行過乎恭以至用過乎儉為君子之依于仁而過于厚故謙之六四盡謙之道咸之九五盡咸之道皆變體為小過而取行過乎恭之義焉若夫小過之道視咸不及逺矣故取山澤通氣之義而已不足以預天地感而萬物化生之事也上六弗遇過之飛鳥離之凶是謂災眚此小過之旅也而爻辭云爾者小過之極必失其所旅言失所也蓋上六以才之柔居位之極无相遇者而過諸爻之上小者之過越于是極矣故曰弗遇過之飛鳥上逆下順亦小者過越之象也苟或如此必麗乎凶鳥飛至此高已極矣无一物相遇而莫不過之則无容而失其所矣故變體為旅而曰飛鳥離之凶是為災眚災言凶由天降眚言凶由自取夫致旅之道不皆由小過而因小者過越之極以至于失其居者如此故為小過之旅焉經曰窮大者必失其居故受之以旅此小過致旅之證也且小過之旅者過越之極至于失其所居而為旅也故曰弗遇過之飛鳥離之凶旅之小過者既已失所而為旅矣又為小者過越之事而失其柔順之道故曰鳥焚其巢而終于喪牛于易凶喪牛于易則與夫所謂旅小亨柔得中乎外而順乎剛者異矣夫鳥之飛如旅之行其巢也如旅之處其飛弗遇則行而失其所矣其巢焚如則處而失其所矣故其象為旅之小過以旅之小過故先言焚巢以小過之旅故後言離之凶離下坎上既濟初九曳其輪濡其尾无咎此既濟之蹇也而爻辭云爾者經曰蹇難也險在前也見險而能止知矣哉初九有剛動之才懷進取之志將以圖既濟之事也然在六爻之下則未及中而不足以有行矣故有曳其輪之辭在六爻之後則莫能進而不足以有濟矣故有濡其尾之辭曳其輪而不運濡其尾而不前雖于六四為應而不徃所謂險在前而能止者也故變體為蹇而其辭如此雖然非蹇之時也既濟之時也於既濟之時乃蹇而止者以在一卦之初居六位之下也故為既濟之蹇而與蹇之本體異焉夫既濟之與蹇異矣蹇之初乃變而為既濟者與六二相比近而相得也既濟之初乃變為蹇者與六四為應而逺莫致之也凡應皆逺而此獨惡之者有九三為之間與蹇之初六近而相得者異矣六二婦喪其茀勿逐七日得此既濟之需也而爻辭云爾者需之為言有待而未進也其所以有待者以柔中之德濟世之才待上之自知而不因所主者以進也故曰婦喪其茀茀者婦人蔽車之器所為主之象也婦臣道也雖為上之所知不因所為主者以進然既得君矣其為君者乃同寅恊恭和𠂻以共圖康濟之功焉然而无欲速也待其自知而已故曰勿逐七日得逐也得也皆指茀而言也七日者二至五徃復之數也九五剛得尊位大中至正君之象也九三剛在前而為之蔽則茀之象也雖然此變體之所以為需也非謂險在前剛健而不䧟也以有待乎上之自知故取需之義而已以可濟之才遇將濟之時謂君非自知我而終以譽命為不足濟世故于是乎者待而為既濟之需焉蓋與需之本體異矣且需言待時之實其變體則取既濟之義而已故居下體之中而與三陽並進焉此九二所以為需之既濟也既濟言濟時之實其變體則取需須之義而已故有中正之道而待九五之應焉此六二所以為既濟之需也九三高宗伐鬼方三年克之小人勿用此既濟之屯也而爻辭云爾者當下卦過中之時將无不濟矣而猶有逺夷之難未免三年之伐是亦屯也然伐之而不憚煩者將弔其民以康其屯焉爾三年而後克則愛其民以全之而屯无不康矣夫治雖生于君子亂雖生于小人然逺伐之際必兼用小人之力焉平定之後唯用君子之徳而已其或猶用小人則難復生而屯未解也故有高宗伐鬼方三年克之小人勿用之辭蓋九三居下體之上天下將无不濟之時也而上六以隂居一卦之外鬼方之象也三恃剛過中之才以剛敵柔則人君所用以伐鬼方之將也于體為離則甲胄戈兵之象也然剛而正則君子之象剛過中則小人之象故其爻辭如此夫王室安矣諸夏安矣要服與夫荒服亦安矣此可謂既濟之時而逺夷或有未安者猶有弔伐之事至于三年之乆未足以為屯然在既濟之時則為屯焉故為既濟之屯而與夫所謂剛柔始交而難生動乎險中者異矣且自謀己言之則以有求而不獲為屯以无求而自足為既濟所謂屯之既濟者以此自應世言之則以萬國咸寧為既濟以一夫不獲未免于屯也所謂既濟之屯者以此觀二爻之義則可見矣六四繻有衣袽終日戒此既濟之革也而爻辭云爾者革之為卦有革而去之之義序卦所謂井道不可不革雜卦所謂革去故者此也既濟之時上下各當其分宜承上而不附下況居近君之位者乎六四上承九五而初實應之然四以柔順居正而位實近君方且一志以承上而初欲自下而來應苟為其所入則必溺于附下之私意而害其載上之公心矣其能相與有濟乎初雖上應乎我我能絶而去之然後載上之志專而可以有濟矣故變體為革而有繻有衣袽終日戒之辭焉昔商高宗命傅說曰若濟巨川用汝作舟楫蓋臣之載上猶舟也自下而來入者猶水之濡也絶而去之猶衣袽能窒舟之隙而去其濡也然六四視五則君視初則友二爻皆君子之道則于去就之際不能无疑也唯守上下之分審趨舍之宜而一其心定其慮乃能絶其下而載其上焉故曰終日戒有所疑也夫革之本體以去故為義則法之弊者宜變事之弊者宜改若夫既濟之時則未弊也所謂革者絶其下入之累而已故為既濟之革而與本體異焉且革之既濟者革謂納諫既濟謂得志故曰改命之吉此言正君之義既濟之革者既濟謂安分革謂絶類故曰繻有衣袽此言承上之義九五東隣殺牛不如西隣之禴祭實受其福此既濟之眀夷也而爻辭云爾者夫既濟盈盛之時而眀夷者昏亂之世昏亂者文王與紂之際而盈盛者成康之際此固相反矣能于成康之盛而不忘文王與紂之事所謂治而不忘亂也盛世宜用盈禮而衰世宜用薄禮唯治不忘亂故既濟為一時之盛九五又為既濟之盛乃變體為明夷而曰東隣殺牛不如西隣之禴祭實受其福周詩之鳬鷖言持盈而守成也其詩有曰爾殽伊脯蓋用儉以持盈與此言禴祭同義歟然于既濟之時不忘眀夷之世非眀夷之實也則與眀夷之本體異矣且明夷之六五自人言之故變為既濟而爻辭亦言一身之事既濟之九五自時言之故變為眀夷而爻辭亦言一世之事上六濡其首厲此既濟之家人也而爻辭云爾者經曰傷于外者必反于家夫涉水而濡則顛沛而至于厲矣不反于家而焉往哉蓋既濟之終未濟之始也其欲濟而顛沛也徒濡其首而已顛沛而濡其首雖未至陷溺而滅其頂蓋亦傷其生矣所以必反於家而變體如此初九在下故言濡尾上六在上故言濡首濡首則不特濡尾故夫子釋之以何可久也唯其不可久是以反於家焉然家人以明内齊外為義此則言當既濟之窮有濡首之厲而反於其家故為既濟之家人而與其本體異焉且家道之成則正家而天下定故上九為家人之既濟所謂既濟定也者其以此歟既濟之窮則傷於外而反於家故上六為既濟之家人所謂家人内也者其以此歟坎下離上未濟初六濡其尾吝此未濟之睽也而爻辭云爾者睽之彖曰二女同居其志不同行又曰睽者乖也未濟之初六與九四本為正應猶火之於水也初六柔在下困於九二之險而不得應於四猶水在火下位不當而相濟亦猶火動而上澤動而下雖不若革之水火相息亦无既濟相遇之理也故於變體為睽而曰濡其尾吝濡其尾者若㚄後然不得進也然澤火无相濟之道而不同行故為睽水火有相濟之理而位不當故為未濟初與四本正應而不相遇故為未濟之睽而與睽之本體異矣且睽之未濟者其義本睽而漸能相濟終亦濟焉故曰悔亡喪馬勿逐自復未濟之睽者其義未濟而遂至於睽亦終於睽焉故曰濡其尾吝喪馬者睽也勿逐者未濟也自復終於濟也若夫濡其尾而至於吝則為未濟之睽而已矣九二曳其輪貞吉此未濟之晉也而爻辭云爾者經曰晉進也柔進而上行得中而應乎剛夫柔中固可進也而况剛中乎九二以剛中之才有六五之應有才則能進矣有應則可進矣然未濟之時非剛過不能濟而九二之才唯以剛居中則雖有能進之才可進之應亦未能進也雖未能進而中以行正其志未嘗不在於進故於此爻變體為晋而曰曳其輪貞吉輪言能進也曳言未進也能進而未進所以為未濟之晋焉所謂貞吉中以行正者志在未進也志於行正而未能正亦所以為未濟之晉歟然晉之本體則柔中亦可進是爻雖剛中而未能進者以在未濟之時非剛過不能也然有欲進而正時之志故為未濟之晉而與其本體異焉且晉言將濟未濟言未晉晉者濟之始濟者晉之終也晉之未濟者晉故言晉如未濟故言愁如未濟之晉者未濟故言曳能晉故言輪以本體為晉故雖變為未濟而終能晉其曰受兹介福于其王母者以此以本體為未濟故雖變為晉而終未濟其曰貞吉者以此為正則吉也六三未濟征凶利涉大川此未濟之鼎也而爻辭云爾者鼎象三才以喻人之才蓋資諸己而才不足者苟能資諸人是亦才也才不足則未濟才可用然後濟故未濟之時剛過中而後能濟六三乃柔過中己之才不足也故曰未濟征凶唯以己之柔過中資彼之剛得中才能兼是則為剛過中矣乃能往而有濟焉故曰利涉大川然鼎言己之才非資人之才也此言己之才未能濟而資人之才以濟故為未濟之鼎而與鼎之本體異焉且鼎喻人才而才乃能濟苟非其才未能濟也鼎之未濟者雖以剛過中而未能濟故曰鼎耳革其行塞雉膏不食未濟之鼎者雖己之才未濟而資人之才可濟也故曰未濟征凶利涉大川九四貞吉悔亡震用伐鬼方三年有賞于大國此未濟之蒙也而爻辭云爾者先儒以蒙為暗者求明之卦則蒙者暗而不明之謂也書曰蠢兹有苗昏迷不恭邊徼有昏迷不恭者此天下所以未濟而震以伐之有不得已也鬼方一也以昏迷不恭然後為中國之難故在未濟之上體正為未濟之時也乃取昏迷之義而變體為蒙在既濟之下體則既濟之初也乃取作難之義而變體為屯蓋以其昏迷故作難焉爾未濟之九四所以然者正其分上承于五則剛而不正之悔亡矣故九言剛動之才四言近君之位蓋上之所用以伐國之象也初六險且逺而九四應之則逺伐而久之象也居上體而近君則功可報之象也六五大國之象也與四近而相得賞之之象也故曰貞吉悔亡震用伐鬼方三年有賞于大國然蒙之本體言物生之必蒙而鬼方在未濟之時昏迷而不恭故為未濟之蒙而與蒙之本體異矣且蒙指一人言之故變體之未濟亦言一身之事未濟指一時言之故變體之蒙亦言一國之事六五貞吉无悔君子之光有孚吉此未濟之訟也而爻辭云爾者蓋時之所以未既濟必有為之難者此周官所以有訟敵國之事而葛伯不祀成湯使人問之也夫遣王人而問彼既服而捨之者上也問之而罔悛然後遣將帥奉辭以伐之則不得已而用兵豈止訟而已哉蓋其次也且訟之之道非中不足以有行非柔不足以知止中而有行則有中吉之福柔而知止則无終凶之禍能以柔中為正則吉而无悔矣故曰六五貞吉无悔序卦曰訟必有衆起故受之以師訟以服之而不至于用師則道之光也然未免乎有訟則為君子之光而已未足以盡聖人之道焉至於光散而為輝然後无思不服則未濟之終而既濟之始也故曰有孚吉夫時既濟則无訟矣无征伐矣有訟與伐皆未濟之時故六五九四具此義焉然訟有言而已上道也故于六五言之奉辭伐罪則下道也故于九四言之若夫既濟之下體猶為未濟之終其言髙宗伐鬼方則髙宗之時蓋有是事亦命方伯遣將帥而已故於六三言之且六五所以有訟之象者以乗九四之剛而四未必服應九二之剛而二未必從也然訟之本體以有孚而見窒為主其為訟小矣是爻以時之未濟不得已而問罪故為未濟之訟而其為訟大矣蓋訟然後濟故為訟之未濟未濟乃有訟故為未濟之訟其理一也特卦各有所主爾分而言之訟以剛而過險險而健乃訟故于九五言之以訟為主也未濟以剛過乃濟而柔中則不能濟故于六五言之以未濟為主也上九有孚于飲酒无咎濡其首有孚失是此未濟之解也而爻辭云爾者解有二義若曰君子維有解有孚于小人者言難之散也若曰解者緩也緩必有所失言難之所由生也所謂有孚于飲酒者言上九當一卦之極有剛過之才于未濟之終成既濟之始信乎有飲食燕樂之事言難散也所謂濡其首有孚失是者言已解而難散矣已變未濟為既濟矣若乃以剛過之才而般樂怠傲則沉湎而怠忽信乎必失既濟之樂焉此言難之復生也然則剛過一也用之當則致維有解之福用之不當則致觧緩之禍或自未濟而為既濟或方既濟而復未濟則用之當否可不慎乎然解言已解矣未濟則未觧也故未濟之終然後變體為解解言難之散濟言治之定則解然後濟濟然後定雖未既濟然已解矣蓋難已散矣而彼以貪殘為害則未濟也故解上六為解之未濟而曰公用射隼于髙墉之上獲之无不利治方定矣而此以怠忽自肆則解緩焉故未濟之上九為未濟之解而曰有孚于飲酒濡其首有孚失是
