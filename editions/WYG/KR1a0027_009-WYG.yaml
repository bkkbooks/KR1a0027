body:
  text: 易變體義卷九宋都絜撰下經三夬至困乾下兑上夬初九壯于前趾往不勝為咎此夬之大過也而爻辭云爾者經曰大過棟撓本末弱也盖陽為强而隂為弱初為本而上為末夬之上六以一隂居五陽之上末固弱矣其初九以一陽居六位之下而又變隂焉則本亦未為强也于是有大過之義雖然居夬決之時非不盛也得乾健之才非不能進也故曰壯于前趾此本體之義也然當卦之初則彼隂猶盛在卦之下則其位尚卑苟恃其剛壯遂前進而徃則无勝隂之功而取犯難之咎矣是乃所以為弱而有大過之義焉故曰徃不勝為咎所謂為咎者勢不能勝而徃則其咎自取若所謂自作孽者也然大過之義體本自弱此爻則當君子道長之時而居在下卑弱之地故為夬之大過而與大過之本體異焉夫大過之夬則言能弱以至于强故曰藉用白茅无咎又曰慎斯術也以往其无所失矣夬之大過則言知强而不知弱故曰壯于前趾徃不勝為咎九二惕號莫夜有戎勿恤此夬之革也而爻辭云爾者革之為卦以水火相息為義而其象又言澤中有火焉盖夬之成卦君子極盛固有決小人之勢而九二之時小人未衰猶有害君子之心如一杯之水不能勝輿薪之火也君子于此能无懼且憂乎故曰惕號莫夜然其才剛則小人不能无畏剛而中則小人不能為之敵是猶水終能勝火而不為火所勝盖五行之常理君子小人之常道也故曰有戎勿恤惕號暮夜者水火相息之義有戎勿恤者澤中有火之義此變體所以為革歟然革有不當者若夬之革則无不當矣夬雖革而當然九二未能无憂且懼焉其異乎革之本體者也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎此夬之兑也而爻辭云爾者兑之為言説也説于彼則有不説于此者自壯于頄以至君子夬夬皆言九三之本體也獨行遇雨若濡則言以君子之道而獨與小人悦也有愠則言君子而説小人以與之和則有不悦而愠見者也无咎則言君子處不得已之地雖權而與小人和終以決之為事而不與之説也凡此皆言君子雖有決小人之材遇決之之世而非決之之地則蔵器以待時及其得時則終不然也盖壯于頄者乾為首而居乾體之上則剛而暴露之象然未至于五則无能為之象也君子夬夬者重剛不中而終以決之為事也獨行遇雨若濡者在衆爻中獨與上六有應而上六小人之象也无咎者言雖獨應上六而衆爻之所不與然終與羣陽決小人則无咎也然兑之為義主乎説而已決之兑則本以決之為事而乃姑與之説雖與之説而終不説以決之故為夬之兑而與兑之本體異焉九四臀无膚其行次且牽羊悔亡聞言不信此夬之需也而爻辭云爾者需言有所待而未能進也九四才有餘則可以決小人矣智不足則有待而未進也有待未進則止乎下而無能為也然以無能為之位居乎三陽之上彼三陽者自下而見侵然後不得已而俱行故曰臀无膚其行次且三陽象衆君子君子羣而不黨剛而能行九四乃居其前而與之俱進則向之悔者亡矣故曰牽羊悔亡雖然若九四者以陽居隂陽則才有餘隂則智不足其所以需焉而不進者智不足爾故曰聞言不信且跡雖勉强以俱進心猶疑惑而不果是亦需之義也然需之本體言有所待以渉難而是爻所言則有所待而決小人故為夬之需而與需之本體異焉九五莧陸夬夬中行无咎此夬之大壯也而爻辭云爾者君子道長而至此可謂之壯矣視㣲弱之小人如莧陸之柔脆而決之甚易也然猶夬夬然必以決之為事雖剛而濟之以中亦未光也其所以未光者剛得尊位大中未能使天下無思不服而猶以決小人為事故于君道未能至于光大也僅能无咎而已且大壯雖四陽並興未若五陽之能決小人也為壯而已夬之大壯則其于決小人也盛矣故為夬之大壯焉然大壯之夬者于四陽之時而行五陽之事則失于狠而在所改故曰䘮羊于易无悔夬之大壯者于五陽之時而行四陽之事則若濟之以中者而咎不長故曰中行无咎无悔者本有悔无咎者本有咎能處之得其道則悔咎可免盖二爻雖不能无過是皆君子之道所謂賢者過之者也雖過而不害其賢故所言如此上六无號終有凶此夬之乾也而爻辭云爾者君子猶之陽小人猶之隂乾純陽而無隂猶天下皆君子而無小人也盖夬之時五陽而一隂五君子而一小人君子之化小人至是極矣苟從化而變焉則莫不為君子或不化而誅焉則不復有小人盖小人不知憂懼而被放廢竄殛之刑則王廷皆君子矣是猶乾之純陽而無隂也故變體為乾而曰无號終有㓙所謂莫不為君子者若堯之時比屋可封兎置之人莫不好徳既醉之詩人有士君子之行也所謂不復有小人者若舜之去四凶周之殺武庚誅管叔而放蔡叔是也然乾之純陽天道之自然也夬自五陽而終于六陽則人道之使然爾故為夬之乾而與乾之本體異焉夫夬之本體兼乾與兑故言健而説者雖健而不廢説九三健不足而悦乃有餘故全體為兑上爻乾已純而説不足道故全體為乾則道長然後為至故離卦始于乾終于夬而曰君子道長小人道憂則復為乾矣夬之六爻至上六而變為乾自易之卦言之也雜卦終于夬而序卦始于乾自易之書言之也夫五陽為夬六陽為乾乾之夬者時當六陽而姑行五陽之事盖徳之謙也故曰上九亢龍有悔用九不可為首夬之乾者時方五陽而欲行六陽之事盖道之正也故曰利有攸徃剛長乃終且夬之乾者道之升乾之夬者道之䧏道有升降此二卦之變體所以異歟巽下乾上姤初六繋于金柅貞吉冇攸徃見凶羸豖孚蹢躅此姤之乾也而爻辭云爾者初本巽體有入義有伏義而居九二之下柔制于剛者也故曰繫于金柅貞吉然變為乾則有剛而能變義有健而善行義盖一隂方長苟不能制之于其始則始雖柔而易伏終乃剛强而難制矣故曰有攸往見凶隂性趍下猶畜之豕也其方生而未壯猶豕之羸也其始雖羸終必蹢躅而難制此又兼本體變體而言之也故曰羸豕孚蹢躅夫姤之初六在八卦為坤之初六此曰羸豕孚蹢躅彼曰履霜堅氷至雖或指人道言之或指天道言之其謂小人始弱而終强則其義一也夫姤言一隂之至柔乾言六陽之至健所謂姤之乾者隂疑于陽之義盖與乾之本體異矣九二包有魚无咎不利賓此姤之遯也而爻辭云爾者經曰物不可以乆居其所故受之以遯又曰遯則退也九二猶之諸侯也下比乎初六以陽制隂在彼既有繫于金柅之象矣在此方有包有魚之象焉盖魚柔㢲隂伏上下隨陽制得其道則易聚焉民之象也包有魚者得民之象也二比乎初得民而主之矣四為初六之應而自外來有分民之嫌焉苟不以近民之道而下之則將有遯心而為九四所誘矣必有防閑之道而後可故曰不利賓所以不利于賓之來者以分吾民而已奄而有之者存乎仁防閑之使不􅄆者存乎義故孔子曰義不及賓也夫包有魚君與民遇也不利賓者主與賓遇也物相遇而後聚民與君遇而聚矣或又與君遇而聚焉聚于彼則畔于我矣且九二剛而得中與初近而相得九四剛不中正非嘉賓也又與初應其來必奪初而初必有遯心故變體如此而爻辭所以告也然遯之退也主言君子之避小人而姤之遯則言民已相遇而或有遯心此其所以異歟遯則退而不相近遇則聚而不相逺二卦之義盖相反矣故遯之姤則喜乎遯而不以遇為貴故言固志以戒之姤之遯則喜于遇而以遯為患故言不利賓以戒之九三臀无膚其行次且厲无大咎此姤之訟也而爻辭云爾者姤之彖曰姤遇也柔遇剛也剛遇中正天下大行也初六民之象也以柔遇九二之剛九二臣之象也以剛中而遇九五之中正九二將帥其民而歸之九五然後君臣相得而盡遇之道矣而九三者乃以剛過不中之資无能為之材固其位而止其上則有害于君臣之相遇此九二所以自下侵之而訟也故曰臀无膚然九三亦㢲體于是不得已而行故曰其行次且為二所訟則危且咎矣訟而後行則不能全无咎而咎不至于大故曰厲无大咎揚子曰楊墨塞路孟子辭而闢之此孟子之訟也九三居九二之上亦有妨賢之罪矣其可不辭而闢之哉周官亦有訟敵國之事此之謂歟然所訟无他以其有害于君臣之相遇爾此之謂姤之訟而與訟之本體異焉九四包无魚起凶此姤之㢲也而爻辭云爾者㢲有伏義有入義魚柔㢲隠伏而上下隨陽制不以其道則深入而不可得盖民之象也民可近而不可逺逺之則不可得矣初在一卦之下民之象也九二以剛中近之有得民之道故曰包有魚至于九四以剛不中逺之則民必柔巽隠伏見之而深入矣故曰包无魚此自初六言之也若夫自本爻言之則既已逺民而失之矣必㢲伏而後無禍苟不能静而好動乃所以致凶盖㢲一隂在下得其所而伏震一陽在下非其所而起乾之文言以髙而无民是以動而有悔此爻逺民而不能有是以起而必凶立言雖殊其義一也夫凶言起凶則知伏而未有凶矣夫民不遇其主乃皆㢲伏而不出主不遇其民乃宜㢲伏而不動故是爻為之㢲而與㢲之本體異焉且姤以乾㢲二體合而成卦然在初六謂必剛而難制故舎㢲而全取乾至于九四謂宜伏而不動故舎乾而全取㢲彖曰姤遇也柔遇剛也初六冇蹢躅之戒則不終于柔矣九四有起凶之戒則不終于剛矣是以或為乾之全體或為㢲之本體焉九五以杞包瓜含章冇隕自天此姤之鼎也而爻辭云爾者鼎之為器實具三材故以喻材而冇人君用材之象其象曰木上有火鼎君子以正位凝命盖君臣之相遇必在乎正其位焉用君子以制小人則舉直錯諸枉而位己正矣故曰以杞包瓜人君于是可以无為矣含其章美之材出命以尹衆而已出命尹衆則因任原省分守形名莫不明而愚知處宜貴賤履位實命不猶而命已凝矣故曰含章有隕自天而夫子釋之曰志不舍命也杞象君子瓜象小人以杞包瓜而位已正含章无為有隕自天則志不舍命而命已凝正位凝命則法鼎之象以用材者于是乎在此九五下應乎九二九二下比于初六而九五剛得尊位大中至正上下相遇之象也然鼎本象材而為用材之象此則因君臣相遇而正位凝命故為姤之鼎而與鼎之本體異焉上九姤其角吝无咎此姤之大過也而爻辭云爾者盖上九當相遇之時獨處无所遇之地且九五剛得尊位大中至正而乃乗之于上自五以下皆非其所與三雖正應而為九二所難自本爻而上復无所之焉其无所遇如此而其剛上窮不知變也可謂大過矣有澤滅木之義故曰姤其角上窮吝也盖首為最上而角又居其上有剛上窮之象而為大過之義夫澤而滅木可謂大過矣而是爻則言居姤之時不能下下以相遇乃至剛過而上窮故為姤之大過而與大過之本體異焉坤下兑上萃初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎此萃之隨也而爻辭云爾者有遇而後萃者有隨而後萃者勢位敵也隨我而後萃者上道也我隨而後萃者下道也初六之于九四本正應也故有孚焉然隂性善疑乃疑四之比三故孚或不終則不欲往隨而亂其萃聚之志所憂過而若號所執小而一握其為士者笑之而害其往隨之事矣然初六體坤而順又九四不以六三而害吾正應不憂而往隨之然後不亂其萃聚之志焉故言勿恤往无咎自有孚不終以下言害其隨也勿恤則勉之使隨也往无咎則于是乎能隨矣然此本有志于萃然後往而隨之故為萃之隨而與隨之本體異焉隨之萃者以隨為主盖身往隨而後萃言初出乎三之外以從上而與之俱萃于四也萃之隨者以萃為主盖心欲萃而後隨言初六志在九四之聚始信中疑卒乃釋其疑而往隨也盖隨先言諭言出則身往隨矣至于初唯四是應而三唯四是承則萃之義可知萃先言孚言號則心欲萃矣至于勿恤而往往而无咎則隨之義可知六二引吉无咎孚乃利用禴此萃之困也而爻辭云爾者二五本正應也六二柔順之質有其徳矣九五乃以剛健之資據崇髙之位道未光大而不下應則公養之仕亦未可得雖可萃而未萃若所謂困于酒食者也然六二雖柔而不失中能待九五之引而九五亦剛不失中終能下應于六二若所謂朱紱方來者也故有引吉无咎之辭盖二以柔順為本而五初不應乎二則二疑有咎以剛柔皆不失中故引而後吉吉而後无咎也六二以柔不失中故引吉无咎又加之以正則有孚以孚則薄禮亦可用焉若所謂利用享祀者也故曰孚乃利用禴引吉无咎則臣與君萃矣孚乃利用禴則人與神萃矣是雖變體為困而不害其萃也然困之成卦剛則掩于柔而此則本乎萃而或至于困困而无害于萃故為萃之困而與困之本體異焉六三萃如嗟如无攸利往无咎小吝此萃之咸也而爻辭云爾者盖澤上于地則二體雖近唯有相萃之義而已澤之于山雖逺而髙下不同然二氣相與有咸感之義焉夫六三之于九四雖近而相比然非正應也或以其近而比之則四自應初而莫我與矣故曰萃如嗟如无攸利其于上六雖非剛柔相應而外卦二剛皆自有應上獨无與而又體柔以趨下三雖與之逺而爻本相應且近已无與必三之求苟往而從之則感應以相與矣有咸之義焉故曰往无咎小吝而夫子釋之曰上㢲也咎无吝小者比乎四也舍四而應上則咎可免而吝不至于大矣然此非若咸之六爻皆相應也以求九四之萃而不得乃往而應上六故為萃之咸而與咸之本體異焉盖咸以山澤為象其義主乎逺萃以澤地為象其義主乎近二體之不同如此九四大吉无咎此萃之比也而爻辭云爾者盖君者民所萃也陽者隂所萃也九四以一陽居三隂之上三隂自下而來萃焉以其有君民之徳也居人臣之位而民乃萃焉豈能无傴拊之嫌哉然九五乃剛中正之君而九四帥羣隂上比之是猶人臣帥天下之民而上比于其君此所以得君而大得志也故變體為比而有大吉无咎之辭焉盖以臣而得民故有傴拊之嫌帥民以事君故大吉而後无咎大吉者得君而大得志也然比則兩相比而已是爻則三隂先萃于九四而九四與之上比于九五故為萃之比而與比之本體異焉且比以地上有水為象則地與水而己萃以澤上于地為象澤則衆水所鍾也故自兩己上可以言比而于比曰輔自三以上乃可言萃而于萃曰聚此比之萃也萃之比者九四為三陽所萃所萃剛已衆矣乃率而上比于九五然後无傴拊之嫌而有得君之福得君而後大吉焉此先萃而後比也然則大臣之于君可以言比故曰臣哉鄰哉人民之于君可以言萃故曰何以聚人曰財九五萃有位无咎匪孚元永貞悔亡此萃之豫也而爻辭云爾者豫之為言有喜樂之義故其象曰先王以作樂崇徳序卦亦言以喜隨人者必有事夫九五當萃聚之時居崇髙之位固可樂矣然聖王不以一世之利為己私分不以王天下為己處顯所樂者定四海之民爾未聞以位為樂也今以剛居剛固其位以為樂則非光大之道故曰萃有位匪孚而夫子釋之以志未光也雖然有大中至正之徳非知過而憚改者也故體仁以守位而能永守其正則能以中天下而立定四海之民為樂而其悔自亡矣故曰元永貞悔亡夫豫以順動為樂而此乃以萃有位為樂故為萃之豫而與豫之本體異焉且豫之萃者知豫之不可縱逸而能節之以禮所以聚而不散萃之豫者知萃之不可易保而能處之以道所以樂而无憂豫之六五乗剛節之以禮之謂也是爻言元永貞處之以道之謂也上六齎咨涕洟无咎此萃之否也而爻辭云爾者萃之中爻莫不相應而上獨居一卦之外與三无相應之義下則无所比往則无所之可謂否而不通矣故變體為否而有齎咨涕洟之辭齎咨涕洟盖能憂也憂其无與乃巽以與下而六三終來應也故六三曰往无咎上巽也而此亦有无咎之辭則又有先否後喜之義然否本以上下不交言閉而不通是爻則當萃聚之時獨无應而无與故為萃之否而與否之本體異焉且否之閉也因乎不交萃之亨也因乎相遇二卦之義固相反矣否之萃者言其時盖時已極而必變若所謂亂不極則徳不形也萃之否者言其位盖位已髙而无與若所謂髙而无民也㢲下坤上升初六允升大吉此升之泰也而爻辭云爾者剛上而柔下則允當而人信之矣乃資上之剛以為己之才而與之合志然後信乎友而同升焉盖以吾之柔而合近已之剛因彼之剛而應上體之柔剛柔相際有泰之義矣故變體為泰而言允升大吉泰則上下之志同矣故夫子釋之以上合志也孟子獲乎上有道弗信乎友不獲乎上矣與上合志允而後升盖與此同義然泰之初九拔茅彚征則自上引下而與之俱出是爻則與上合志然後與之同進故為升之泰而與泰之本體異矣且泰之升者上之人遇交泰之時而引其在下之君子與之同升也升之泰者下之人有同升之志而附其在上之君子然後交泰焉九二孚乃利用禴无咎此升之謙也而爻辭云爾者夫柔當在下剛當在上九二趨升之時欲升乎上矣乃以剛居中又居九三之下盖欲升而用謙者也老子曰自下者人髙之自後者人先之然則欲升而用謙宜矣經曰謙也者致恭以存其位者也孟子曰恭儉豈可以聲音笑貌為哉盖謙而不誠是象恭也故必孚焉然後以此事神則貴少不貴多而足以上達于神矣况欲與同類並升于朝亦奚事于繁文末節而後得志哉此九二以剛中承三而與五相應之象也故變體為謙而曰孚乃利用禴禴言祭之薄也然謙徳之君子非有求而為之也是爻則欲升而用謙故為升之謙而與謙之本體異焉九三升虚邑此升之師也而爻辭云爾者九三剛正而過中用師之象也以我之剛攻彼之柔以我之得位攻彼之失位自此以至上六而四五之二隂不能為之難所升者虚邑而已何所疑哉書曰兼弱攻昧盖陽為强而隂為弱陽為明而隂為昧弱且昧者上六隂虚之象也國為大邑為小國而謂之邑盖小而易之上六以柔在外之象也虚邑弱而可兼無事于用師而所以必用師者以昧而不服不可不攻也古人有行之者其湯武乎九三所以為升之師者如此然師之道本于為民除害而民從之不期升而升焉此主升之義言之故與師之本體異焉六四王用亨于岐山吉无咎此升之恒也而爻辭云爾者咸柔上而剛下譬則君臣忘分以相際恒剛上而柔下譬則君臣明分以相臨升之六四具至正之徳升近君之位而乗二剛之才自此復可升矣然以柔順之才正人臣之位盡事君之禮而不復升焉者以守君臣之常分也文王有君民之大徳而不失事君之小心其事類此故變體為恒而曰王用亨于岐山而夫子釋之以順事也王言有君民之大徳也用亨于􅄮山者言用此道而亨然止于􅄮山者岐言周為諸侯所都之國山言地類之髙以象臣之大而未離其類也此言有事君之小心也為臣而有君民之徳則必有咎而不失事君之心故吉吉而後无咎焉文王之事盖如此乎然恒之為道立不易方則君子之恒其徳也无往而不然是爻則臣之徳可升而君臣之常分不可升故為升之恒而與恒之本體異焉且恒言能守升言能進恒之升者言分有常矣雖徳可升而不敢僣故曰乆非其位安得禽也升之恒者言位可升矣然分有常而不可越故曰王用亨于􅄮山順事也二爻之義本一然卦各有所主主于恒而變故為恒之升主于升而變故為升之恒合而言之則君臣同興事業而臣獨不有其民故文王以王者之徳守西伯之國而已然則二卦之爻雖各有所主而爻辭之義亦相為先後焉六五貞吉升階此升之井也而爻辭云爾者井以冽為體泉以寒為用而所貴乎養而不窮者上出之功也故木上有水乃井之象巽乎水而上水乃井之才初在下則曰井泥不食二在中則曰井谷射鮒至五似上然後言井冽寒泉食元吉在上其貴上出之功如此故升之六五居一卦之尊變體為井而有貞吉升階之辭而夫子釋之曰大得志也盖階之升也漸而有序升而至五則猶井上出之功也堯舜禹之升其類此乎然升之上出以道言也而升階以位言特取上出之義而己故為升之井而與井之本體異焉上六冥升利于不息之貞此升之蠱也而爻辭云爾者夫剛上柔下巽而止者所以致蠱亦所以治蠱象曰山下有風蠱此言致蠱也故其義訓壊襍卦曰蠱則飭也此言治蠱也故其卦言亨夫位之升也至於髙而不己則長已甚而消繼之矣盖若致蠱之義若夫徳之升也進而不止則至誠不息而悠久无疆盖若治蠱之義也升之上六變體為蠱其位極矣不能知止則殆盖若致蠱者故曰𠖇升在上消不富也若夫以是道而進徳則全而无虧矣盖若治蠱者故曰利于不息之貞位升而不已則必殆徳升而不已則无虧此致蠱治蠱之所以異歟然蠱卦之所言蠱之實也是爻所言則蠱之象而已故為升之蠱而與蠱之本體異焉且蠱言事言壊升言徳言髙蠱之升者言舎其事而不累乃全其髙升之蠱者言固其位而不止必致其壊二爻皆一卦之極而其志相戾如此君子取其蠱之升而戒其升之蠱可也雖然蠱之上九其志可則也而迹不必皆然升之上六其位則然也而徳不可如此君子之于易可不深求其義乎坎下兑上困初六臀困于株木入于幽谷三嵗不覿此困之兑也而爻辭云爾者兑為澤澤水所鍾也説萬物者莫尚焉而困之象兑上坎下水隠於澤矣故曰澤天水困澤而无水則不足以自潤所謂困乎水者也澤困乎水則不足以澤物豈所謂説萬物者哉初六之義似之盖以隂居六爻之下困于二而不能上應於四若澤之困乎水而不説萬物者也故曰臀困于株木入于幽谷自初至四凡三爻而上下不相與若澤之不能説萬物而物莫徃資焉也故曰三嵗不覿臀居下體而无能為初以隂居下之象株木不能芘下九四不應之象言澤之困乎水也入于幽谷止乎下而不能上行之象言水在澤下也三嵗不覿去九四三爻而未應之象言澤无水而不能説物物亦不資焉然兑為澤本能説萬物者也其所以不然者是困之兑耳故與兑之本體異焉且坎下兑上為澤无水困非實无水也水在土下而不能外見焉今也上下皆兑而全无坎則不唯上无汪洋之體而下亦无浸潤之氣上不汪洋則已涸矣下无浸潤則為涸之甚此其所以為困之至而爻辭如此九二困于酒食朱紱方來利用亨祀征凶无咎此困之萃也而爻辭云爾者經曰萃聚也又曰物相遇而後聚盖无聚之道雖遇亦睽若澤之于火是也有聚之道未遇亦不濟若火在水上是也故有聚之道而又遇焉若澤之于地然後為萃夫九二之于五有同徳相應之義而為九四所間則困而未萃未受祿也故有困于酒食之辭然二五皆以中直待時而萃以同徳相應則君將致飾于臣而臣將受飾于君崇以爵位旌以車服以至官屬徒𨽻之衆莫不羣萃于其所矣故曰朱紱方來夫大夫以上而後有廟故犠牲成矣粢盛潔矣衣服備矣然後敢祭今也上有崇養之禮旌表之儀則可以保祿位而奉祭祀矣祭祀以寧神則凡世數之當祀者莫不萃焉故曰利用享祀朱紱方來則人者萃矣利用享祀則神者萃矣然萃之時則往而无咎若夫困之時則征而必凶故雖以中直相應而无咎然征則必為四所困矣不若止而待九五之至也故為困之萃而與萃之本體異焉夫萃之與困異矣萃相遇而後聚焉困則不一有遇其不欲者若株木之類有未遇其所欲者若酒食之類萃之困者欲萃而遇困故言萃如而後嗟如然繼言往无咎者又要其己困之終而言困之萃者先困而後萃故言困于酒食而後曰利用享祀然繼言征凶者又原其未萃之始也六三困于石據于蒺藜入于其宫不見其妻凶此困之大過也而爻辭云爾者困則窮而未通大過則衰弱而致顛危矣故其彖曰大過本末弱也此衰弱之義也雜卦曰大過顛也此顛危之義也六三求上六之應而上六莫之與則困于石而名必辱而未至于危也至于乗九二之剛而九三乃見傷焉故㨿于蒺藜而身必危危則甚于辱矣至于入于其宫不見其妻則親戚畔之而孤弱无助矣故變體為大過而其辭如此然大過主言世之弱困主言人之窮若夫困之大過則言名辱而困矣又至于身危而弱焉故為困之大過而與大過之本體異矣九四來徐徐困于金車吝有終此困之坎也而爻辭云爾者坎之為卦陷而不能麗實而不能通也盖九四下應初六而困于九二之難則實而不能通乎下之象也初六亦以此而不得上應乎四則陷而不能麗乎上之象也故變體為坎而曰來徐徐困于金車夫四之視二材皆剛也而四復居上乃畏九二而不敢進則于道為吝矣序卦曰物不可以終陷故受之以離離者麗也然則陷亦終乎離考説卦坎于輿為多眚為曳而終之以為通然則實固終乎通故九四雖以剛不中為九二所難然九二剛中而不為己甚則豈欲終為二爻之間哉故初之所謂不覿者止乎三嵗而九四亦言有終焉來者自外之内而初為内也徐徐者應初而至緩也金言剛車言載乎下言二在四之下也夫有遇其所不欲而困者有不得其所欲而困者是爻兼此二義故困而不能通然坎始于行險而終于出險故能通而有終焉此所以為困之坎而與坎之本體異也夫困險以説而後卦之體具九四為二所困以至于吝則有險而无説非險以説困而不失其亨者也故无兑之説而全坎之體焉九五劓刖困于赤紱乃徐有説利用祭祀此困之解也而爻辭云爾者九五上揜乎隂而不通劓之象也下乗乎剛而不行刖之象也以困于上下之難故九二不上應則困于赤紱之象也然五以中直之道處順以待時則其困之終也劓刖之難散而得九二之應于是君臣相得而克享天心以之禮百神宜其申命之以福也故曰乃徐有説利用祭祀夫劓言絶其通于上也刖言不足以有行也赤紱之服人臣所以飾下而已則言不應乎上也此言其困也若夫劓刖之難散乃徐有説利用祭祀則變體所以為解歟然解之本體言難以散矣困之解則始于難之多而終于難之􅄆故與本體異焉困言難之方遇解言難之已􅄆然解以雷雨為象則所主者不同故解之困言此解而彼困主一世言之盖本體所言者大而變體亦大也困以水澤為象則所主者小故困之解言始困而終解主一身而言之盖本體所言者小而變體亦小也盖君子有解而小人退一世之事困于赤紱乃徐有説一人之事上六困于葛藟于臲卼曰動悔有悔征吉此困之訟也而爻辭云爾者凡見誣于人則訟有犯於已則訟訟之為言辨以明之而已故其爻曰雖小有言其辨眀也盖上六之于六三非剛柔之正應本无意於應之也彼雖求我之應而我猶石之不可轉所謂困于石者是也九五乃以我之乗剛謂牽於六三之柔佞而自下以危之則誣以見犯矣可不自辨以眀其義乎故變體為訟而曰困于葛藟于臲卼既已辯而明矣不可懐也當有行以逺之矣曰動悔則有悔者言不可懐也能征則吉者當有行以逺之也葛藟有蔓纒繞之物六三附之之謂也臲卼摇動不安之貌九五犯之之謂也上六无意於六三而九五乃謂其困于葛藟則其言未當也此其所以不得不辯也然訟之本體以有孚見窒而訟此爻則以本无所困而誣之以困乃至臲卼而不安是乃所以為困也由此而訟故為困之訟而與訟之本體異焉且訟之困者訟言其自取得已而為之雖得而必失焉故變為困而曰終朝三禠之困之訟者困言其不幸不得已而有言則必轉禍以為福矣故變體為解而曰乃徐有説
