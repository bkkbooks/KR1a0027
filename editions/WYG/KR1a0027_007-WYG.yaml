body:
  text: 易變體義卷七宋都絜撰下經咸至明夷艮下兑上咸初六咸其拇此咸之革也而爻辭云爾者初六于體為艮隂静而止在下體之下㣲而无能為者也然艮不終止能止而能行艮不終静能静而能動于是舍内而趨外舍下而趨上自隂應陽翻然而改可謂革而當者矣若出自幽谷而遷于喬木非不善變者也應感如此故為咸之革而有咸其拇志在外之辭焉拇在下體之下㣲而无能為隨上而動乃能有至初六因九四之所感而應之故取拇之象拇葢孟子所謂巨擘也雖于其類為巨而在一身㣲矣以其應上之感而能革故以從新故為咸之革而與革之本體異焉六二咸其腓凶居吉此咸之大過也而爻辭云爾者初六應在于四而九四以陽居隂意在正應巽而感乎下者也初往而從之善矣若夫六二應在于五而九五以剛居剛志在上六不能巽而感乎下與四之應初豈可同日語哉六二往而隨之既越九三之剛矣又越九四之剛焉以柔越二剛而上應乎剛是猶澤滅木大過之義而將有妄作之凶矣然柔順中正能改其過而盡艮止之義故不往而居然後變凶而為吉焉惟在下體之中若腓之在身而應上之感往而終止故有咸其腓雖凶居吉順不害之辭焉以其上不感而應又越二剛以往故為咸之大過而與大過之本體異矣九三咸其股執其隨往吝此咸之萃也而爻辭云爾者經曰物相遇而後聚又曰觀其所聚而天地萬物之情可見矣故萃之為言聚也聚則衆矣不能出乎其衆者豈能㧞乎其萃哉葢士則事人而已大夫以道事君不可則止豈宜若士庶人一于從上而已哉故咸之上體皆言自上而感下下體三爻皆言自下而應上初居下而象于拇言隨上以動而志在外二居中而象于腓言隨上以動而凶居吉葢若士之事君也三居上體之上而象于股則若卿大夫然苟執其隨上之志而以應上為事則與士庶人何異哉其不能出乎衆而抜乎其萃也明矣故變體為萃而有咸其股執其隨往吝之辭夫子于是釋之曰咸其股亦不處志在隨人所執下者葢言自同初六六二之不處而執其在下以隨人之志不知大夫之異于士而碌碌以從上也唯執其隨以應上知從令而不從道故為咸之萃而與萃之本體異焉九四貞吉悔亡憧憧往來朋從爾思此咸之蹇也而爻辭云爾者九四以剛居柔下位不正而有悔必正而後吉吉而後悔亡此言其本體之義也下文則言變體之義葢易六爻之義以剛在前為阻若節之初九是也以剛在下為難若屯之六二是也咸之九四上下皆剛所以進退不可而憧憧往來若所謂蹇難也險在前也見險而能止者也二剛近已欲感之而不可乃思初六之正應而得之故曰朋從爾思若所謂蹇利西南而不利東北者也且諸卦爻以正應為貴而咸貴无心无所偏係乃以拘于正應者未為光大此又莊子所謂拘而志與道大蹇者也故咸之蹇而爻辭云爾然自咸之道言之而有蹇之義如此故特為咸之蹇而與蹇之本體異焉九五咸其脢无悔此咸之小過也而爻辭云爾者孔子曰加我數年五十以學易可以无大過矣而經云山上有雷小過君子以行過乎恭葢聖賢无大過而小過不能免又其所謂過過于厚也依于仁也故語曰人之過也各於其黨觀過斯知仁矣咸之九五舍其正應而志在上六乃自下而承之亦過乎恭矣疑其過而有悔也然咸貴无心无所偏係故以不係正應為貴則其舍正應之過亦小矣何悔之有哉莊子所謂古之真人過而不悔者如此故變體為小過而曰咸其脢无悔脢自前後言則在背自上下言則心之上而口之下是皆无心之義也无心而有過則其過小矣然因不係正應而承近己之柔故為咸之小過而與小過之本體異焉上六咸其輔頰舌此咸之遯也而爻辭云爾者葢當咸感之世天下和㑹之時獨居一卦之外若遯世者之事也荘子曰刻意尚行離世異俗髙論怨誹為亢而已矣此山谷之士非世之人枯槁赴淵者之所好也葢遯世之士言浮于事或談𤣥妙而難曉或原上古而難行憤己有才而不用非世喪道而不興尚口以誇衆而欲天下之尊己故有咸其輔頰舌滕口説之辭焉且輔也頰也舌也其象皆上體之上也言輔言頰言舌皆尚口而多言之意與艮其輔言有序者異矣與嘉遯肥遯者葢亦有間矣故為咸之遯而與遯之本體異焉巽下震上恒初六浚恒貞凶无攸利此恒之大壯也而爻辭云爾者葢天下有恒道焉有恒理焉始于弱而終于壯始乎淺而終乎深者葢所謂恒焉故一陽為復二陽為臨至于四陽並長而復為大壯其彖言大者壯也者葢言陽至是而壯也豈于一陽初復而遂能壯哉况于初六之柔巽而在下者乎于一柔之在初而有四剛並壯之意則是以壯為恒以深為恒而无始終之序矣故有浚恒貞凶始求深之辭焉葢浚言深而初言始也此葢以壯為恒而于始求深故為恒之大壯而與大壯之本體異矣九二悔亡此恒之小過也而爻辭云爾者葢才稱其位者理之常也才過其位則非理之常而有悔矣然于體為巽而剛得乎中又于卦為恒而于中能久則其才之過其位也葢亦小矣與夫大過之九二枯楊生華而老夫女妻過以相與者有間焉故曰九二悔亡能久中也葢言剛過則悔久中則悔亡而所謂久者道之恒也然此雖小過而能久中以為恒故為恒之小過而與小過之本體異焉九三不恒其德或承之羞貞吝此恒之解也而爻辭云爾者當天下貴常道之時而乃不恒其徳或用剛而剛過乎中或用巽而巽過乎中是皆不恒其徳而小人之道也非君子之道也君子者下之所願承上之所樂與其得位也將為天下利焉小人反是而為天下之難則下之所欲去而上之所棄庶㡬解天下之難而上下之所不容也九三當恒久之時而于體為巽其材則剛乃居下體過中之地將以致天下之難而上下所不容故于變體為解而曰不恒其徳无所容也且解之六三變體為恒之九三其爻辭亦曰負且乗致宼至而其上九乃曰公用射隼以解悖也葢剛過中則乗君子之器巽過中則為小人之事上慢下暴以悖為難而上九以至公之道射而去之以解其悖葢與此小象所為无所容者類矣然此當貴恒之時為不恒之行將為天下之難而為解悖者之資故為恒之解而與解之本體異矣九四田无禽此恒之升也而爻辭云爾者九為君徳四為臣位事雖君臣之所共興而民則君之所宜獨有九四以君人之徳久居人臣之位雖同寅以興事而不得有其民猶之田而无禽也以徳言之則九四徳有餘于位其勢當升而未升未可以得民也以義言之則天位不可階而升義當守君臣之常分民終不得而有矣故為恒之升而曰田无禽而夫子釋之以久非其位安得禽也文王有君民之大徳而不廢事君之小心葢與此爻之義適相協矣然恒久之道主言君臣之大義故言其勢當升而義不可升則為恒之升而與其本體異焉六五恒其徳貞婦人吉夫子凶此恒之大過也而爻辭云爾者夫恒其徳貞婦人吉言恒之本體也夫子凶言大過之變體也葢婦人常其徳從一而終者恒也夫子而從婦則婦過之矣若澤之滅木而有大過之義故于此言變體而與恒其徳者異矣是卦言隂陽之常分故以婦之從夫子為正而六五以隂居陽非上下之常分故以婦過其夫子為戒于是變恒以為大過而大過之五亦曰老婦得其士夫也上六振恒凶此恒之鼎也而爻辭云爾者恒之道以體常為主鼎之材以盡變為主本乎體常時乎盡變而終歸于静者道之常也故不以振動為恒斯可久矣此葢所謂知足不辱知止不殆可以長久者也若夫自負其材以誇于世知進而不知退知動而不知静以是為恒其可久乎此葢所謂小有才而未聞君子之大道者也故舎常久之道恃取新之材居卦之終而不知止乃以振為常而終于无功故為恒之鼎而有振恒凶之辭夫子于是釋之曰振恒在上大无功也然鼎主言材而具體常盡變之義故五言金鉉上言玉鉉金聲而始條理玉振則終條理始終如一則盡變而歸于常矣此則于體常之義不足而于趨變之義有餘故為恒之鼎而與鼎之本體異焉艮下乾上遯初六遯尾厲勿用有攸往此遯之同人也而爻辭云爾者夫遯于二隂浸長之際已不若用九于一隂未生之前而初六又居六爻之後其遯疑于不早况有近已而同徳者或往而與之同則不能去之早而後時以縮不能无厲矣此詩所謂我之懷矣自貽伊慼者也故變體為同人而戒之曰遯尾厲勿用有攸往而夫子釋之曰不往何灾也葢初六居一卦之初遯之始也在六位之後遯之尾也處下體之下則趨下已甚而厲也與近已俱隂疑往而與之同也然艮體之止亦能止而不往焉故其義如此然卦以遯為主而戒其同乎人故為遯之同人而與同人之本體異焉且同人之遯以同為主故曰出門同人然有變而為遯之義故同人于門而遯之同人以遯為主故曰遯尾厲然有變為同人之義故戒之以勿用有攸往焉六二執之用黄牛之革莫之勝説此遯之姤也而爻辭云爾者葢六二當遯之二陽則既已遯矣然于九五為應則有柔遇剛之義恐或變其志而不能無悶故于變體為始而戒之曰執之用黄牛之革莫之勝説黄言中牛言順中則無過順則無違以此道固其志則遯世無悶而説矣夫子釋之以固志謂不變其遯世之志也乾言聖人之遯世无悶而樂也易葢言自然之成徳也此言賢人之遯故其所以能説也必用中順以固志焉彼言樂此言説亦深淺之有辨然此已遯而戒其所遇故為遯之姤而與姤之本體異焉且初與此爻所以異者初為方遯二為已遯而初與二近而同徳故為同人二與五則以柔遇剛有不期而遇之意故為姤以剛柔不同故也九三係遯有疾厲畜臣妾吉此遯之否也而爻辭云爾者二隂為遯三隂為否遯至于九三則不止乎遯而又否也然且以剛居剛固有其位則猶有所係而禄隠者也故曰係遯葢係言禄而遯隠也于是而富且貴焉則疾厲所不能免若夫僅為禄仕而已則全身逺害而疾厲未必有也故曰有疾厲葢相為禄仕則畜臣妾而有之可矣故曰畜臣妾吉有疾厲者居過中而多凶之地也臣妾吉者不比乎二隂也此亦否之象所謂君子以儉徳避難不可榮以禄也夫有禄而不榮則禄隠而已故可小事而不可大事其孟子所謂公養之仕者歟此爻葢遯而入否故為遯之否與否之本體異焉夫二隂為遯三陽為否君子退欲易而避難欲早以處遯之道而居否之時則處約至也故否之遯則其爻曰包羞以處否之道而居遯之時則其處約已過慎矣故遯之否則其爻曰畜臣妾吉九四好遯君子吉小人否此遯之漸也而爻辭云爾者君子喜于得志樂于行義葢所好者道也然行止在天廢興有命樂天而知命則雖好而能遯若夫小人則不然貪夫位慕夫禄而所好者利也邦無道之時乃其富且貴之資而得意之秋故當遯之時好而不能遁非惟不能遯也且進而不止焉是爻處近君之位而當遯之時故曰好遯君子吉然以陽居隂而位非正當其位已髙矣知進而不知退而與君子異焉故言君子吉而繼之以小人否所以為遯之漸者經曰遯則退也又曰漸之進也葢正體言君子退而變體言小人進也夫漸之卦爻言君子之進而此云小人者葢以遯之時而進必不以君子之道得之其為小人明矣然則漸之本體言君子之進而遯之漸則言小人而與其本體異焉九五嘉遯貞吉此遯之旅也而爻辭云爾者九五剛健中正有充實之美居一卦之盛而為美之至以是而隠故曰嘉遯此本體變為親寡之旅則終無上下之交僅能獨善其身而上不足以正君下不足以正國惟能正其志以自得而已故曰貞吉而夫子釋之曰以正志也莊子言舜幸能正生以正衆生孔子不幸而無所遇則能正而不能正衆生故栖栖為旅人自正其志而已語曰君子之仕行其義也道之不行已知之矣其正志而已之謂乎然是爻始于遯世而終為親寡之旅故為遯之旅而與其本體異焉上九肥遯无不利此遯之咸也而爻辭云爾者上九體乾之剛健而居一卦之成又進乎九五之上則陽道常饒已至矣不止言其美之至也謂之充實而有光輝可矣以此道而遯世故曰肥遯此正體也至于變而為咸則有感應之義所謂无可无不可者此聖人之德既能自信而天下莫不信之我无自疑之義人无見疑之迹將无入而不自得也若孔子浮海而不傷于勇居夷而不嫌于陋從公山氏之召而不為汙是咸之所以感而應之者也故言變體則曰无不利而夫子曰无所疑也夫咸之九五與其上九皆聖之遯而孔子足以當之故嘉遯者言其徳之美旅則歸于徳之常故止于自正其志若削迹伐檀阨于陳蔡其為旅可知肥遯者言其道之大咸則歸于道之變故无疑无不利若至于是邦必聞其政乃以温良恭儉得之則其為咸可知矣莊子曰古之所謂隠士者非伏其身而勿見也非閉其言而不出也非藏其智而不發也時命大繆也故若孔子者亦為遯世之至而其徳之美道之大則異乎人之遯矣彼晨門荷蓧之徒則无所取焉上九所言雖有肥遯之道以處己而不廢咸感之義以應物故為遯之咸而與咸之本體異焉昔張有道為隠士阮孝緒筮易以騐其心卦㡬成咸將為應感之法非嘉遯之兆而後爻乃成上九是謂肥遯无不利則象實應徳而心跡并矣孝緒乃為上爻不發便當髙謝許生然則遯之上九或遇少陽不變而終為遯則其遯也絶物而與天為徒是謂肥遯而已一遇老陽變而為咸則雖遯也亦應物而與人為徒故言肥遯而又以无不利終之若孝緒者可預肥遯之義而已孔子則盡肥遯无不利之義也然則咸之遯則雖遯而不忘乎咸故所謂輔頰舌者遯而猶有所感也遯之咸則雖咸而不害其遯故所謂无不利者咸而未嘗不隠也然咸之道極于九五故上九足以盡遯乃為聖人之至傳曰賢者過之所謂輔頰舌者過也又曰事无不通之為聖所謂无不利者通也然則遯不廢咸唯聖人斯可賢人以下則未能无疑矣故曰肥遯无不利无所疑也乾下震上大壯初九壯于趾征凶有孚九二貞吉九三小人用壯君子用罔貞厲羝羊觸藩羸其角九四貞吉悔亡藩決不羸壯于大輿之輹六五喪羊于易无悔上六羝羊觸藩不能退不能遂无攸利艱則吉坤下離上晉初六晉如摧如貞吉罔孚裕无咎此晉之噬嗑也而爻辭云爾者以當體言之則當晉之時禮隂居下以正而吉道未彰著故可信之道人不見信然未受命故裕于進退而无咎也以變體言之則當晉之時而晉如體隂居下而摧如正必有信而人不見信必有為之間者故曰罔孚有間未除則未受命而進退可裕故曰裕无咎變體為噬嗑其義則頥中有物為之間也夫噬嗑除間之卦今乃有間而未除者以在一卦之初也小象言未受命則終除間而受命矣九四應于上此其義也然晉本无間以體隂居下又在一卦之初則間或不免乎有之故為晉之噬嗑而與噬嗑之本體異焉噬嗑之晉言小人而為君子所治將進而為君子之歸也晉之噬嗑言君子為小人所間然終不罹小人之害焉六二晉如愁如貞吉受兹介福于其王母此晉之未濟也而爻辭云爾者進而後有濟之道未進則未濟也然未濟非不濟必終于濟焉六二柔中則道可進而自下應上之象故曰晉如无應則時未進而憂道不行之象故曰愁如柔順中正則不冒進以枉道之象故曰貞吉此皆欲晉之未濟也至于无乗剛之難无過中之凶无位不當之悔則人雖莫之知而神必助之終受福于幽逺之中矣故曰受兹介福于其王母此言未濟而終于濟也母治内言其幽王母為祖妣言其逺介言祐而助之也然晉本當有濟而六二无應故為晉之未濟而與未濟之本體異矣六三衆允悔亡九四晉如鼫鼠貞厲六五悔亡失得勿恤往吉无不利上九晉其角維用伐邑厲吉无咎貞吝離下坤上明夷初九明夷于飛垂其翼君子于行三日不食有攸往主人有言此明夷之謙也而爻辭云爾者謙之彖天道下濟而光明地道卑而上行葢謙之為道卑下是務而明夷之世亦宜下而不宜上况初九又居一卦之下也哉上逆而下順故曰明夷于飛垂其翼捨正應之四而比近已之二去坤之晦而近離之明舍昏趨明而舍下趨上則其夷雖未深而去之早矣故曰君子于行三日不食有攸往主人有言葢二老避紂而歸文王之象也此爻以世當明夷而能舍以趨下故為明夷之謙而與謙之本體異焉葢謙言下明夷言晦謙之初六其實謙也體謙之道則不宜自矜其智而宜用晦故變體為明夷特取晦之義而已明夷之初九其實明夷也當明夷之世則不可進以趨上而宜趨下故變體為謙特取下之義而已謙之正體言其道明夷之正體言其時六二明夷夷于左股用拯馬壯吉此明夷之泰也而爻辭云爾者君子當明夷之世而遇明徳之君則柔順從上之志雖未能无害而强力能行之才猶未嘗廢也故曰明夷夷于左股夫明徳之君體天行之健自强不息而我能附麗以從之則向以明夷而不能无傷今乃遇賢君而得全其壯焉故曰用拯馬壯吉唯去昏主而附賢君以强力之材而乗剛壯之勢則脱明夷之難而受交泰之福者也故變體為泰而其爻辭如此股言隨上以動也左股不如右强言强力之材猶在也拯之為言升也拯馬則附驥之謂也且乾為君而其健則象乎馬乃升以居其上焉又有上下交泰之義然此爻非本泰也去明夷之難而受交泰之福故為明夷之泰而與泰之本體異焉葢六二柔順中正欲上從六五而六五以隂居尊莫為之應故曰夷于左股然柔中之材尚自若也故九三健行之才在上以近己而能自下附麗之故曰用拯馬壯吉泰之明夷治世之賢臣也用晦而明則得人矣將為太平治之至焉明夷之泰亂世之賢臣也否極而泰則得君矣于是亂極而治乃形焉九三明夷于南狩得其大首不可疾貞此明夷之復也而爻辭云爾者以一嵗言之則隂已極矣陽于是乎復萌以一月言之則晦已至矣月于是乎復朔以一日言之則夜已窮矣日于是乎復旦故自天下國家言之則昏亂已甚而明徳之君于是乎復興焉此明夷之九三既已過中所以變體為復文王有明徳天下復治之象故曰明夷于南狩得其大首不可疾貞夫南言明也狩言興事之尤大也于是雖可以得其大首而大勲未集所以為復而自此為臨為泰以至于為乾則若首出庶物萬國咸寜而天下為周矣然復之本體主天道言之故言陽既往而復明夷之復則主人道言之故言明晦而復此其所以異歟六四入于左腹獲明夷之心于出門庭此明夷之豐也而爻辭云爾者明夷言昏亂而失則象商之末世豐言光明而尚大象周之盛徳六四體本明夷變而為豐故舎同體之上六而從異體之九三若去不仁之君而就至仁之國初九應之而九三比之則不仁者所不能用而仁君所能納也故曰入于左腹然不能去彼則未足以歸此而其所以去彼歸此者敦乎仁而已故曰獲明夷之心于出門庭此㣲子去商而歸周之象也夫㣲子所以去者將以存商祀也存商祀而使不絶所以敦仁而周能納而封之亦所以為仁是又入于左腹之意記云左聖嚮仁左乃仁之方腹能容物而虚左焉為容物之至虗而能容是亦所以為仁也明夷變而為豐則自昏亂失則之國而歸光明尚大之君矣豊之彖曰豊亨王假之尚大也宜日中宜照天下也其以此歟然豐之彖曰明以動故豐則豐固本明矣明夷之豐則自闇而之明此變體之所以異也六五箕子之明夷利貞此明夷之既濟也而爻辭云爾者既濟之義自一世言之則左氏所謂及其未既濟者言盡濟也自一身言之則先儒所謂事皆濟者言事无不濟也葢當昏亂之世一于守常則正而未必利名雖美而身或不自全非既濟也一于適變則利而未必正身雖全而名未能无疑非既濟也名美矣而身不能自全若比干是己身全矣而名未能无疑若㣲子是已若夫諌而至于囚則名已濟矣囚而終于釋則身亦濟焉故有比干之正兼㣲子之利而曰箕子之明夷利貞至于為周王陳洪範而封于朝鮮則身名俱榮又既濟之盛也然自父師而黜自放黜而囚終于身名俱濟釋而封焉故為明夷之既濟而與既濟之本體異矣上六不明晦初登于天後入于地此明夷之賁也而爻辭云爾者明夷之本體所謂不明晦也而賁之彖曰文明以止則教化明矣其象曰君子以明庶政則庶政明矣政教明而身率之則自飾以正飾人亦以正焉此賁之義也明夷之君自不明而至于晦矣其為之大臣者猶庶㡬改之則明其徳以自飾明其政教以飾人望其无忝先人而復照臨天下若曰初登于天而以其先王之徳諷之使盡賁飾之道焉然後終不能然乃如明之入于地中而不能遵先王之典則是終不能盡賁之道矣故曰後入于地夫賁之義主于明明夷之義主于晦故以賁為本而變焉則貴于用晦而其晦亦終于明以明夷為本而變焉則貴于用明然亦終于晦自晦而終于明故曰白賁无咎葢白雖无色而衆采歸焉故也欲明而終晦故曰初登于天後入于地葢天以瑩天功明萬物為陽地以幽无形深不測為隂故也
