body:
  text: 易變體義卷五宋都絜撰上經五噬嗑至復震下離上噬嗑初九屨校滅趾无咎此噬嗑之晉也而爻辭云爾者葢晉有明義有進義屨校滅趾則正之于其早而懲于其小乃自不仁而進于仁自不義而進于義舎徳之昏而進徳之明日遷善逺罪而不知為之者以其治之于其始爾故于卦之初爻滅趾而使之不行夫不行于不善則必進于善而所以正之者罔不在厥初也然噬嗑者用刑之卦盖因用刑而小懲之然後能進于善故為噬嗑之晉而與夫所謂自昭明徳者異矣六二噬膚滅鼻无咎此噬嗑之睽也而爻辭云爾者盖邪正善惡如薰蕕之不同器君子有化小人之道而小人乃有害君子之心近而不相得則凶害悔吝之所不免也有君子于此徳稱其位而其才則柔乃乗近已之剛資其才以為助故除間為甚易而有噬膚之象惟除間甚易此小人所以逺而變體為睽盖火動而上澤動而下二女志不同行睽有相逺之義焉昔舜舉臯陶以治冦賊姦宄之罪而不仁者逺湯舉伊尹以易簡賢附勢之俗而不仁者逺其義噬嗑之睽也經曰同人先號咷而後笑大師克相遇又曰井通而困相遇盖所喜者欲其近故同人以遇而利所惡者欲其逺故困以遇而窮然則君子欲逺小人而去之盖可知矣然澤火二女之異趣盖睽之自然也此因除間而後逺則為噬嗑之睽而與其本體異矣六三噬腊肉遇毒小吝无咎此噬嗑之離也而爻辭云爾者盖噬嗑除間之卦而離也者明也六三雖柔不得中而材不稱位然應上九之剛除小人之間則其義明矣雖除間遇毒有不量力之吝然與君子同心以除間則公議亦明矣何咎之有哉惟在已之義明而不處于嫌疑公議能明之而不受其黯闇故變體為離取至明之義然除間小吝而終于明白人亦見察而為之辯明因是而為噬嗑之離則與其本體之明異矣九四噬乾胏得金矢利艱貞吉此噬嗑之頤也而爻辭云爾者夫君臣相遇而人民未得其養者間未除也除間而後人民得其養矣頤中有物而口體未得其養者物未噬也噬嗑而後口體得其養矣頤下動上止而食所自入有自養之義故噬乾胏而後得其所養乃為頤之變體焉雖然中爻所噬皆可以自養而獨九四變體為頤者盖頤之卦爻初上皆剛而實中爻皆柔而虚實則如頤之上下虛乃如頤之中焉至噬嗑之九四乃以剛實之體介乎二三與五衆柔之間故為頤中有物而象則有間也有物則必噬噬而後嗑則間既除而得所養矣變九四之陽以為隂則若間之已除然後上下實而中虚之體全矣此其所以變體為頤而非九四不足以當之也然則上下實而中虚頤之自然也除九四之間而後成頤之體故為噬嗑之頤而與其本體異矣六五噬乾肉得黄金貞厲无咎此噬嗑之无妄也而爻辭云爾者夫无妄之繇曰无妄元亨利貞其匪正有眚盖君子小人之所異者正與妄而已君子除小人之間則有正而无妄然必于六五言之則噬嗑之主也猶如天本无妄以雷感物則无妄矣物于是乎應之亦无妄也故歸于噬嗑之主焉然此因除小人之間乃致无妄故為噬嗑之无妄而與其本體異矣上九何校滅耳凶此噬嗑之震也而爻辭云爾者夫為間之罪其極至于惡積罪大除間之刑其著至于何校滅耳則此震怒于上而彼震恐于下矣故于上爻變體為震焉然此因除間用刑而後成震則為噬嗑之震而與其本體所謂驚逺懼邇與夫恐懼修省者異矣夫噬嗑二體兼震與離而其材兼明與動然六三明有餘而動不足故其動不足道而全體為離上九動有餘而明不足故其明不足道而全體為震盖除間而反遇毒則動不足可知矣不能小懲大誡則明不足可知矣離下艮上賁初九賁其趾舍車而徒此賁之艮也而爻辭云爾者盖君子于辭受趣舍之際未嘗苟也與其苟得于勢榮不若辭之以義則用義榮以致飾而美于勢榮多矣賁其趾者義榮也舍車者辭勢榮而不受也其象則初九舍比已之二以從正應之四也舍車則得艮之止矣徒行則所謂時行也艮以止為主而時行則行故賁其趾舍車而徒而變體為艮然因以義榮致飾于行止之際則與艮之本體異焉乃為賁之艮而已六二賁其須此賁之大畜也而爻辭云爾者盖六以柔附剛自下附上而飾之以中正之徳若須比上體以生而九三近而相得則猶上體之于須焉須之為物雖柔而下垂然陽氣外𤼵而上達猶六二以柔順從上而有中正之徳也首至陽之體若元首之尊而須之所比以生猶九三之剛正而與六二近而相得也大畜之義君以剛而止健臣以健而受畜非特止之而已又有養賢之禮焉須比上體以生而能𤼵生以資養之之象也故六二言賁其須而變為大畜然因柔順比上飾以中正而在上之剛正者兼収並畜與之同升故為賁之大畜而與其本體異矣九三賁如濡如永貞吉此賁之頥也而爻辭云爾者頥之彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也盖頥義訓養而養貴乎正自養正則有以成已矣賁之九三以陽居陽自飾正也六二柔正來比而我以剛正成之所飾正也人之徳性本正惟誠其意則自飾正而无以害吾之性矣惟責以善則飾人以正而有以全彼之性矣故賁飾以正而有養正之義于是變體為頥而物我兩全近而相得非他爻之所能預也然因致飾以正而有自養所養皆正之義故為賁之頥而與頥之本體異矣六四賁如皤如白馬翰如匪冦婚媾此賁之離也而爻辭云爾者盖父子君臣夫婦長㓜朋友五者粲然相接所謂人文也而有天合者焉莊子曰輾市人之足則辭以放驁兄則以嫗大親則已矣然則五者雖皆人文而兄弟之視他人致飾簡矣而父子尤簡其致飾皆不足道而六四之于初九其君臣夫婦朋友之義致飾之文不可苟也則其相應也離之文明于是為至盖離者萬物相見之時文以交之有附麗之義而必于六四言之者初與四為正應而為六二所間故言白馬盖致飾之未成也然六二終不能間初而初九終應乎四故言翰如言其來比之速也其為文明附麗之義尤可貴矣故變為離之體焉然因致飾而後有文明附麗之義故為賁之離而與離之本體異矣且賁具文明以止之義而後成卦初九在内卦之下舍車而弗乘則非車服以彰之而文明之義為不足以其舍車之徒則具時止時行之義而已是以獨為艮之體焉六四之于初有皤如之疑矣有白馬之疑矣有冦至之疑矣則艮之義為不足以其受翰如之應善比已之親則具文明附麗之義而已是以獨為離之體焉六五賁于丘園束帛戔戔吝終吉此賁之家人也而爻辭云爾者夫賢者之隠于丘園家居而未立朝家食而未受禄人君或未可召也將欲起之于其家而恭敬不可以无實必以幣先焉而將其意所謂賢者亦未當拜賜于庭也受之于其家而已湯之于伊尹聘諸畎畆之中魯君之于顔闔使者亦至其家焉而曰此闔之家也去就雖殊而賁于丘園變體為家人之義則一矣若乃束帛戔戔亦克儉于家之道夫儉于家可也用儉以聘賢者則猶出納之吝矣然君子惟不可虚拘苟有恭敬之實則不以厚薄為去就故終能得賢而有慶賀之吉若齊國之衆三賀于其君是已故曰六五之吉有慶也雖然此因幣聘于賢者而欲起之于其家且束帛戔戔有克儉于家之義故為賁之家人而與其本體異矣上九白賁无咎此賁之明夷也而爻辭云爾者盖君子非不明而常自晦故能致樂告之善猶白非无色故能致五采之所施也自晦猶之白也致樂告之善則猶致五采之彰施焉盖賁之義也何則素乃可作繪質乃能生文此白賁之實也上九在一卦之外而居六位之上則似之矣隂虛而資陽月魄之溯日此白賁之象也明夷務暗而君子用晦而明則似之矣向使君子飾智以驚愚修身以明汙昭昭若掲日月而行則安有樂告以善者哉故不自以為明則人皆獻厥明矣不自以為聰則人皆獻厥聰矣此用晦而明之道而白賁之義如之故為明夷之變體焉然此特因白賁有用晦而明之象故為賁之明夷而與其本體異矣坤下艮上剥初六剥牀以足蔑貞凶此剥之頥也而爻辭云爾者夫頤之為言養也而其彖曰天地養萬物聖人養賢以及萬民盖下不厚則剥之所以起剥不已則上之所以危厚下之道无他焉養之而已有六府以養其外則既庶且富而无相凌之志有三事以養其内則既富方榖而无相害之心由是歸美報上而君臣並受其福尚何剥之有哉且聖人體天地之徳而養萬民也必先之以養賢仁且有禮以養而至于賢人衆多則天下雖有懐邪之人欲為害治之事必有以正之而不馴至于剥矣剥牀以足言民之不可不養也蔑正則凶言賢之不可不養也故是爻言剥自下起而變體為頥然因剥之起无以正之而知養賢及民之不可緩故為剥之頥而與頥之本體異矣六二剥牀以辨蔑貞凶此剥之蒙也而爻辭云爾者盖蒙有暗義有襍義君子小人固若薰蕕之殊而其所以難辨者以道之不明也道固有時乎不明而小人蔽蒙而不自知顓蒙而好自用乃乗時之昏暗道之不明疾君子之異已而剥喪是務自下侵上其勢滋長君子難于自明而上下相蒙雖有柔順中正之道其誰使正之哉此其所以變體為蒙也雖然蒙有養正之道雖暗而終于明雖襍而終于著君子雖以養正之道包蒙者而納之然有終身不靈者説桎梏以往而終于為冦則擊蒙以正之而從上下之願焉剥之六二承乗皆隂如君子之孤立而未有與者至于上九剛在上與吾正應近而相得則始所謂未有與者終有與始所謂蔑正者終可得而正由是暗終于明雜終于著而蒙終于亨矣此又蒙與剥之終也雖然此因剥牀蔑貞有蒙之義故為剥之蒙而與蒙之本體異矣六三剥之无咎此剥之艮也而爻辭云爾者剥雖小人侵盛咸欲剥喪君子之時而君子所恃者道與位而已所謂道者陽爻也所謂位者居上也六雖非陽而所應者陽三雖下體而居一體之上且應乎上九而離上下之羣隂小人雖剥之而終不可得盖若山之止而不可摇固不可傾也故其變體為艮而曰剥之无咎然因小人雖剥之而不可剥故為剥之艮而與艮之本體異矣雖然剥以山附于地故為坤下艮上之象而是爻乃取艮之全體者何哉盖上體為山而已則猶山之巍峩而下不厚也下體亦為山則猶山之廣大而下亦厚焉下不厚則其頽也易而下厚則其圮也難故全體為艮而後不可剥之義明矣六四剥牀以膚凶此剥之晉也而爻辭云爾者盖五隂為剝而此則四隂已成六四承乗皆隂且切近乎災矣隂猶上進未已于是乎以膚受剥而害浸深焉故變體為晉雖然晉乃君子自昭明徳進而上行之時而此乃言小人進而未已者盖初之晉如摧如二之晉如愁如者君子之進也至九四晉如鼫鼠則小人之進爾剥之六四變體為晉而適當九四之地故言小人之進而貪竊畏人有鼫鼠之象以卦象言其常而爻言其變故雖卦象主言君子而爻亦言小人之進焉盖剥之六四以隂居隂正也故為君子之遇剥晉之九四以陽居隂不正也故為小人之冒進然君子之剥知小人之進故為剥之晉而與晉之本體異矣六五貫魚以宫人寵无不利此剥之觀也而爻辭云爾者盖剥為亂之極而亂常生乎小人女子左右近習之人左右近習柔巽隠伏其情狀盖若魚然制得其道則易不得其道則難矣將法貫魚之道以制而一之非柔中不能也柔則有以寵之與逺之則怨者異矣中則雖寵而有以制之與近之則不遜者異矣非特如此而已且示之以中正之道使之觀而化焉則自内以及外自近以及逺皆惟我是化而无不利矣所謂中正以觀天下觀民以觀我生而知君子之无咎者也故六五柔得尊位大中雖居剥之時而獨不言剥乃言貫魚以宫人寵无不利盖知所以致剥之道既不至于剥而又有中正以觀天下之義焉此所以變體為觀也雖然觀以九居五乃盡中正之道今以六居五謂之中可也而兼正以言者以柔中之道施寵于宫人而无害于分義則其治内也可謂至公而盡正矣此所以變為觀之九五而兼中正以言之也然因以中正之道治天下之剥而又能以此示天下使之觀而化故為剥之觀而與觀之本體異矣上九碩果不食君子得輿小人剥廬此剥之坤也而爻辭云爾者盖碩果者以君子充實光輝之道遇小人剥喪之時雖不見傷亦不見用于理不為順矣然遇剥之極有剛實之材天下于此厭亂而思治知君子之終不可舎而載之使居上知小人之終不可用而剥之使失所進君子而退小人是乃天下之大順也故變體為坤焉盖仁者宜在髙位而不仁則非所宜矣以宜不宜之辭知順不順之理而經以坤為天下之至順又以擊蒙禦冦為順上下之願則變體之義可知矣然因剥之終復進君子退小人而為天下之大順故為剥之坤而與坤之本體異矣且坤之上六亦先曰𤣥黄者天地之襍而終曰天𤣥地黄亦與此同義乎雖然剥之二體兼順與止之義而至此乃全體為順者小人既已剥廬則止之之術不足道也惟君子進而小人退為天下之大順故其上下皆為坤之體焉震下坤上復初九不逺復无祇悔元吉此復之坤也而爻辭云爾者盖陽動而隂静陽闢而隂闔自然之分也然陽或潜藏乾或静専者適然之時也初九爻則陽也故潜萌而動然時則冬也故至丑而未泰如是則出入无疾朋來无咎矣所謂時者无他當其可而已自人道言之動而不當其可非善時也然不善未嘗不知知之而未嘗復行則不逺而復矣不逺而復則終得坤道之静矣故法地道而无祗悔盡人道而元吉祗言地道之神元言人道之善而人則法地者也故其變體為坤焉然因不逺復无祗悔而後為復之坤則與坤之本體異矣雖然兼坤與震而後復之卦具此乃具坤之全體而无震體者震動而坤静也以二體有震故初九潜萌而動然五隂猶盛于其外故不逺而復方動而遽復故震不足坤有餘而全體為坤焉六二休復吉此復之臨也而爻辭云爾者盖六隂既純已為坤矣一陽生而為復二陽長而為臨復之本體一陽雖生而其辰建子五隂猶盛也其為變體二陽雖長而其辰建丑四隂未衰則猶足以䧟陽不可不知險而冒進故陽氣之在子丑猶未若春之動以散之也初九既以動矣以其知險故不逺而遂復六二雖變體為臨然亦知險故下比乎初而休息以待之所謂下仁者以初為復之先至而二則繼之皆陽之朋而二則下比之也智言動而仁言静知仁者之能静而與之同志休息以待時而不干時以犯難則休復之義可知矣自君子出處言之則道雖可以漸進而小人猶盛故初九一陽為復矣姑為六隂之坤葢與知雄守雌同義六二變體為臨則二陽長矣姑與初九之一陽同志而休息焉則以退為進之義也且臨之本體方二陽長矣而六三乃變體為三陽之泰則先時而過中故曰甘臨无攸利復之六二變體為臨則是方一陽之時已有二陽之義是亦先時而起矣然所以異于甘臨者以其柔順中正退而下比乎内爾此其所以言休復吉也然則初九退而為復之坤六二進而為復之臨故與二卦之本體異矣六三頻復厲无咎此復之明夷也而爻辭云爾者盖初九陽爻而明故能知其不善而不行且在卦之初也故曰不逺復六三則異此矣其爻隂則不明之象位過中則頻而復之象其所以終能復者以變隂為陽而明入地中有時而出乎地焉爾且能見其過而内自訟者明于自知也人告之以有過則喜者明于聼言也過而能改善莫大焉者明于保身也苟不明晦則不能見其過而自訟人雖告之而不喜至于名辱身危然後不得已而改乃能復歸于善則其知之者晚矣而視不能復者為愈焉所謂雖危无咎也頻謂嚬蹙之嚬不得已之貌與子路之喜異矣經曰夷者傷也明入地中明夷則言所傷者徳傷于外者必反于家則言所傷者形盖徳傷于内則形亦傷于外矣晦而能返所以雖危无咎然因頻而為復故為復之明夷則與明夷之本體異矣六四中行獨復此復之震也而爻辭云爾者盖復五隂而一陽則一陽為之主初九以一陽主五隂則彖所謂反復其道者也故即其下卦之本體言之則于一體為震矣六四在五隂之中而獨應初九之陽則惟道是從而與之俱化是以爻變為陽而全體為震焉盖乾純陽而无隂則所謂反復其道者陽之道爾君子之道爾復一陽而五隂則所謂反復其道者謂陽也而非隂謂君子也而非小人故言其道以别之則六四之所謂從道者從初九之道也初九之畫陽道也君子之道也六四從之而不違則變為陽爻而亦為震體明矣然自復而變則為復之震而與震之本體異焉且兼坤與震而後復乃成卦初乃全體為坤則以在内卦而尚居五隂之下故也四乃全體為震則以在外卦而能從一陽之應故也此其所以盡變者歟六五敦復无悔此復之屯也而爻辭云爾者經曰屯者物之始生也在物言之則草昧而未甲坼之時若在人言之則嬰孩而未為童子之時故屯未至于蒙而為解之始人之所謂赤子者此其時爾又曰屯見而不失其居謂屯雖將出見然未失其居亦方為草昧嬰孩之義也孟子曰大人者不失其赤子之心盖赤子之心人初有之惟大人能盡其性故徳至同于初而其為赤子之心未嘗失也老子亦曰含徳之厚比于赤子毒蟲不螫猛獸不攫鷙鳥不搏夫在異類猶然則人孰得而害之哉六五居位之尊而盡坤之體坤静翕而厚載也惟即動而静不遷其厚乃復其厚而為厚之至于是人物莫得而害之何悔之有此盖所謂含徳之厚比于赤子者也故變體為屯而有敦復无悔之辭然自復性之厚而徳至同于初乃有物之始生見而不失其居之義故為復之屯而與屯之本體異矣上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征此復之頤也而爻辭云爾者盖君道无他正已以正人而已性本自正迷則失之迷而後復則尤在所養焉迷則凶矣能復而不能養則災眚亦不能免苟得其養則眚未必有也孟子曰養心莫善于寡欲又曰存其心養其性所以事天此養正所以成已也書曰徳惟善政政在養民故有三事以養其心而六府以養其身此養正所以成物也經曰頥者養也又曰頥養正則吉而繼之以觀其所養觀其自養盖向也迷則猶之疾也今也復則猶疾之愈也疾之方愈則必調其節宣而助其氣體以養之君子之養徳亦然此其所以變體為頥者歟然因既迷乃復而戒之以不可不養又勉之以能養故為復之頥而與頥之本體異矣
