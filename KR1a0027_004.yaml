body:
  text: 易變體義卷四宋都潔撰上經四謙至觀艮下坤上謙初六謙謙君子用涉大川吉此謙之明夷也而爻辭云爾者莊生之書曰飾智以驚愚修身以明汙昭昭乎揭日月而行故不免也若夫謙謙君子則反乎是所謂盛德之人容貌若愚而有用晦之道焉雖然非不明晦也用晦而明爾故得艮之時止則以隂居下而晦用涉大川言得艮之時行則明于濟道焉此變體之所以為明夷歟雖然其用晦而明如此非以蒞衆而然也卑以自牧而已卑以自牧而用涉大川則吉所以為謙之明夷而與其本體異矣六二鳴謙貞吉此謙之升也而爻辭云爾者老氏之書曰自下者人髙之自後者人先之而易之于謙亦曰地道卑而上行君子卑而不可踰此謙之所以有升之義然謙有升義而必于二言之者以下體言之初最在下故以卑晦為主二稍進矣故以升髙為主書曰若升髙必自下故于下體之中言謙之升焉蓋六二離于初六而與九三近而相得因謙而升者也與升之本體異矣九三勞謙君子有終吉此謙之坤也而爻辭云爾者詩曰謂地蓋厚記曰博厚配地而謙之九三勞而不伐有功而不德夫子以謂厚之至夫坤厚載物德合無疆而君子體之以厚德載物此九三所以為謙之坤歟夫謙厚之德蓋得乎坤之體也而上下皆坤乃為厚之至故九三以剛在一體之上則為勞為功而未離下體則為不伐為不德故以功下人為厚之至於是萬民服之而以一陽為五隂之主焉然坤之為厚乃德之自然九三之至厚乃因乎謙爾此其所以為謙之坤而與其本體異矣六四無不利撝謙此謙之小過也而爻辭云爾者六四以德之正居乎上而九三以才之剛承其下受其承之之禮勿撝而去之可矣而以九三功髙謙撝而弗受所謂過乎恭者也然乘九三之上居近君之尊而未至于為之太過此變體之所以為小過歟雖然行過乎恭至用過乎儉皆君子之過于厚而依于仁者也而撝謙之辭獨取行過乎恭之義故為謙之小過而已六五不富以其鄰利用侵伐無不利此謙之蹇也而爻辭云爾者夫屈大君之勢資賢臣之才柔得尊位大中宜無思不服矣而猶有侵伐之事是亦時之蹇也然滿則招損而九族猶有離心謙則致益而人皆樂告以善如是則雖居大蹇之難而有朋來之益矣所以利用侵伐而變體為蹇之九五有大蹇朋來之辭焉夫謙之為道天地神人之所益宜不至于蹇而時勢適然雖謙以不幸而蹇然終以謙而無不利此其所以為謙之蹇歟上六鳴謙利用行師征邑國此謙之艮也而爻辭云爾者夫天尊地卑而山為地類之髙故地中有山以象德盛乎內而禮恭乎外然則其下為山既言德之髙者隱乎內矣至于上下皆艮則又言位之髙者見乎外焉德髙乎其內而位髙乎外此所以為謙之艮也且艮象為山而其材則止宜無征伐之事然不得已而用之者時行則行也艮雖時行則行而動不失時然未至于震之起而動之至也故可用行師所征者邑國而已夫以一陽在上得其所而止此艮之本體也是爻之義乃以德位俱髙而鳴謙以感物又能動不失時而利用行師所以為謙之艮者歟坤下震上豫初六鳴豫凶六二介于石不終日貞吉六三盱豫悔遲有悔九四由豫大有得勿疑朋盍簮六五貞疾恆不死上六冥豫成有渝無咎震下兌上隨初九官有渝貞吉出門交有功六二係小子失丈夫六三係丈夫失小子隨有求得利居貞九四隨有獲貞凶有孚在道以明何咎九五孚于嘉吉上六拘係之乃從維之王用亨于西山巽下艮上蠱初六幹父之蠱有子考無咎厲終吉此蠱之大畜也而爻辭云爾者語曰父在觀其志父沒觀其行行則敷施于外矣志則含藏于內焉此在蠱之初而以柔居下故其欲幹父之蠱而含藏未發者如所謂多識前言往行以畜其德者焉則其志亦大矣故變為大畜而夫子釋之曰幹父之蠱意承考也謂之意承考則所謂觀其志者也然大畜本體或言畜德或言畜賢此則意在于承考而志之所畜者大故為蠱之大畜而與其本體異矣九二幹母之蠱不可貞此蠱之艮也而爻辭云爾者夫蠱之成卦兼艮巽焉巽以柔而能入為義艮以剛而止為義九二以剛居柔得中道而巽故能上應乎六五之柔中而幹母之蠱也然母以從子為正子以制義為正幹母之蠱則母未必能從子不可貞矣不可以為正則必正其常分而各止其所然後可正焉故曰不可貞而變體為艮蓋欲正其常分而各止其所也恆之六五曰婦人貞吉從一而終也夫子制義從婦凶也此爻之義所以舍巽之體而全歸于艮歟然因幹母之蠱而歸于艮之體故為蠱之艮與其本體異矣九三幹父之蠱小有悔無大咎此蠱之蒙也而爻辭云爾者夫幹父之蠱而剛過不中以爭其不義而責之于善其意非不美也特其見善不明而昧于父子之際徇爭子之職而乖色難之愛殊不知爭之使不陷于不義者義也不必責之以善而異于朋友者恩也恩宜勝義而義乃勝恩故悔咎不免而變體為蒙雖然蒙終于著而有亨之道故九三剛過不中而終不失乎巽之體所以知過而能悔人亦恕之而終無咎也且是爻特因不知父子之恩義而不明乎善故為蠱之蒙而與其本體異矣六四裕父之蠱往見吝此蠱之鼎也而爻辭云爾者夫蠱訓事而鼎乃喻才事之所以成敗者才不才之殊爾故父以事任其子子繼其志而述之乃有所謂才子者有所謂不才子者夫子曰才不才亦各言其子若所謂不肯堂不肯播者不才子也若所謂奔走事厥考厥長者才子也今亦幹父之蠱則不可謂之不才然而寬裕不敏則不可謂之才其為子也處乎才與不才之間則才之小者而鼎之力小任重者似之故為蠱之鼎而鼎之九四亦有折足之辭焉雖然特因裕父之蠱而有不勝其任之義故為蠱之鼎而與其本體異矣六五幹父之蠱用譽此蠱之巽也而爻辭云爾者夫蠱之成卦兼巽與艮者也然子之于母以制義為常其巽以從之可暫而不可久欲正其分而艮以止之故九二去巽之入而為艮焉子之于父以濟美為孝其承以德也可進而不可止欲繼其志而巽以承之故六五去艮之止而為巽焉此變體之所以異歟且去巽而全體為艮故曰幹母之蠱不可貞去艮而全體為巽故曰幹父用譽承以德也夫巽以柔從為義柔從然後可入焉從父之令為不孝今乃以巽為善者父有德則可從矣子亦有德則能從矣使父有德而子不能巽以從之則所謂子弗祗服厥父事者爾安足以為孝哉此其所以貴于巽也雖然幹父用譽而承之以德乃為蠱之巽而主言父子之事則與其本體異矣上九不事王侯髙尚其事此蠱之升也而爻辭云爾者夫君子之道以中正為常方其為臣而事君也必降其志及其致為臣而歸則無降志之事矣是降已而升者也蠱之終如此故不事王侯髙尚其事而變體為升焉夫君子必非刻意尚行髙論怨誹為亢也以其為臣而事君也自中道而降志及其已事而致為臣也乃無降志屈身之事而復其本焉于是以升之名歸之然而升本體之義自下而升者也蠱之上九則事已而髙降已而升故為蠱之升而與升之本體異矣兊下坤上臨初九咸臨貞吉此臨之師也而爻辭云爾者夫陽宜臨隂以正之而隂則陽所臨也陽反于復而長于臨則漸進而上足以有臨矣陽能臨隂而正之上能臨下而正之君子能臨小人而正之則帥能臨衆而正之師能臨敵而正之矣經曰能以衆正而孟子言征之為言正也此臨之初九所以變體為師雖然在臨之初有正之之漸故為師之初九則師之方出而已此夫子所以言咸臨貞吉志行正也雖然此特以一陽浸長足以臨衆隂而正之故為臨之師而與其本體異矣九二咸臨吉無不利此臨之復也而爻辭云爾者君子之道難進是貴故翔而後集聖人取焉今二陽而為臨人心固已恱矣以隂猶盛而在上乃處之以一陽之復若靜而不輕動若慎而不過舉恐懼修省以此道而應上宜其退而自處從義不從命而吉無不利也雖然此自二陽之臨謙沖退託而為一陽之復故為臨之復而與復之本體異矣六三甘臨無攸利既憂之無咎此臨之泰也而爻辭云爾者君子之進先時是戒故未同而言賢人惡焉今始二陽為臨矣乃為三陽之泰若虛而為盈約而為泰者以此道而從人宜其説人不以道而無攸利也雖然此自二陽之臨驕淫矜誇而為三陽之泰故為臨之泰而與泰之本體異矣然則九二六三皆二陽之臨也九二退而為一陽之復則無不利六三進而為三陽之泰乃無攸利是亦惡盈而好謙之意歟六四至臨無咎此臨之歸妹也而爻辭云爾者蓋居剛長之時乃用至柔之德疑有咎矣然以柔而居正自上而下賢因初九之剛感已而應之則所謂無所不用其至者也故言至臨無咎而所謂歸妹之義者彼以至剛自下而來感我以至柔自上而下應之也泰之六五以柔中下應乎二而有歸妹之象此則以柔正下應乎初而有歸妹之體蓋君之旁求俊彥相之旁招俊乂皆以仁柔謙下為美焉然以其居剛長之時乃能以至柔應下故為臨之歸妹而與其本體異矣六五知臨大君之宜吉此臨之節也而爻辭云爾者節之道貴乎中而已故苦節則不可貞而甘節則往有尚臨雖剛長之卦五雖大君之位而臨人之道仁柔是貴居剛長之尊位而不濟之以柔知柔德之可用而不濟之以中皆非大君之宜也剛而濟之以柔柔而濟之以中則剛柔中節矣故變為節而曰知臨大君之宜吉而夫子釋之曰行中之謂也然此居剛長之尊位而節之以柔中故為臨之節而與節之本體異矣上六敦臨吉無咎此臨之損也而爻辭云爾者莊子曰君子不得已而臨涖天下莫若無為無為也而後安其性命之情書曰惟民生厚因物有遷夫性命之情未嘗不厚唯其出而臨人則因物以遷矣物之能遷者性之疾也安其性命之情而物不能遷則損其疾矣臨之上六雖居臨人之位而得坤之體則靜且厚矣變體為艮則又止于厚而物不能遷焉是雖出居臨涖之位而能損其疾者居一焉去其忿欲之類所以損其疾而為德之修此其所以雖出而臨人不失其性之厚也雖然此特出而臨人能損其疾者爾故為臨之損而與其本體異矣坤下巽上觀初六童觀小人無咎君子吝此觀之益也而爻辭云爾者蓋以隂居初則有童義于卦為觀固有觀義童而能觀則所見未明也以困蒙之義言之則不可以不求益所承所應皆隂則疑其不能求益然體坤之順而在六位之下則有求益之道也何以知其然哉蓋昔者闕黨童子將命于孔子而子有言曰吾見其居于位也見其與先生並行也非求益者也欲速成者也是爻有童觀之義矣而于體為坤最在六位之下則若能恭其貌順其言學以至于哲而非居于位者也非與先生並行者也以是知其有求益之道故變體為益而以君子之道期之然非損上益下自上下下者也則與其本體異焉故為觀之益而已六二窺觀利女貞此觀之渙也而爻辭云爾者夫知窺觀之為醜則必離其所而極髙明致廣大然後所見髙逺能勝物而小之矣故井蛙擅一壑之水則不知東海之樂河伯順流而東行然後知北海之大此所以取渙離之義而變體為渙雜卦曰渙離也其謂是歟古人終身誦雄雉之詩者夫子不以為善進取不忘其初者夫子以狂簡名之此其所以登東山而小魯登泰山而小天下也觀之六二以隂居隂而在內卦之中故為女子之事而以窺觀為正然以隂而應陽自內而應外則知以窺觀為醜而能離其所至于極髙明而致廣大故曰窺觀女貞亦可醜也雖然此特離所見之小趣所見之大而取渙之義故為觀之渙而與其本體異矣六三觀我生進退此觀之漸也而爻辭云爾者經曰漸之進也女歸吉也自于干至于磐于木于陸乃至于陵則進以漸矣自九五于陵復為上九之于陸則退以漸矣自于陵而于陸疑若退矣而視于干于磐猶為進焉以一端言之四十曰強則可以仕矣五十曰艾則可以服官政矣此觀我生而漸進也六十曰耆則使人而已七十曰老則又致為臣而歸焉是觀我生而漸退也若由之言志則謂可使有勇若求之言志則謂可使足民至于漆雕開之未能信而不肯仕是亦觀我生進退之義夫觀之六三在上下二體之間此所以兼漸進漸退之義而變體如此雖然觀我生而能進退以漸故為觀之漸而與其本體異矣六四觀國之光利用賔于王此觀之否也而爻辭云爾者夫否與泰反其類而為國之光者否之終而泰之始也觀上體之六四為否上體之九四而否九四曰有命無咎疇離祉故觀之六四曰觀國之光夫泰之始則光矣否之終則猶有觀焉昔文王之盛德若日月之照臨光于四方顯于西土矣而紂猶在上未純乎周此二老所以自海濵而至然而猶興曰盍歸乎來吾聞西伯善養老者吾聞云者猶有觀焉之辭也雖然因觀國之光而未即賔于王故為觀之否而與其本體異矣至利用賔于王則為泰之始焉蓋否之上體九四曰疇離祉而九五曰休否上九曰傾否則否之終而泰之始可知矣昔者陳厲公之筮敬仲也蓋嘗遇觀之否矣周史乃曰不在此其在異國非此其身在其子孫而曰猶有觀焉夫不在此而在異國非其身而在子孫其兆則否之終而泰之始也所謂猶有觀焉則觀國之光之謂也至于有國則利用賔于王矣然則變體之義豈虛言哉九五觀我生君子無咎此觀之剝也而爻辭云爾者夫下不厚則剝之所以起剝不已則國之所以危故君以民為本上以下為基而法山附于地剝之義必厚下以安宅何則人君欲觀其出于已者無他觀民情如何爾民相化以中正則知教之出于我者亦然以二五皆不失乎中正故也苟使民既庶矣既富矣其教以化之者又有尊君親上之義矣則必安宅于上而無剝焉夫上以厚下安宅法乎剝之象而然也觀民以觀我生以觀乎剝之義而然也故彼為剝之本體而此為剝之變體以剝之變體故為觀之剝而與本體異矣上九觀其生君子無咎此觀之比也而爻辭云爾者夫觀其生者觀民之所以應上者親之譽之乎其畏之侮之乎親之譽之則來比矣不然則莫我比也觀之卦爻以能觀為義而上九與三相為正應彼雖上應乎我而我位不足乃疑其不應而觀其生焉位不足而欲民之化疑若有咎然有君子之德矣則何咎之有哉故曰君子無咎夫比人者下道比于人者上道蓋比之本體也觀其生以知其比否故為觀之比而與其本體異矣然比之觀則主後夫之不上比者言之觀之比則比與不比皆觀焉
