body:
  text: 易變體義易類提要臣等謹案易變體義十二卷宋都絜撰絜字聖與丹陽人紹興中官吏部郎中知徳慶府絜父郁字子文嘗為惠州教官平生留心易學絜因以所聞于父者為是書大旨謂卦爻辭義先儒之論已詳故專明變體今考左傳載周易諸占所謂某卦之某卦者凡十事似乎因其動爻隨機斷義不必盡易之本㫖然王子伯廖論鄭公子曼滿稱其在周易豐之離游吉論楚子稱周易有之在復之頥曰迷復凶荀首論邲之戰稱周易有之在師之臨曰師出以律否臧凶蔡墨論龍見于絳稱周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍无首吉坤之剥曰龍戰于野云云皆未嘗卜筮而咸稱變體知古來周易原有此一義矣但古書散佚其説不傳而絜以義理揣摩求其崖畧其中巧相符合者如坤之初六履霜堅氷至則曰此坤之復也月令孟冬水始氷仲冬氷益壯始則薄而未堅壯則堅而難泮故爻曰履霜以坤為十月之卦又曰堅氷至者則變體為復乃十一月之卦也家人上九有孚威如終吉則曰此家人之既濟也襍卦曰既濟定也彖曰正家而天下定天下之本在國國之本在家家之本在身反身而誠孰敢不聴父子夫婦兄弟莫不安分循理而天下化之無事而定矣故變體為既濟而曰有孚威如反身之謂也如此之類皆不事𫝊㑹而自然貫通立義亦皆正大亦有涉于牽强者如家人六四富家大吉則曰此乾之同人也自道以觀身家皆為我累而況富乎其有家也姑以同乎人而已不以家為累也其家之富亦以同乎人而已不以富為累也葢極髙明而道中庸所以為中人法凡如此類則務為穿鑿以求合乎卦變之說而義亦不醇又多引老莊之辭以釋文周之經則又王弼韓康伯之流弊一變而為王宗傳楊簡者矣然宋人遺籍傳者曰稀是書雖瑜不掩瑕亦瑕不掩瑜分别觀之以備言變體者之一家亦無不可也宋志作十六卷玉海引續書目曰自乾之姤至未濟之解以意演之爻為一篇凡三百八十四篇馮椅易學附録曰都氏易先以理而次以象義每卦終又有統論今考永樂大典所載爻義皆分載于各爻之下而無所為卦終之統論與玉海合意應麟所見即緝永樂大典時所據之本非其全矣今永樂大典又缺豫隨大畜大壯睽蹇中孚等七卦及晉卦後四爻謹裒合排比編為十二卷又其書單明爻義不及彖與大小象故經文亦不全載從絜之舊焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序大易如天地其中無所不有顧學者取之如何耳取諸象則為象學取諸數則為數學取諸辭則為義理之學取諸占則為卜筮之學雖各名一家要之原本于古人而𤼵明以新意乃可為善學者西漢趙賓説箕子之明夷曰箕子萬物方荄滋也持論巧慧易家皆以為非古法用是不見信近世侍講林瑀作㑹元紀用天子即位之年傅㑹易卦以推吉凶賈魏公疏其不經罷之是皆專任私智不師古始使其説得行害道甚矣都君聖與之易其原本于古人而發明以新意者乎易曰爻者言乎其變者也又曰動則觀其變而玩其占以春秋左氏傳考之當時援引爻辭與夫推測卦變者皆不言六位必曰某卦之某卦夫推測卦變其如是固宜而援引爻辭亦如是者盖言六位則體常曰某卦之某卦則盡變也聖與之所原本在此然爻辭之合于變體者先儒畧焉聖與始演為一書凡三百八十有四義古人之底藴盡取而𤼵明之嗚呼可謂善學也已矣書成獻之于天子又鋟板而傳之且屬余為之序余善其原本于古人而無襲蹈之跡發明以新意而無穿鑿之見也故序之紹興二十九年冬至日贑川曾幾序余早游學校與易家者流談其論六十四卦三百八十四爻與夫繫辭至襍卦并為一談曰此神也此道也此體用也此德業也鑿空駕逺紊實隳真望其貌雖超然若不可挹叩其中乃空然初無所有繫風捕影卒以自欺小則不足以治心修身大則不足以用天下國家其誣易也甚矣後予至京師見先生長者論大易之説乃一皆歸之人事仁義隂陽剛柔盖一體而無間焉乃知夫仁義即天地之道也其於六經之㫖歸乃無杪忽之差吾僚友都聖與一日示余以所傳易且曰嗚呼余尚忍言之耶昔絜先君子言行為一邦師法服習六藝而尤邃于易某此訓傳談易之義乾坤之氣天地之形六子之用三才之判三百八十四爻之變其于爻變也某不先于辭而先于理以為卦爻大象適與理相當者聖人則有辭以繫之象爻之辭未盡聖人又為傳六十四卦之後以明之一章示賢人也二章示君子也三章戒衆人也四章言聖人體用之道也説卦論八卦之理序卦論六十四卦之序襍卦論六十四卦之用又曰此絜所聞于先君子也輒拾其遺説而為之傳嗟乎其深思旁取如此亦已勤矣異夫前所謂神道體用之説者故余竊有取焉且求余為序余故摭其所得于易者而叙之因退而攷其先公世為丹陽人諱郁字子文終恵州教官云紹興乙亥四月旦范陽張九成序自序潜龍之辭非姤之正體也乾初九所變而屬于姤是乾之姤而已黄裳之辭非比之正體也坤六五所變而屬于坤是坤之比而已自乾坤而下莫不如此不然則乾九二所變何以謂之其同人九五所變何以謂之其大有而董因之筮晉文六四不變何以言得泰之八魯史之筮穆姜六二不變何以言遇艮之八乎夫自乾之姤以至未濟之解宜皆若此而其義則不可一言盡若古筮史所言雖傳之簡冊而或襍以互體或推諸五行或源本隂陽之流或傅㑹占者之事或揆度一時之宜其説豈不或中而不皆合羲文周孔之本意愚以顓蒙之資被過庭之訓幼習句讀長聞崖畧而身襲儒服義學是主年踰知命嘗為説以記所聞而今老矣幸若天誘其衷復有變體之説凡數萬言姑集成編以俟君子之深于易者而折其當否焉登對進書劄子紹興二十八年四月五日臣世業箕裘誦習羲易徃年嘗進説義仰冒天威上賴聖慈寛其譴責又嘗竊謂古人即卦爻之變體而引用爻辭者見於左丘明春秋之傳如晉史蔡墨即乾之姤與其同人其大有其夬引潜見飛亢之辭以至鄭游吉等引復之頤師之臨豐之離而各指其爻辭之意若夫初上中爻九六所居則未嘗一言及之臣乃妄意爻辭所繫必協變體之義於是試以某卦之某卦之爻而推其所繫之辭見其辭㫖與變體協因演其義爻為一篇凡三百八十有四盖謂易宜有是一家之學寔蔡墨等啟之也雖臣三隅之説寸長尺短而墨等一隅之舉似不可棄是用繕寫釐為八冊因輪面對不避斧鉞之誅齎詣東上閣門聴候聖㫖投進伏望陛下體易之廣大而與人為善恕臣之狂簡而謂言志之何傷略晚學之謬言而廣古人之至論斷自聖裁而去取之豈勝幸甚取進止四月日左朝奉大夫尚書吏部郎中臣都絜劄子
