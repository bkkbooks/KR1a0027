body:
  text: 易變體義卷一宋都潔撰上經一乾至蒙乾下乾上乾初九潜龍勿用此乾之姤也而爻辭云爾者蓋以聖人之道當潜藏之時雖小有遇亦不可有為蓋乾之姤者姤之初六而已非多譽之二多功之五也若孔子之聖固足以大有為於天下而際可之仕遇衛靈公而已公養之仕遇衛孝公而已其見行可之仕於季氏若有所遇然特見其行可而終不足與有行於是而有為則枉道干時莫甚焉故變體為姤而有勿用之戒然姤之本體柔遇剛也故云天地相遇品物咸章是爻乃以剛變柔故為乾之姤而云潜龍勿用則與姤之本體異矣九二見龍在田利見大人此乾之同人也而爻辭云爾者蓋以二五之德言之其九則同而以位言之二五則異故二爻不以隂陽相應而應之以同德以九應九而有同無異蓋以德言也若夫以位言之則居上者為下所同在下者必同乎上故九二離潜而見龍德正中上同乎五而有利見大人之辭九二上同乎五矣五乃下同乎二故言飛龍在天而亦曰利見大人大人者二五之所同也曰飛曰見者二五之所異也唯二同乎五而後五同乎二故變體為同人而同人以六二為主六二自下體之中應上體之乾故曰柔得位得中而應乎乾也文言亦以水火之於濕燥雲風之於龍虎言同聲相應同氣相求以象二之同五而五同乎二變體為同人其謂是歟然同人本體言賢人衆人之事而乾之二五則大人之同也此其所以為乾之同人而與其本體異焉九三君子終日乾乾夕惕若厲無咎此乾之履也而爻辭云爾者蓋終日乾乾夕惕若而雖危無咎若所謂履虎尾不嘻人亨也履之成卦以六三為主蓋人道之患若虎之能嘻而涉世之患若履其尾之危也唯外以柔說而上應乎乾則慎之至不見嘻而亨焉乾雖主言天道而爻兼三才故三與四為人道而三以重剛過中尤為多凶之地若履虎尾而將見嘻也然未離下體不敢自肆故終日乾乾而夕猶惕若於是雖危無咎是猶虎之不見嘻而亨也故曰君子終日乾乾夕惕若厲無咎然履之本體言涉世之患人道之所同也若乾之九三則言聖人通乎天道已不憂矣而俯同乎人者如此其慎也故為乾之履而與履之本體異焉九四或躍在淵無咎此乾之小畜也而爻辭云爾者蓋乾君道也故或躍而進乎上小畜臣道也故在淵而退乎下小畜者臣畜君之卦而臣道之盛也位至於四尤近君而多懼之地雖躍而上不可以不下故曰上下無常非為邪也雖躍而進不可以不退故曰進退無恆非離羣也然乾本君道而位居四故躍而上有飛之道焉小畜本臣道雖位至五猶為臣也而况於四乎故守在淵之義而已然則乾之九四本若舜避堯之子禹避舜之子而未踐位之時也至於變體為小畜則若伊尹之於商姬旦之於周終於臣位而已且小畜之大臣有臣道爾而乾之為臣者則有君道焉乾之小畜蓋以君道而終臣位則與小畜之本體異矣九五飛龍在天利見大人此乾之大有也而爻辭云爾者蓋乾天下之至健人君之道也以剛健之德居九五之位欲其不至於亢者無他焉濟之以柔屈己逮下而已若夫大有則以柔德居尊下賢者而有之之卦也厥孚交如而下應乎二者六五柔得尊位大中而為大有之主也乾之九五剛不過中則濟以柔克之象而其變體所以為大有故以九居五則飛龍在天矣變體為大有所以下見九二而曰利見大人也夫柔得位得中而應乎乾曰同人故九二自下體而上見九五得同人之變體蓋同人之成卦以二為主故也柔得尊位大中而上下應之曰大有故九五自上體而下見九二得大有之變體蓋大有之成卦以五為主故也然大有之本體一於柔而已若夫剛而濟之以中得以柔下賢之義則為乾之大有而與其本體異焉上九亢龍有悔此乾之夬也而爻辭云爾者蓋自一陽來復至五陽為夬又進而不已則剛長乃終而為乾六陽為乾則純粹精矣以人道之盛時言之則所謂莫不好德人人有士君子之行者也道之升也時之隆也而至於此可謂極矣人君於是或自滿而不知戒或自髙而不能謙則謂天下無小人而失功成不居之道違居德則忌之戒焉然乾之數九九則能變故有用九之義而變體為夬夬之所以言施祿及下居德則忌者蓋夬之決小人非一人之功也與衆君子決之則羣賢預有力焉及小人既去而人皆好德有士君子之行其可自以為德而不忘勢以待之哉此乾之夬所以言亢龍有悔用九見羣龍無首然自夬而進為乾者言道之長而以盈為至也乾而變體為夬者言德之謙而以盈為戒也以盈為至則曰剛長乃終以盈為戒故曰居德則忌居德則忌則近於亢龍之悔矣不以德自居則近於見羣龍無首矣且夬之時一小人乘五君子之上君子協力以決之然後純陽而為乾乾而復變為夬者欲人君無忘夬之時也苟謂天下已無小人而啓寵以納侮惡直而醜正不逺佞人而用憸人則小人復進矣乾變為夬其義如此亦猶泰而繼之以否既濟而繼之以未濟者乎然自五陽而欲進於六陽者夬之本體也自六陽而復變為五陽者乾之夬也變體所以異於本體者如此坤下坤上坤初六履霜堅氷至此坤之復也而爻辭云爾者蓋霜象隂之始凝氷象隂之極盛而復之為卦仲冬之月也月令孟冬則曰水始氷而仲冬則曰氷益壯始則薄而未堅壯則堅而難泮矣然則履霜言坤之初六而堅氷至者言復之變體也且火為陽水為隂冰霜皆水蓋隂象也自午至戌五隂而後霜乃凝焉六隂而後水始氷焉然必變體為復而後有堅氷之象者仲冬之月時為正北水莫盛焉非若西北乾位於五行為金而已且西北純隂既無陽矣純隂無陽則孰以隂盛為不可哉陽兆而薄隂矣乃來復於正北一陽方萌五隂猶盛既有陽以别之矣然後知堅氷之為隂也然復之本體主言陽之既來坤之變體主言陽之方生則所謂坤之復者又為復之始焉六二直方大不習無不利此坤之師也而爻辭云爾者蓋此爻言直方大又言地道光蓋盡地道而為域中之大也文言稱敬義立而德不孤則君子體坤而盡臣道矣蓋敬以直內義以方外不習無不利而不疑其所行則臣之道也而其變體為師者以其不習而無不利故文武兼資而備將相之才入相出將無自而不可矣古之六卿居則為六官之長及其用師則為六軍之將周公之東征太公召公之分陜皆由此道故坤之六二盡大臣之道乃變體為師而爻辭如此昔衛靈公問陳於孔子而孔子對曰軍旅之事未之學也然而又言我戰則克克者蓋所謂不習無不利其與此同義乎然師之成卦以用兵為主而是爻則言盡大臣之道而行軍用師之法皆其餘事故為坤之師而與其本體異焉六三含章可貞或從王事無成有終此坤之謙也而爻辭云爾者蓋飾智以驚愚修身以明汙昭昭乎若揭日月而行非所謂謙也唯有而若無實而若虛善矣而無伐善之纍美矣而無自美之態盛德之容貌若良賈之深藏此含章之德所以有地中有山之義而變體為謙也况臣之事君待唱而後和用此道以從事然後能安臣之分矣故始也待唱而不敢先其事終也歸成而不自有其功雖人臣之所當然是亦素體謙德之柄而施于君臣之際者能爾也蓋六三柔過乎中非可正之道而未離下體於德為謙故變體之辭如此然謙之本體稱物乎施而無所不用其至是爻則言臣之含章待倡不有其成故為坤之謙而與其本體異焉六四括囊無咎無譽此坤之豫也而爻辭云爾者蓋坤至六四闔户於酉矣以言賢者窮處默而不語之時故有括囊之象焉然和豫以通者衆人之所同而窮亦樂者賢人之所獨六四以隂居隂靜而不失其正窮亦樂之象此變體之所以為豫也唯其括囊則閉其言而不出藏其智而不發故於是乎無譽然不先時而起不後時而縮則於是乎無咎無咎則不以人非之而害其樂也無譽則不以人與之而易其樂也無咎無譽而其樂無益損焉則其為悅豫可知矣故曰括囊無咎無譽然豫以順動而成悅豫之效故以雷出地奮為象而先王法之以作樂崇德是爻則以六四隂靜而正雖窮亦樂故為坤之豫焉而與其本體異矣六五黃裳元吉此坤之比也而爻辭云爾者蓋比輔也言下順從也而坤為臣位至六五疑其太過不能盡臣道然以柔居中故能正位居體仍執臣下之禮以上比其君焉書曰臣哉鄰哉鄰哉臣哉蓋五比為鄰而臣者君之鄰鄰比以輔其君者也比之九五顯比之主也而坤之六五黃裳之臣也黃者中之色裳者下之服經曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤君臣之道也臣道譬裳則君道如衣上下相成不可胥失故衣而不裳如君之不用其臣裳而不衣則猶臣之不比其君唯衣以覆其下而裳以承其上然後為順故曰衣裳則順矣乎衣裳順矣而坤亦至順坤道之順所以承天也唯居髙位而柔不過中者乃能盡之故曰坤道其順乎而比亦以下順從為義此變體所以為比而有黃裳元吉之辭也然比之本體言臣民莫不順從以至不寧之逺方莫不來比是爻則主言大臣以順比其君故為坤之比而與其本體異焉上六龍戰于野其血𤣥黃此坤之剝也而爻辭云爾者蓋五隂變一陽謂之剝而六隂以純謂之坤書曰剝喪元良蓋小人變君子謂之剝然則剝之者小人而被剝者君子也坤既六隂成矣乃變為剝則五隂在下而一陽在上者隂盛則入衰既往而屈矣陽窮而更生乃方來而進焉故向也亂之未極則小人剝君子而未艾今則民厭亂而思治矣乃君子是載而小人是剝也夫小人每以剝喪君子為事乃被剝廬之禍者出乎爾者反乎爾也蓋純隂為坤而陽乃始焉然隂盛於陽故與陽俱稱龍龍本言陽之變也陽衰於隂故與隂俱稱血血本言隂之傷也方君子小人勝負之未分則若𤣥黃為天地之雜及乎小人退而君子進則有天𤣥地黃之辨焉故坤之上六變體為剝而曰龍戰于野其血𤣥黃而繼之以用六利永貞也然剝之本體言小人方盛乃君子遇剝是爻則言隂極生陽亂極思治小人盛極而君子復進故六隂既極復為五隂而一陽乃為坤之剝焉蓋與剝之本體異矣且乾之夬自純陽無隂而一隂居上欲觀此者無忘除惡未盡之時所以戒君子坤之剝自純隂無陽而一陽居上欲聞此者知畏長惡弗悛之禍所以戒小人然則坤之剝與坤之復其五隂一陽何以異乎曰復之一陽在初則以時言也剝之一陽在上則以位言也震下坎上屯初九磐桓利居貞利建侯此屯之比也而爻辭云爾者蓋屯有阻固之義比有親比之義左傳所謂屯固比入是也康屯之主當險阻艱難之時有還定安集之道以貴下賤而天下莫不來比則得民而為天子以封建諸侯使小比大大字小而共治之矣初九以至剛之才居一卦之下與四相應為羣隂之主以盡覆人之道而天下莫不事之其象如此故為屯之比有利居貞利建侯之辭蓋利居貞所以言屯而利建侯所以言比也比之象曰地上有水比先王以建萬國親諸侯則初九之所謂建侯指比之變體可知矣武王大賚於四海而萬姓悅服乃列爵分土垂拱而天下治盡此爻之義也昔畢萬筮仕蓋遇是爻而史告之曰公侯之卦其以此歟雖然能康天下之屯則封諸侯矣畢萬不能康天下之屯則為諸侯可也故天子曰兆民諸侯曰萬民畢萬命名之祥亦諸侯爾然則卜筮之法所遇之卦必惟其人必稱其事通其變以言之然後得焉且顯比之主天下莫不比矣屯之比則自屯而比特為比之始焉故於初九言之而與九五之顯比異矣六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字此屯之節也而爻辭云爾者屯固勿用有攸往而節又有止義然節之為止與艮異矣艮如山焉蓋自止也節以制度則節之而後止也六二當屯之時有乘剛之難故曰屯如邅如自卦爻當體言之也體震應上有乘馬之才而處靜待時有班如未進之義則節其外而其跡止矣以柔近剛有婚姻之情而以隂居隂有守正不字之義則節其內而其心止矣故曰乘馬班如女子貞不字此自變體言之也然屯之六二即節之九二也九二前無陽爻為之難而以不出門庭為失時之極六二雖正應在五下比乎初而初為康屯之主宜適變以從之故曰十年乃字然始不守正求而字之則干時而犯義不足以有行唯始於守正而後終於反常則可矣此又屯之終而節之所以亨也且屯者非常之卦康屯者非常之主故其義如此與他卦之立本者異矣然節以制度理所當然非為屯也是爻乃因屯而後節以止之至屯之終又復反常而有行故為屯之節而與節之本體異焉六三即鹿無虞惟入于林中君子幾不如舍往吝此屯之既濟也而爻辭云爾者蓋經曰既濟定也莊子曰相忘於道者無事而生定蓋所謂未濟者以有所求也求其所不可求未濟也求之而非其道未濟也求之而不可得則莫之濟矣若夫物物皆舍了無所求則在我自足無缺無餘既未始往求以勞其外又未始營求以擾其內亦無求之不得之悔焉則無事而生定矣在屯之時尤當如此所以六三變體而為既濟也蓋六三之於上六非正應也此不可求也不度而往則求非其道者也如是則求之不得矣故曰即鹿無虞惟入於林中此自本體言之也然六三雖過中而居隂雖體震而未離下體君子之知幾能不求而舍之象也故曰君子幾不如舍此自變體言之也然既濟本體之義柔正而位當上下相應而無不濟是爻則以在屯之時無所求而自足故為屯之既濟而與其本體異焉六四乘馬班如求婚媾往吉無不利此屯之隨也而爻辭云爾者蓋六四才稱其位則乘馬之象行非其時則班如之象此言遇屯之初也然康屯之主乃其正應於是自下以求上自陽而求隂彼既求矣然後往而從之則動而說隨而變體之義可見蓋不待求而往非隨也所求非其人非能隨也求而不往又非所謂隨也隨唯康屯之主自下而來求然後往而隨之則去就之義明矣隨之九四亦曰有孚在道以明蓋與此同義歟隨之本體曰剛來下柔動而悅隨則始於班如以有待人主自下以來求然後往而從之故為屯之隨而與其本體異焉九五屯其膏小貞吉大貞凶此屯之復也而爻辭云爾者蓋方屯之時民苦憔悴未被膏澤若隂盛陽微雲雷而未雨也變體為復則若一陽方生而未能澤物者故有屯其膏之辭焉然夫子釋之以施未光者陽可以澤物方萌而未能也不以是為貞而征焉則進而為臨又進而為泰又進而為大壯則雲行而雨施雷動而雨從作解之功成而施乃光焉自君道言之君子德施宜普而言施未光者庶幾改之之謂也苟不以是為貞則上施光矣且陽為大隂為小故自天道言之隂以吝嗇為正可也陽則異於是自人道言之有司以吝為正可也君子則異於是所以謂小貞吉而大貞凶者其以此歟夫屯者物之始生也而復則萬物潜萌之時自剝而為復則進而出之序若夫自屯而為復則退而入之序故有屯膏之辭而為屯之復蓋與復之本體異矣上六乘馬班如泣血漣如此屯之益也而爻辭云爾者蓋上六居屯之時乃以柔居上而乘九五之剛於是猶有待焉則衆所不與而傷之者至矣其能免乎屯耶既已至此矣方且泣血漣如哀痛而自怨將以求益亦何及哉故變體為益言欲求益而終無益也其辭曰泣血漣如何可長也則終無益可知其變體為益之上九亦曰莫益之或擊之義蓋相類矣夫自損以求益益之義也是爻以柔乘剛居屯之極將以求益而終無益焉故為屯之益而與其本體異矣坎下艮上蒙初六發蒙利用刑人用說桎梏以往吝此蒙之損也而爻辭云爾者蓋經以緩必有所失然後受之以損而孔子曰損者三樂又曰損者三友然則損者益之反也夫天降生民倥侗顓蒙發於初恐其聰明不開也而利用刑人恐其恣于情性也訓之於理如此者畏其在已之三樂因三友以致其損也若夫用說桎梏以往則無以收其威矣於是所趣必不正所行必不慎行諸已者必有驕樂佚游宴樂之好焉同乎人者必有便僻善柔便佞之匹焉此變體之所以為損而有往吝之辭也夫損之義不一蓋有因緩以致損者是爻則言因蒙以致損故為蒙之損而與其本體異矣九二包蒙吉納婦吉子克家此蒙之剝也而爻辭云爾者山附于地而下苟不厚則剝之所以起剝自下起而剝之不已則宅之所以危故剝床之漸自下而起而安宅之效亦自下而積焉包蒙則言凡幼少者莫不懷之矣而納婦則言凡柔弱者莫不助之矣是皆厚下之道由是以固其國則猶子之能克其家也臣之事其君猶子之事其父臣之任其國猶子之任其家也凡幼少者莫不懷柔弱者莫不助以是佐其君而固其國則厚下安宅之義于是乎在故變體為剝而有包蒙納婦克家之辭焉夫剝之本體言下不厚而致剝蒙之變體乃言包蒙納婦而不致于剝故為蒙之剝然于山附于地之象而言厚下安宅則與見不賢而內自省同義六三勿用取女見金夫不有躬無攸利此蒙之蠱也而爻辭云爾者風落山為蠱蠱之為言壞也為女子者苟所見不明則所守不正一見可從而遂失身以從之則禮義亷耻之俗壞勿用此義而取女則可矣故變體為蠱而曰勿用取女見金夫不有躬無攸利以學者之事言之其象則見善不明所適非正下喬木入幽谷倍師易學而見棄于君子之門者歟此六三以不正之隂有趨下之性與九二非正應因近已而悅之之象也蠱之本體以剛上柔下不能變通趣時而為蠱是爻則蒙而不正為風俗之壞而為蒙之蠱則與其本體異焉六四困蒙吝此蒙之未濟也而爻辭云爾者蓋有餘者可推以濟物而不足者賴以濟焉此隂之乏所以待陽而後饒月之闕所以遡日而後盈而人之倥侗顓蒙者必資乎師而後明也揚子曰侍君子者晦斯光窒斯通辱斯榮敗斯成如是則學者不足賴師之有餘以濟矣苟困而不學未濟也苟模不模範不範友不勝已此非其人亦未濟也蒙之六四以隂居隂承乘皆隂而所應亦隂隂虛以晦無陽以資之則困而不學又闕師友之益者也故變體為未濟有困蒙吝之辭而夫子釋之曰獨逺實也雖然昭明之性本原自若今雖困蒙尚可教也猶庶幾乎有濟焉非終于不濟也此其所以為未濟然未濟本體以事言之是爻則言人性之蒙者既不能資諸已又無以資諸人故為蒙之未濟而與其本體異焉六五童蒙吉此蒙之渙也而爻辭云爾者蓋人方蔽蒙則茅塞其心而未開陷溺其心而未達猶險阻之為難也唯恭其貌順其言而後學而至于哲哲且聰矣然後若氷之釋如難之散于是思而至于睿睿而至于聖則損實為虛致虛為明而無所不通也此學之所以為王者事也故六五以柔中盡童蒙事師之禮以下求九二之剛中變體為渙有童蒙吉之辭而夫子釋之曰順以㢲者序卦曰㢲入也入而後說之故受之以兑兑者說也說而後散之故受之以渙蓋順以㢲而入之然後義理足以說我心既說矣則茅塞陷溺之蔽散此又童蒙順㢲而變體為渙之義也然渙之本體主時之險難言之而蒙之渙則主性之蔽蒙言之此其所以異歟上九擊蒙不利為冦利禦冦此蒙之師也而爻辭云爾者蓋性之不明教之不率至于扞格不勝而終于昏迷不恭昏迷之甚則為冦之所不能免故始用檟楚以擊之終用戈兵以禦之是爻之義如此故有師之義而有擊蒙不利為冦利禦冦之辭焉夫兼弱攻昧取亂悔亡然後盡行師之義是爻所主攻昧而已故為蒙之師而與其本體異焉
