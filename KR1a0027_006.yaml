body:
  text: 易變體義卷六宋都潔撰上經六無妄至離震下乾上無妄初九無妄往吉六二不耕穫不災畬則利有攸往六三無妄之災或繫之牛行人之得邑人之災九四可貞無咎九五無妄之疾勿藥有喜上九無妄行有眚無攸利乾下艮上大畜初九有厲利己此大畜之蠱也而爻辭云爾者夫易以山下有風為蠱之象而傳以風落山為蠱之實蓋草木生成于山使非其時則風搖落之也初九以健行之材遇畜賢之世可以進矣而居六位之下在一卦之始而當上下嚴分之時于是而輕進則有犯上之危其君必因而擠之矣是猶草木非其時而風搖落之也已之而未進則無犯分之危而有待時之利故曰有厲利己有厲則猶遇蠱也利己則猶治蠱也其曰不犯災者蓋風落之者草木之遇災也君擠之者賢者之遇災也知其有厲已而不進則不犯災矣終為六四所應則利于是乎在此變為蠱之義也然在畜賢之初為犯上之厲而有風落山之象故為大畜之蠱而與蠱之本體異焉九二輿説輹此大畜之賁也而爻辭云爾者蓋車乃致飾之器也經以坤為大輿則輿乃載上而飾之之用也又以賁其趾舍車而徒為自飾之義則説輹而待時亦自飾之義也所謂輿者言受畜而有飾上之才所謂説輹者言待時而有自飾之禮蓋九二以健行之才遇畜賢之世可以載上而有行矣然以剛中之道居下卦之內則必説輹而有待焉輿言飾上之才説輹言自飾之禮而賁以致飾為義所以言輿説輹也且車輿有文明之義説輹有艮止之義艮雖主于止而時行則行説輹雖止而不害其可行此又文明以止協賁之象焉蓋九二在下體之中則説輹而止剛健而應上則終能有行與小畜之説輹敗其所可行者異矣然當大畜之時雖才可以飾上而義適可以自飾故為大畜之賁而與賁之本體異矣九三良馬逐利艱貞曰間輿衛利有攸往此大畜之損也而爻辭云爾者有至善之德有健行之才有能進之志則已盛矣物惡大盛而况居大畜嚴分之時不有以自抑損之則必貽咎而速禍尚可以往而與上合志乎哉唯有以自損則必艱以知難正以知止日以戒之間以習之輿以載上衛以保身然後不至于犯上而上無僭擬之嫌于是往而受畜則與上合志矣良言至善謂九之陽也馬言健行謂乾之體也逐言能進謂以九居三剛過中也其所以能自損者以其未離乎下體故爾老子曰物或損之而益艱貞而利有攸往則以損而致益也經曰損先難而後易利艱貞則先難矣利有攸往則後易焉然因大畜之九三而後取損之義故為大畜之損而與損之本體異矣六四童牛之牿元吉此大畜之大有也而爻辭云爾者大畜言以剛德畜賢大有言以柔德有賢蓋人君之畜賢雖以剛德為主而所以下士者柔德亦不廢也故高明柔克所以昭忠善為火在天上大有之象而大畜之變體取焉其言童牛之牿者童言幼牛言順皆柔德之象而牿能間物物無敢傷言雖以剛畜而不廢其德之柔雖以柔克而不害其能畜元吉亦言以仁柔下賢有得而無失也然以大畜之剛不廢大有之柔故為大畜之大有而與大有之本體異矣六五豶豕之牙吉此大畜之小畜也而爻辭云爾者蓋孟子曰畜君何尤畜君者好君也畜之為言養其善而使之充實也所謂臣畜君者諫而君行之言而君聽之也故小畜之義以臣畜君而初九言復自道者所謂格君心之非也九二言牽復吉者所謂繩愆糾謬格其非心也豕之豶者去其私欲之象格心之非而能從之則能勝已之私矣故有豶豕之象焉其言豶者雖畜賢以剛而不廢從諫之德其言牙者牙能化物雖從諫而不害其畜賢之道也吉則畜賢而得之然因以剛畜賢而不廢從諫之德故為大畜之小畜而與小畜之本體異矣上九何天之衢亨此大畜之泰也而爻辭云爾者大畜以止健而嚴分為義而泰以交通而忘分為義故初則利己而不可進二則説輹而未可行三則艱貞而後利有攸往至卦之終然後其行無礙其來莫禦羣賢由我以進而我以是為已任則所謂大來吉亨者此其時矣故變體為泰而曰何天之衢亨夫四逹為衢固已無不通矣而謂之天衢則非有彼疆爾界之辨太虛之中何往而不通哉是其所以君子道長者非人之所能為也變嚴分而止健之義為忘分而交通之道其以此歟然變嚴分而忘分故為大畜之泰而與泰之本體異焉夫大畜之下體皆受畜之象而其上體皆畜賢之象下體言其始故以嚴分為主上體言其終故以忘分為義嚴分以明禮而後忘分以行道故其變也六四為大有六五為小畜而上九為泰蓋大有者雖以剛畜賢而不廢下士之禮也小畜者雖以剛畜賢而不廢從諫之德也泰則進此矣雖以剛畜賢而交際之情亦不廢焉故初雖利已而終應于四二雖説輹而終應于五三雖利艱貞而終與上九同心同德則其道盛行而畜賢之道畢矣泰之所謂上下交而其志同者蓋以此也震下艮上頤初九舍爾靈龜觀我朵頤凶此頤之剝也而爻辭云爾者蓋龜有靈德而不志于口體之養言養其德于內者也頤之動也如木之朵而趍乎末蓋養其形于外者也德為本形為末本末兼備則善矣末盛則本衰而有剝喪之道如是而致剝是以其道得之非不幸而及之也此其所以凶且君以民為本上以下為基下不厚則剝之所以起剝不已則國之所以危故剝以山附于地為象而為人上者鑒之則厚下以安宅初九當一卦之始在六位之下蓋言其本也得震動之性而上應外卦蓋言棄本而徇末也故末盛本衰有剝之義而其辭如此夫山附于地則下不厚而致剝為人上者鑒之則能厚下以安宅向使能養靈龜之德而不纍于朵頤口體之養則本固末茂而不至于剝矣孟子謂樂正子曰我不意子學古之道而以餔餟蓋舍靈龜而觀朵頤之謂也然樂正子知而改其過故終預善人信人之目焉初九不能養其本而有剝之道故為頤之剝而與其本體異矣六二顛頤拂經于丘頤征凶此頤之損也而爻辭云爾者蓋六二之于六五也以下養上則反其正而曰顛頤不求而往則違其常而曰拂經彼不待我以養乃以道之不足而欲養之則失其應矣故曰于丘頤征凶夫反其正違其常而以不足之道養人是皆無益而有損也孔子曰溫故而知新可以為師矣孟子曰人之患在好為人師蓋在我有餘而可以為師則因彼來學而應之可也在我不足又不待求而應且施之于上則顛且拂矣其好為人師如此則今之所未有者不復裒多以求昔之所嘗有者且將隨應而竭既不能溫故知新以自養又不能成德逹材以養人雖有善養人之志而非多聞之益友也祗所以為損而與夫既以與人已愈多者異矣故為頤之損而與損之本體異焉六三拂頤貞凶十年勿用無攸利此頤之賁也而爻辭云爾者陽道常饒隂道常乏而上宜以善養人致天下心悅而誠服則自上而養下以剛而養柔者常然之分自然之理也今乃以下體之柔震體之動而致養乎上九之剛則違養道之常矣唯以柔應剛剛柔相雜有若賁飾之文者故變體為賁然以賁之卦爻推之柔自上而下以文下體之剛則柔來而文剛剛自下而上以文上體之柔則分剛上而文柔以上文下以剛文柔亦常然之分也今以柔而文剛自下而文上則亦違賁飾之常矣故曰拂頤貞凶以違上下之常分故勿用而無攸利者至十年之久焉然欲致養致飾于上者其心豈有他哉久則上必恕之故勿用無攸利者止于十年而終于上下相應焉此即致養而見致飾皆不可違上下之常分故為頤之賁而與頤之本體異矣六四顛頤吉虎視耽耽其欲逐逐無咎此頤之噬嗑也而爻辭云爾者蓋上下實而中虛者頤之體也初上實而中爻虛者頤之卦也中爻之間有九四以實之則若頤中之有物而不可不噬噬而後嗑嗑而後可以為養矣噬者除間之義而嗑者合也方頤六四之未變則頤而已變為噬嗑之九四則頤中有物焉物在頤中必自上而下故曰顛頤吉其物雖終于下咽而必噬焉有遇毒者不可不擬而後動也故曰虎視耽耽方噬而未嗑則未充其欲也故曰其欲逐逐至于噬而嗑嗑而得其所養然後無咎初所以疑其有咎者以變體有九四之間也而終于無咎者能噬嗑以除間而已二卦兩爻皆四也噬嗑之四變實以為虛故為噬嗑之頤頤之四變虛以為實故為頤之噬嗑而各與其本體異焉六五拂經居貞吉不可涉大川此頤之益也而爻辭云爾者孟子曰以善養人然後能服天下故道足以養人而不待乎人之養者人君之常也道未足以養人而有待于人之養則拂其常矣然致恭盡禮而資人以求益亦可以為所居之正而足以得志焉此變體之所以為益也然益之道利涉大川而頤之益則不可涉大川者益之本體在已有餘而損上益下故推恩以利物而足以濟難所以言利涉大川若夫頤之益則在已不足而順以從上故資人以居正而不足以濟難此所以不可涉大川而與夫益之九五所謂有孚惠心勿問元吉者亦有間矣上九由頤厲吉利涉大川此頤之復也而爻辭云爾者蓋揫斂萬物以向乎肅殺者隂也發生萬物以向乎長養者陽也一陽來復則羣陽浸長而百昌之生萬寶之成所以長養之功由此而出矣故有由頤之辭雖一陽方復五隂猶盛而朋來無咎剛長乃終故有厲吉之辭陽之初生也知險而潛由此而進則終出險而有濟矣故有利涉大川之辭然則所謂利涉大川者其復之終乎夫陽之復猶君子之復也蓋君子之復進也羣賢亦由我以同升而天下之所以利養者皆由我以成雖小人未盡消而終于夬決之盛至于純乾而後已則人皆有士君子之行矣天下之難其有不濟者乎上九以一陽居羣隂之上以彼之常乏資吾道之常饒則莫不由我以養矣彖之所謂養賢以及萬民者也雖居高位而有厲然主羣隂而有慶焉其所以言利涉大川者羣隂猶大川也居其上則利涉之象也然羣隂資一陽以為主是猶萬物自一陽以潛萌故是爻之義為頤之復而與復之本體異焉巽下兑上大過初六藉用白茅無咎此大過之夬也而爻辭云爾者君子知柔剛之異用知微彰之異時若其當柔而剛當微而彰皆不足以保身而况可以制小人哉大過者本末弱之世小人盛而君子衰矣苟不能用柔則非知微者也不慎如此則小人得而害之豈保身之術哉尚可以治人乎唯用柔乃能得時而剛唯能慎乃能因時而決猶之藉用白茅物雖薄而用可重也蓋茅柔物也有順而直之德焉君子之象也藉物于下猶君子以柔居下也至于可薦于鬼神而去禍以致福則猶君子決小人而使人並受其福也始于保身而終于勝小人故曰慎斯術以往其無所失矣此變體所以為夬然本體之初爻貴初知柔而變體之初爻戒于用壯二爻之辭相為表裏而言其當體至所謂夬則要其終焉然是爻所言特為大過之夬非即能夬也蓋其本體異矣九二枯楊生稊老夫得其女妻無不利此大過之咸也而爻辭云爾者二氣感應以相與然後萬物生焉此咸之天道而使枯楊生稊則大者過越而有為之象也止而説男下女然後夫婦成焉此咸之人道而夫得其女妻則大者過越而相與之象也二氣視物為大焉夫視妻為大焉枯楊生稊言大者之濟世老夫得其女妻言大者之制物以卦爻言之九言剛大之才二言衰弱之世剛得乎中則大人之象而初六柔承乎下則小人之象故其辭如此然大者過物而後能咸故為大過之咸而與其本體異焉九三棟橈凶此大過之困也而爻辭云爾者衰弱之世危有待于持顛有待于扶必有大過人之材然後能撥亂反正拯顛危而中興焉苟唯僅勝其任而位已過中未離于巽而體猶居下則力少任重而其材窮矣是猶棟橈者不足以為宫室之固而震風凌雨未免乎顛危之懼也故其爻辭云爾經曰大過顛也又曰澤無水困變體之所以然者以九三無大過人之材也蓋卦爻之立本者以陽居陽為位當唯大過之類則以陽居隂者為才過其位以陽居陽為不能過故九二無不利九四棟隆吉九五則無咎無譽而九三言棟橈凶焉説卦所謂剛柔立本變通趣時者其以此歟九四棟隆吉有它吝此大過之井也而爻辭云爾者夫木本乎地而下首者也其材中棟則居乎上矣所謂上棟者是也有它則橈而傾矣所謂橈乎下者也猶井本體下入而深所謂困乎上者必反下是也及其致用則汲之而上出焉所謂巽乎水而上水是也若初六之井泥不食則橈乎下之象若九二之井谷射鮒則有它之象蓋大過之時衰弱之世也君子之若九四者位近君矣而才過其任足以上輔其君而下庇其人所謂棟隆吉也苟下係正應則不足以扶持顛危之患故曰有它吝夫有它則橈乎下矣有困乎上而反乎下之義故變體為井然本言以大過之材輔衰弱之世故為大過之井而與井之本體異焉九五枯楊生華老婦得其士夫無咎無譽此大過之恆也而爻辭云爾者楊柔木而枯焉言衰弱之世生華不若梯之久言不成濟世之功也婦宜從夫而反過之則雖老猶婦也夫宜帥婦而反從之則不足于夫道言不足以制義也枯楊猶之老婦生華猶之士夫此言其材能適中而不足以過物其德能守常而不足盡變當大過之世無非常之材者也故為大過之恆而與其本體異矣夫大過之爻陽居隂則雖九二已為過越之材陽居陽則雖九五猶不足以過物也然以位之高也僅能生華而已得其士夫而已材不足而稱其位故無咎位雖高而無其功故無譽上六過涉滅頂凶無咎此大過之姤也而爻辭云爾者夫有一言而盡本體之義者顛也有一言而盡變體之義者遇也以不足之材居至高之位而遇顛危之時任寄托之重則雖殺身以成仁舍生而取義其可已哉此所以雖凶而不可咎莊子曰事其君者不擇事而安之忠之盛也經曰安土敦乎仁故能愛故君子之行其義也唯其所遇如何爾禍福何容心哉貴其無咎而已矣夫姤之彖曰天地相遇品物咸章也剛遇中正天下大行也此遇之善也而上九則曰始其角者遇之不善也大過之姤亦角之類乎然當大過之世而遇過涉之地故為大過之遇而與本體異焉坎下坎上坎初六習坎入于坎窞凶此坎之節也而爻辭云爾者遇險者宜求出焉初六以隂居一卦之內在六位之下于變體為節節之為言止也止而不能行入而不能出以事言則不能出險而自取其禍者也以性言則不能趨上而下愚不移者也故其爻辭云爾夫艮節二卦經皆以為止而艮時行則行節則止而已故入于坎窞不取艮而取節焉節之為止與艮之時行異矣然坎之節則甚于節之本體又不特坎而已此其變體之異也夫坎言陷也坎窞則又坎之旁入者坎既陷矣而又傍入焉其能出險乎哉此其所以凶歟九二坎有險求小得此坎之比也而爻辭云爾者陷乎二隂坎之所以險然以剛居中則險未能為害也故曰有險而已唯以剛居中而不失之過故能比乎人而人亦比之比人而人比之則若出入相友守望相助疾病相扶持未可以出險亦可以處險矣故曰求小得與人親比而謂之小得者比雖人情之所不能免然君子周而不比比非大同于物其所得也不廣矣觀五家為比之名則知小而未大也唯中能處險而未能出險唯中能比人而未能大同故曰求小得未出中也九二曰求小得未出中而九五曰坎不盈中未大其義雖同而九二之辭意猶未及五以其上下體之殊也比本平居無事相與為比而此則因坎而求比也故為坎之比而與比之本體異矣詩曰將恐將懼維豫與汝其坎之比者乎六三來之坎坎險且枕入于坎窞勿用此坎之井也而爻辭云爾者經曰困乎上者必反下故受之以井傳曰綆短者不可以汲深然則井之為體已入而深矣而六三之變體適當井之中而又稍下焉下乎此則為初六之井泥故來而趨內彌入于坎矣上乎此為六四之井甃故之而趨外猶未離乎坎也止乎此而又安焉則為九二之井谷故曰險且枕入于坎窞勿用且六三過中而居非其地以隂而位過其才內則乘剛外則無應來與之皆坎也隂性善陷而又善止險且枕也隂居下卦又居一隂之下入于坎窞也然居一體之上而過乎中矣故言勿用以戒之夫井之本體至九三猶泄而不食然王明則受福坎之井則陷而又下焉故爻辭之義與其本體異矣六四樽酒簋二用缶納約自牖終無咎此坎之困也而爻辭云爾者坎亦困之類也而坎為重困為輕故坎言陽為隂所陷困言剛為柔所掩陷兼上下而掩則言上而已坎言水洊至而困言澤無水水洊至則至于害己澤無水則不能濟物而已坎言險而陷困則言窮而通焉坎之終猶言凶而困之終則言吉焉故坎之困則患難輕矣窮之終而通之始也窮之終則未免乎用儉故曰樽酒簋二用缶通之始則自晦而之明故曰納約自牖終無咎牖之在室離晦而明者也伊尹之于湯二老之于周其類此歟夫以坎之六四變困之九四既舍坎之陷而為困之掩矣又本體自隂以趨陽變體有陽而無隂故為坎之困而與困之本體異焉九五坎不盈祇既平無咎此坎之師也而爻辭云爾者坎之九五剛中而無應變為六五則剛中而應矣坎之二體行險而不順變為坤體則行險而順矣此所以為師也所謂坎不盈則行險而未出險也水未出險則祗既平而已行險所以用師也出險則兵寢矣若夫適平暴亂而未至偃武修文之治亦不至窮兵黷武之酷則祗既平而已所以無咎然自剛中變而後應自行險變而後順故為坎之師而與師之本體異焉上六係用徽纆置于叢棘三嵗不得凶此坎之渙也而爻辭云爾者夫君道尚德非阻威也孔子曰逺人不服則修文德以來之既來之則安之莊子曰民不難聚也愛之則親利之則至致其所惡則散凡德為陽威為隂若坎之上六者行險已過不用德而用威恐人民之有離心也乃阻威以制焉故云係用徽纆則言囹圄以守之也置于叢棘則言刑誅以懼之也阻威如此則已至者猶有離心而况未至者乎所以久不得民而三嵗不得凶經曰渙離也又曰物不可以終離然則坎有設險之義而渙有離散之義凡用刑獄皆設險之類恐其有離心也乃設險以制之而恃險無德終至于離故為坎之渙而與渙之本體異焉離下離上離初九履錯然敬之無咎此離之旅也而爻辭云爾者初九當離麗之世而下無承上無應且剛宜在上而反居一卦之下若君子之失其所者有旅之義焉經曰窮大者必失其居故受之以旅旅而無所容故受之以巽又曰親寡旅也其彖亦曰止而麗乎明是以小亨夫旅既失其所而親已寡矣或有下已而來比者其可恃已之材而不敬以待之乎初九以剛在下而六二以柔順之禮自上而麗之初亦以禮上承而附麗焉則錯然之禮自彼而我敬承之以免咎矣故曰履錯然敬之無咎孔子無上下之交而厄于陳蔡至衛則主顔讎由其類此乎此蓋當離麗之世而獨為親寡之旅故為離之旅而與旅之本體異矣六二黃離元吉此離之大有也而爻辭云爾者蓋離者麗也而大有者以柔中下賢之卦也六二當離麗之世有柔中之德初九以剛在其下而能屈己以下人蓋將以有之也而初九以剛上承則以賢者之材見有于上矣故變體為大有而曰黃離元吉得中道也黃言柔得中也離言麗也元言其仁也柔而吉則得賢之謂也夫大有者君以柔中下賢之卦故言大者之有賢而六五當之今乃于六二之黃離而變體為大有者大有之六五君也離之六二大臣也人君猶當以仁柔下賢而况于大臣乎然人君之所謂大有者以卦之正體言之人臣之所謂大有者以一爻之變體言之固不容無辨也且六二之于五以同德相應而為九三九四所間乃下比于初九至于三四終不能間則必與初九俱進而唯六五是麗焉所謂事君以人者也書于湯言旁求俊彥啓迪後人而于伊尹言旁招俊乂列于庶位君臣咸有一德此所以能得賢者歟是爻蓋體柔中之德下初九之賢附麗以有之而初九亦為其所有故為離之大有而與大有之本體異矣九三日昃之離不鼓缶而歌則大耋之嗟凶此離之噬嗑也而爻辭云爾者六二之于五以同德相應而九三以剛明過中之材居兩間以為之間故曰日昃之離苟不能虛以有容圓而善應安時樂天而不復為二五之間則盛極入衰而上將用刑以除間矣故曰不鼓缶而歌則大耋之嗟凶蓋陽爻言剛離體言明下體之上言已過中然猶固有其位而不知退所謂日昃之離日言陽明而昃言過中離則附麗而有所著言固有而不知退也缶言虛圓之器鼓而歌之言其能自樂也大耋言衰老之極而嗟言有受刑之憂凶言有受刑之禍也夫離言麗噬嗑言除間此爻言附麗自樂以離間君臣之際苟不改是則罹除間之刑矣故為離之噬嗑而與噬嗑之本體異焉九四突如其來如焚如死如棄如此離之賁也而爻辭云爾者賁之所謂致飾者人文之禮唯君臣為最嚴其儀為最盛其事為最悉苟有慢此者其刑亦最重致飾如此所以尊君親上為之防微而杜漸也近君之人或致乖恭敬之容失巽順之意而有陵犯之狀則有害于賁飾之文矣于是而刑之則孰敢虧君臣之義慢朝廷之禮而所謂賁飾者于是乎在夫離言君臣之相麗有賁飾之文焉九四乃以剛強之姿體炎上之性而居近君之位以剛逼柔有害于君臣之禮而六五柔不失中不可犯也于是罪所不容而退焉故曰突如其來如雖不得已而退然罪已不可赦矣故曰焚如死如棄如夫懲一以厲其餘則致飾之文無虧矣此變體所以為賁也然因離麗之際有害致飾之道而用刑以威之則復全致飾之禮故為離之賁而與賁之本體異焉六五出涕沱若戚嗟若吉此離之同人也而爻辭云爾者二五同德相應若同人之二五以中直相與也乃有九三四以剛犯上而為之間焉若所謂伏于莽而乘其墉者也至于鼓缶而歌則若伏于莽而弗興也突如其來如則若乘其墉而困也六五涕沱若戚嗟若而終吉則又若先號咷而後笑也故有同人之變體而諸爻之義如之且六五所以出涕而戚嗟者以柔乘剛也所以九四不能犯而終吉者以柔得尊位大中也然此因離麗之際有為之間而終莫能間故為離之同人而與同人之本體異矣上九王用出征有嘉折首獲匪其醜無咎此離之豐也而爻辭云爾者當離麗之世天下文明四方和會萬物盛多向乎盈成之世矣有不軌而害治者征伐其可已乎乃命方伯奉辭以伐之其事可謂大矣殱厥渠魁而脅從罔治其道可謂大矣所以禁暴戢兵保大定功安民和衆豐財者其德可謂大矣于是無害其嘉美之治而致盈成之世則所謂王假之尚大者也蓋與周頌所謂綏萬邦屢豐年者同而與道經所謂大軍之後必有凶年者異矣此變體所以為豐而曰王用出征有嘉折首獲匪其醜無咎而夫子釋之曰以正邦也蓋離之六五王德之人也上九則方伯之任也九四之突如則不軌而在所征者也至于焚如棄如則折首而獲匪其醜矣嘗譬之禾焉離者夏也苖而秀之時也豐者秋也秀而實之時也禾方苖而秀矣乃有螟螣蟊賊之害者必有以治而去之然後無以害其成而豐年可告焉上九王用出征而為離之豐者如此昔成王之時向乎盈成之世矣有管蔡之難周公出而征之然後持盈守成之治成焉其類此者乎然是爻當離麗之世有強梗之臣而出征以正之然後成豐大之盛故為離之豐而與豐之本體異矣
