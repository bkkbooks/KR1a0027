body:
  text: 易變體義卷三宋都絜撰上經三履至大有兑下乾上履初九素履往无咎此履之訟也而爻辭云爾者君子窮而在下獨善其身而未可兼善若素之未受采也然君子之所是小人以為非君子之所行小人莫不忌况其窮而在下人莫我知強者面折之于前弱者背毁之于後或排之于鄉黨或擯之于朝廷羣起而攻之若聚訟然履之初九其義如此故變體為訟而曰素履徃无咎蓋以衆人攻之所以有咎而君子無慊焉則咎可免也孔子再逐于魯削跡于衛伐木于宋叔孫之徒毁之于朝荷蓧之徒譏之于野訟以衆起而親交益疎其類此爻之變體也歟然有孚而見窒于人于是乎有訟今以素履獨善人乃以為非是而攻之故為履之訟而與其本體異焉夫訟之履者以訟而明已之所履履之訟者以履而致人之所訟皆直在我曲在彼莫匪君子之道也九二履道坦坦幽人貞吉此履之无妄也而爻辭云爾者孔子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎㢤夫君子所以能坦蕩蕩者以其言行如此其不妄也小人反是六二之所履剛不過中盡此道者也故變體為无妄而有履道坦坦之辭然以陽居隂幽人之事幽人能體剛中而以是為正則守靜知常无妄作之凶矣故繼以幽人貞吉之辭夫子于是釋之以中不自亂者亦言其剛不過中而已然无妄本體言心之利而是爻則言履之剛中故為履之无妄而與本體異焉六三眇能視跛能履履虎尾咥人凶武人為于大君此履之乾也而爻辭云爾者六三體柔居剛已過乎中又居乎五剛之間以是而為履者也體柔則眇且跛之象居剛則視且履之象以柔過中又間乎五剛以居則履虎尾而咥人凶之象然位剛過中又處上下五剛之間則其志己剛而柔與之俱化矣于是變體為乾而為天下之至健焉夫乾天道也其事則為武其位則為君故有武人為于大君之辭焉武事剛矣而武人則用武之人而剛莫甚焉君道剛矣而大君則天下之君而剛為至焉然六三臣位主武人以言之故夫子釋之以志剛也雖然履以柔為宜而乾以剛為正九三終日乾乾健而不息則正所謂乾也六三以柔履剛而終于武人為于大君則是履之乾而已九四履虎尾愬愬終吉此履之中孚也而爻辭云爾者夫履言渉世之患而四為多懼之地且九五居一卦之尊其剛不可犯若虎之善咥也四乃以剛居柔由其後以進則履虎尾之象也然處多懼之地而有能懼之心則雖危无咎志行而吉矣故言履虎尾而繼之以愬愬終吉夫喜有彊勉者雖親不和怒有彊勉者雖嚴不威哭有彊勉者雖悲不哀則喜怒哀未必誠也以至作好作惡亦有出于彊勉則愛惡欲亦未必誠也唯懼非偽為遇難而生焉由驚而怖由怖而畏發于其心而見于其貌未有不出于誠而无或以偽為者此變體之所以為中孚而有愬愬終吉之辭也雖然人之生也其精甚真其中有信君子修胷中之誠則上足以應天下足以化邦㣲足以及豚魚无所徃而不孚也是爻則因履虎尾之危能至誠而戒懼故為履之中孚而已蓋與其本體異矣九五夬履貞厲此履之睽也而爻辭云爾者經曰剛柔者立本者也變通者趣時者也故剛健中正君道之所以立本而濟之以柔則君道之所以變而通之也是卦之彖言剛中正履帝位而不疚光明也者彖言才故明君道之所以立本然爻言夬履貞厲位正當也者爻言變故明君道之不可以不通其變也蓋以剛居剛而承乗亦剛以是而臨下則柔克有所不足將不能和輯其心而有乖離之志矣故變體為睽而曰夬履貞厲夬者五剛一柔之謂也貞厲者以剛為正而不濟以柔則厲也蓋履之為道以柔為宜故以柔履剛然後无處尾之危今乃以剛居剛此其所以厲也夫夬與履皆五剛一柔然柔乗五剛之上決之不可已也履則一柔居下卦而五以重剛乗之是為已甚故變睽而言厲焉且睽之成卦言天地人物之睽而六五與二為應為三所間則正所謂睽是爻則言履當以柔而乃用剛以此致睽則危道也故為履之睽而與睽之本體異焉上九視履考祥其旋元吉此履之兑也而爻辭云爾者兑之為言説也蓋失之則悲而得之則喜者情之在我者也此有喜而彼慶之者情之在人者也在卦之終考祥而吉則得志而喜矣居卦之上吉而有慶則人亦樂其樂矣故上九變體為兑有其旋元吉之辭而夫子以大有慶釋之其旋元吉者以陽居上之謂也大有慶者與三有應之謂也吉而有應此兑之義也然兑體之義或言自悦或言悦人或言悦于人是爻則因視履而吉吉而有慶故為履之兑而與其本體異焉夫履兼乾兑然後成卦六三武人為于大君夫子釋之以志剛則具乾剛之義而已无兑説之義也故全體為乾上九視履考祥其旋元吉夫子釋之以有慶則具兑之義而已无乾剛之義也故全體為兑乾下坤上泰初九㧞茅茹以其彚征吉此泰之升也而爻辭云爾者升之初六與上合志則所謂允升大吉者在我而已泰之下體與上卦有應當君子道長之時初九乃與三陽俱應乎上則同升者衆矣是泰之升也豈特允升大吉而已㦲故曰拔茅茹繼之以其彚征而夫子釋之曰志在外也九二包荒用馮河不遐遺朋亡得尚于中行此泰之明夷也而爻辭云爾者夫用晦而明者君子莅衆之道而明夷之所貴者也泰之時君子道長而以其類進者衆矣小人莫得而預焉或不及或太過或逺乎已或比乎已无所分别一視而同焉然其質不齊所遇不等而所以為君子之道者則一是其所以用晦者未嘗不明也此其所以為泰之明夷而與明夷之本體異矣九三无平不陂无徃不復艱貞无咎勿恤其孚于食有福此泰之臨也而爻辭云爾者夫乾下而坤上者泰之成卦故曰天地交泰而以上下交為義坤上而兑下者臨之成卦故曰澤上有地臨而以上臨下為義泰雖以上下交為義而過中則必辨若天之際地而平雨之所以施也然未嘗不終于陂若地之際天而徃雲之所以行也然未嘗不終于復君子之臣其君也知天地之交際无平不陂无徃不復故艱不敢易正不敢僣而上下之分于是乎辨上下辨分則以上臨下之義行焉是始于泰之交而終于臨之辨也蓋與臨之本體異矣六四翩翩不富以其鄰不戒以孚此泰之大壯也而爻辭云爾者大臣雖旁招俊乂列于庶位其勢猶未壯也能與羣賢同比乎上然後上下相信而勢莫盛焉泰之六四雖若翩翩然下比乎三陽然方其未與之同比乎上則勢未壯也故曰翩翩不富至于相與比乎上而上下見信然後其勢盛強而小人不得以間之故曰以其鄰不戒以孚而變為大壯之體焉夫三陽而為泰四陽而為大壯此爻之義因得羣賢而同心比上以致君子之盛所以為泰之大壯而與大壯之本體異矣且卦為大壯則既壯矣自泰三陽變而為四則為壯之始焉所謂泰之壯者如此六五帝乙歸妹以祉元吉此泰之需也而爻辭云爾者夫天保下下之詩也而曰何福不除故六五有帝乙歸妹之象而曰以祉元吉甫刑之書曰一人有慶兆民頼之故六五以祉元吉而變體為需需言人君有養人之道若酒之能養陽食之能養隂天下之所需也人君既受帝祉而敕賜庶民則天下之所需若雲上于天而人需其雨然此泰之六五所以變而為需也然德位中正冇養人之道而天下需之者需之正體也至于以柔下賢而受祉既受帝祉而兆民頼之則所謂泰之需者如此上六城復于隍勿用師自邑告命貞吝此泰之大畜也而爻辭云爾者夫人君之待臣下或用柔德已甚則忘分太過而御失其道故有城復于隍之象自邑告命之辭焉苟以此為正而不改則吝矣若夫反是以改之而濟之以剛德則因君子道長羣賢並進之時而用剛德以畜之則其所畜亦大矣此變體之所以為大畜歟坤下乾上否初六㧞茅茹以其彚貞吉亨此否之无妄也而爻辭云爾者夫君子之道固无妄矣然于時于義當處而出是亦妄也故否之初六㧞茅類處乃有无妄之義焉然則六二包承小人吉大人否亨而不以類處為正者何也蓋若初六者君子之道未可與權者也當否之時可處而已若六二者大人之道其道則可與權而其才則足以亨否當否之時不處可也此二爻之所以異歟六二包承小人吉大人否亨此否之訟也而爻辭云爾者夫上剛而下險則訟有孚而見窒則訟訟則利見大人蓋訟之本體也何所待㦲若夫君子而當小人道長之時欲與之訟也其可遽乎方勢之未可也必包以容之而未可訟之也必屈以承之而未可勝之也至于道足以格君心之非而勢足以有行然後辭而闢之辨而明之向也包承以和之今乃違行以正之則小人退而君子進矣是能以大人之道而亨天下之否者也所謂否之訟者如此六三包羞此否之遯也而爻辭云爾者夫六三以柔不中正之才當小人道長之世而居坤體之上所謂邦无道而富且貴焉者也此其所以有包羞之辭也夫謂之包羞則能知耻矣欲反是而從君子之道則當如之何或餓而顯或禄而隠儉德避難而遯世无悶則非富且貴焉者矣此六三之包羞變體之所以為遯歟雖然一隂未生而知險者聖人也二隂既長而後遯者賢人也二隂而為遯三隂而為否今也否而後遯則後時而縮矣故其初也不免乎包羞至于知耻而改過則終能遯矣故變體為遯焉夫否之六三變為遯之九三而曰係遯有疾厲蓋係者不能去之謂遯者終能隠之謂係而後遯則與包羞而後變同矣故有疾厲而未必然也然則若六三者本體之義為小人而變體之義為君子去就趣舍之間可不慎歟九四有命无咎疇離祉此否之觀也而爻辭云爾者方否之初君子引類而窮處故曰㧞茅貞吉其既亨則惠疇而受福焉故曰有命无咎疇離祉然君子遇否而類處也雖浩然有去志而惓惓不忘其君者庶㡬改之爾及夫大臣承君命以惠疇則于是觀國之光焉此變體之所以為觀也然觀之觀光者六四而已否之疇離祉則羣賢于是乎並進且否之九四固嘗否矣有命无咎然後疇離祉而來游以觀光焉此其所以為否之觀與觀之本體異矣九五休否大人吉其亡其亡繫于苞桑此否之晉也而爻辭云爾者夫天保之詩曰如日之升言有升而无降也否至九五則休否而復泰泰則安存以治矣然必存而不忘亡然後常存而不亡若繫于苞桑其固不可㧞焉常存而不亡則如日之升而有進無退矣此變體之所以為晉也然其所以異于晉之本體者已否而泰泰而不忘否㡬亡而存存而不忘亡然後至于有進而无退爾所謂否之晉者如此上九傾否先否後喜此否之萃也而爻辭云爾者夫否則上下不交而天下无邦于是萬民離散不安其居至傾否而後泰則羣賢復進上下交而其志同矣于是君臣合志而圖勞來還定安集之政焉周宣承厲王之後蓋體是道若鴻雁之詩是已此否之上九所以變而為萃也雖然此否之終也故傾否而萃是萃之始爾與其本體異矣離下乾上同人初九同人于門无咎此同人之遯也而爻辭云爾者夫同人之義柔得位得中而應乎乾而遯之義則遯世无悶二卦之義若不相似也然當衆人尚同之際已乃同人于門而已其不立異以絶物則有同人之義然于門而已則與二五三四異矣故有遯之義此則即同而能遯故為同人之遯焉老氏曰衆人熈熈如享大牢如登春臺我獨泊兮其未兆若嬰兒之未孩蓋與此同意且體本陽也而六二居前故曰同人于門變為隂爻而居下卦之内故于卦為遯所謂同人之遯者以此六二同人于宗吝此同人之乾也而爻辭云爾者夫六二柔而正也九五剛而正也剛柔皆正而又為正應故有同人于宗之義宗非母族非妻族也在三族之中為父之黨而乾有父道故為同人之乾然乾之全體則有父道得其一爻而剛正在上則僅能為宗而六二之所同則所謂善内親而為睦者也故有同人之乾之義焉九三伏戎于莽升其髙陵三嵗不興此同人之无妄也而爻辭云爾者夫无妄之世貞信是宜而不貞不信則无從而助之者故其卦曰无妄元亨利貞其匪正有眚不利有攸徃謂當九妄之世正而後亨其有妄而匪正者有眚而不可以有行也同人之二五以正應而同者也三五以非正應間之而三獨无反則之吉則是于无妄之世以匪正有眚而天命不祐不可以有行者也故其變體之義如此九四乗其墉弗克攻吉此同人之家人也而爻辭云爾者同人之九四攻二與五不中不直則德不勝爭非其應則義不勝與三不同心則力不勝遽乗其墉以攻之乃弗克而又至于困則其傷實多矣傷于外者必反于家此其變體之所以為家人而夫子有困而反則之辭焉夫已无同人之道而以力強人之同至于弗克而困然後反于家是于同人之卦變而為家人者爾與其本體異矣九五同人先號咷而後笑大師克相遇此同人之離也而爻辭云爾者夫離之為言麗也與人同而交相親焉固有麗之義矣然不有間也安知合之為善不有散也安知萃之為樂故六二之于九五言其德則同乎中直言其位則同乎正應始為三四所隔而不相遇故有號咷之義至于同心以克三四而後相遇則有後笑之喜焉則是先間而後合先散而後萃失其附麗之意而終得之者也其為麗也乃人情之所尤喜蓋與常麗而不相逺者有間矣此其變體之所以為離也夫二五皆相遇而得其所同者也然離麗之義獨歸于五者何㦲蓋爻自下起六二之時猶有三四為之間焉至九五之地則三已久而不興四已不克而反矣且六二以柔中居下非得九五剛健中正居乾之尊位則豈能保其相遇㦲此離麗之情雖二五之所同而離麗之功乃九五之所獨也夫彖言離之一體故取其文之義而已至九五之變體則上下皆離故取麗之義蓋兩相麗而後為麗之至焉上九同人于郊无悔此同人之革也而爻辭云爾者夫革冇改義又以去故為義同人而革者何也以衆言之則衆有故而合我獨无故而合以已言之則向也開其兑而濟其事今也解其紛而同其塵于是相與于无相與相為于无相為而逺于有事矣故有于郊之象而為同人之革焉其言郊者逺于有事之地也乾下離上大有初九无交害匪咎艱則无咎此大有之鼎也而爻辭云爾者夫大有乃尚賢之卦而初九有賢人之才然在下无應則以无上下之交為害雖咎不在我而不可以輕進必舉之有其人然後可起也必待之以其道然後可用也故有艱則无咎之辭而變體為鼎焉蓋鼎重噐也人材之象也鉉能貫其耳而舉之然後以木巽火而致亨飪之用焉五之所謂金鉉上之所謂玉鉉者言舉之有其人然後可起也木以象仁火以象禮彖之所謂以木巽火者以象仁且有禮蓋必待之以其道然後可用也其言艱則无咎而為大有之鼎者蓋以此歟九二大車以載有攸往无咎此大有之離也而爻辭云爾者夫大有者仁君以柔中而下賢賢臣以剛中而承上之時而能盡是道者其二五乎九二剛中之材可以承上而上實任之以行故言大車以載蓋言所載者君而載之者臣也賢臣有能載之材而其君任之則自上而麗下矣必徃而應之乃為自下而麗上上下交相麗則能盡離之義矣此變體之所以為離也然必君以柔中自上而麗下然後臣以剛中自下而麗上與夫離之本體主言一柔麗乎兩剛者異矣所謂大有之離者如此九三公用亨于天子小人弗克此大有之睽也而爻辭云爾者夫人君以柔中之徳下賢而其臣乃以剛健之才承上至于其君任之而其道大亨則諸侯之盛者也必有君子之才至公之徳以稱之然後盡臣道而无君弱臣強之患苟以小人之材居君子之位无公之道居公之職而享于天子如此則君弱臣強不和而乖矣乖必有難害孰甚焉然九三雖剛過中而未失正也故曰公用亨于天子小人弗克夫公用亨于天子者大有之盛也而小人弗克則君臣不和而睽之所由生也故序卦謂睽為乖而此為大有之睽焉九四匪其彭无咎此大有之大畜也而爻辭云爾者夫資諸已者可謂才矣而資諸人者是亦才也而况君之于臣豈无所頼其助乎大有之六五人君以柔下賢者也而有剛健過中之諸侯若九三者焉九四介乎三五之間苟貳其君以附下則三益強而五益弱將不得有之而况畜之乎唯一其志以承上則上有禦侮之助而下无䟦扈之勢又將有同寅之恭焉于是五有止健之才而三有受畜之理者九四匪其彭之力爾是爻之變體所以為大畜歟然則九三者諸侯之象而九四者相臣之象也六五厥孚交如威如吉此大有之乾也而爻辭云爾者夫以柔徳交孚于下者大有之義而濟以威如者乾之義五之所以言威者柔得尊位大中也九四承之九二應之而九三不敢慢之也威如所以有乾之義者自域中言之威莫嚴于天而不可不畏所謂畏天之威是已自朝廷言之威莫大于君而不可不欽所謂天威不違顔咫尺者是已乾為天矣而又為君此威如之義歟夫彖言乾之一體則處剛健之才爾六五之變體則上下皆乾故取威如之義蓋健未必威也若天行之健焉若威則不止乎健所謂雷霆之威是已上九自天祐之吉无不利此大有之大壯也而爻辭云爾者夫大有之君柔得尊位大中其德剛健而文明其勢可以壯矣九四承之九二應之九三不慢而亦事之則已至矣又能履信思順而獲天人之助焉則其為壯也不亦大乎且一陽為復二陽為臨至四陽而後為大壯蓋兼言上下之君子也此主言君道故為大有之大壯焉
