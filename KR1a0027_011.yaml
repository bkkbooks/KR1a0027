body:
  text: 易變體義卷十一宋都潔撰下經五漸至兑艮下巽上漸初六鴻漸于干小子厲有言無咎此漸之家人也而爻辭云爾者賢人之隱處也家居而已得時而進然後起于家焉此進之始也猶之鴻為水族水其家也漸而至于干則方自水而起亦漸之始也而猶賢者之起于家也故漸之初六變體為家人而曰鴻漸于干夫君子之出處蓋有義矣小人莫之知也見忌而欲危之于是見誣而興謗焉然禮義不愆不辨而自明故曰小子厲有言無咎然此非隱而家居者也進而起家者也故為漸之家人而與家人之本體異焉漸主君臣言之家人主父子言之然家人之漸者齊家當有其漸也漸之家人者漸進或起乎家也六二鴻漸于磐飲食衎衎吉此漸之巽也而爻辭云爾者巽之為道柔而善八順以行權故其進也漸而不暴不違乎中正之道乃能安寧無難易以樂焉六二柔順中正而上應乎九五之象也故有鴻漸于磐飲食衎衎吉之辭蓋磐言石之安而平者此言位也飲食言祿也衎衎言樂也所以能衎衎者以其有中正之德而不素飽此孟子所謂其君用之則安富尊榮子弟從之則孝弟忠信不素餐兮孰大于是也夫鴻漸于干以至于陸于陵皆漸而不暴也此猶有巽之義者蓋自干至磐相去未逺非若陸之髙以平陵之髙以大也故特取巽之體焉然巽之本體言伏言入言行權而已是爻則于漸之進言有巽之道故為漸之巽而與㢲之本體異矣且漸兼艮㢲然後成卦六二方進而用㢲猶未可止也故全巽體而艮不預焉九五進極而當止無所用㢲矣故全艮體而㢲不預焉九三鴻漸于陸夫征不復婦孕不育凶利禦寇此漸之觀也而爻辭云爾者觀之為言此示于上而彼觀乎下也觀臺之勢髙矣物皆往焉大觀之位髙矣民咸觀焉故漸而至下卦之上居過中之位則于變體為觀而曰鴻漸于陸陸者地之髙平者也髙平曰陸其若所謂觀臺者歟亦若所謂大觀在上者歟然大觀者君道也而漸則臣道也漸進以居下卦之上非若九五居一卦之尊也故為漸之觀而與觀之本體異焉雖然剛已過中矣又征而不己則知往而不知反故曰夫征不復如是則非易從而有功者也故曰婦孕不育是道也剛過中而不止唯用以禦寇則利故曰利用禦寇然則觀臺出于人為而陸未離乎地觀漸之三亦臣道爾而觀為二陽四隂之卦其義蓋相類矣故直若九三而止過是則若夫征不復而婦孕不育雖利用禦寇亦不可以為常也六四鴻漸于木或得其桷無咎此漸之遁也而爻辭云爾者遁有去小人而不為所汙就君子而與之同處之意蓋六四自下以進至于髙位然九三剛不中正若權臣然今六四乃以君子至正之德而進居其上則非其所矣故曰鴻漸于木木非鴻之所宜居也桷則在木之上中宫室之才而九五剛健中正有大臣之德則似之六四捨九三剛不中正之資而就九五剛健中正之才則所謂或得其桷者也此去小人而就君子之象也故變體為遁而其辭如此然遁之本體退以逺小人而已是爻進以得位乃避小人而就君子故為漸之遁而與其本體異焉且遁言退漸言進遁之漸則言雖退而無異于進也此所謂不為窮約趨俗漸之遁則言雖進而必有所避也此所謂不為軒冕肆志九五鴻漸于陵婦三嵗不孕終莫之勝吉此漸之艮也而爻辭云爾者艮之為言止也而時行則行所謂鴻漸于陵者髙平曰陸大陸曰阜大阜曰陵人臣之得位至于髙而且大則勢可止矣亦義不可不止所謂婦三嵗不孕者在我之居位已極既止于此矣助我而為人所間者猶止于彼也欲為我助而久天助我之實以其止于彼而己蓋五以剛健中正居乎上而六二以柔順中正應之九三乃以剛過不中非其應而為之間則德義不勝矣又以一爻而為二爻之間則力亦不勝焉故終莫之勝而二爻各得所願二得所願以上應乎五五得所願以下應乎二則又若艮之時止而時行也故曰終莫之勝吉得所願也老子曰知止不殆莊子曰唯止能止衆止艮之義主于止而是爻則主言進已極而知止故為漸之艮而與艮之本體異焉且艮之漸者先止而後漸故艮其輔而後言有序蓋言之不可易也漸之艮者先進而後止故自漸于干以至于陵而極矣蓋進之不可過也上九鴻漸于陸其羽可用為儀吉此漸之蹇也而爻辭云爾者經曰蹇難也險在前也見險而能止知矣哉夫漸至于陸則髙而平至于陵則髙而大人臣而髙且大則已逼矣不退而復就髙平之地則上之所疑下之所嫉非知止不殆者也難孰甚焉故九三言于陸九五言于陵上九乃復于陸而變體為蹇知此則進退可度矣故曰其羽可用為儀吉吉言保其所得而無罹失位之難也古之賢臣皆然而見于經史伊尹之告歸吕望之就國是也後之體道而知退者張良似之王陵之退則非其本心也何羽儀之有至霍光之不退則終罹其難矣可不戒哉夫蹇之本體有險難之實矣是爻則言髙且大而不退則有難焉爾且蹇之漸言有難之時能體漸之義漸之蹇則言進而不退則罹蹇之難也兑下震上歸妹初九歸妹以娣跛能履征吉此歸妹之解也而爻辭云爾者屯者解之始解者屯之終蓋同姓之女適于異姓之諸侯其性本同也所適皆侯國也乃不為嫡而為娣娣不得行嫡之事若命之屯者然能安分之常行娣之事以承其嫡嫡亦遇之以禮而各得其志焉則不足以為屯而有解之義故變體為解而曰歸妹以娣以恆也跛能履吉相承也蓋初九在六位之下不得承九四之正應而上承近已之九二則初猶娣也二猶娣而四猶夫也跛者言不得行嫡之事跛而能履言能行娣之事而已蓋其位卑而無應故跛其材剛而承二故履焉夫解言天下之屯至是而解是爻則于所歸之娣有解之義故為歸妹之解而與其本體異焉九二眇能視利幽人之貞此歸妹之震也而爻辭云爾者陽為眀隂為妹震一陽而二隂則眀有所不足少陽用事未至于離之文明則眀亦有所未至故有眇能視之辭所謂眇能視者嫡之為道以眀內為職而娣不預焉僅可眀其娣之事則眀有所不足矣蓋與初爻所謂跛能履同義初在下故言履履動乎下以跡言也二在中故言視視由中出以事言也是卦上體皆言嫡而下體皆言娣初言娣而此不言則䝉上所言從可知矣此初爻所以言初九歸妹以娣跛能履征吉而繼之以九二眇能視利幽人之貞也夫九二以陽居隂故有眇而不全之象柔不失中故雖眇而能視眇而能視則眀不足矣而幽人之道欲晦其明以為常故曰利幽人之貞夫震有動義陽自下起以歸妹之震非震本體故所言如此六三歸妹以須反歸以娣此歸妹之大壯也而爻辭云爾者經曰雷在天上大壯君子以非禮弗履六三在下體是亦娣也而在下體之上有過中之資居不正之地而無正應之主乃以娣之職而欲為嫡之事非所求而求焉非所待而待焉故曰歸妹以須是其為志雖壯而于禮為僭矣然以柔承四而未離下體以柔承四則以娣而承嫡矣未離下體則復娣之常而不敢僣焉故曰反歸以娣此蓋得乎大壯君子非禮弗履之義故變體為大壯而辭意如此然大壯之本體在天道則主言四陽之並興在人道則主言君子足以勝小人是爻則言六三以過中之資有上僣之志終能復其常安其分故為歸妹之大壯而與其本體異焉九四歸妹愆期遲歸有時此歸妹之臨也而爻辭云爾者經曰臨觀之義或與或求蓋婚姻之禮始也彼請而後許之故有問名之禮焉終也彼迎之而後送之故復有納婦之禮焉是皆求而後與然後有夫婦有相臨之義也所謂歸妹愆期者固已求而許之矣特愆其親迎之期爾必遲其所歸之時然後從而與之故曰遲歸有時而夫子釋之曰愆期之志有待而行也是皆待其求而後與之義此變體之所為臨歟蓋四隂也妹之象也九陽也歸妹者之象也與初為應而無剛柔相濟之義則愆期之象也所以猶有待者蓋有長男少女之義焉然臨之本體主言君民上下相臨而是爻則主言男女之相臨有或與或求之義故為歸妹之臨而與臨之本體異焉六五帝乙歸妹其君之袂不如其娣之袂良用幾望吉此歸妹之兑也而爻辭云爾者兑之為言說也猶澤之說萬物也同姓之國而為娣以事其嫡不有以說之其能無怨乎嫡以厚德待其娣乃薄于已而厚于娣焉此娣之所以說也故曰帝乙歸妹其君之袂不如其娣之袂良蓋娣之袂視嫡為甚善則薄于已厚于彼而彼悅矣娣以心悅承其嫡嫡以德厚待其娣則盛而不亢有宜家之慶而上下無不悅焉故曰月幾望吉夫娣已悅矣而又上下莫不悅焉此變體之所以為悅也蓋六五居一卦之尊天子之象也亦象天子之女下嫁于諸侯則有小君之位矣五下應于二帝乙歸妹也五在上而居之以隂四在下而處之以陽其象則君之袂不如娣之良也一卦之尊而以柔處之則盛而不亢矣此又月幾望之象也然兑之本體以悅萬物為主又以悅民為事是爻乃言嫡娣之相悅而家人之上下莫不悅故為歸妹之兑而與兑之本體異矣夫婦妹之卦兼震兑而後成九二娣也主言動以事其嫡而悅未足稱也故全體為震焉六五嫡也主言厚以悅其娣而動不足道也故全體為悅焉上六女承筐無實士刲羊無血無攸利此歸妹之睽也而爻辭云爾者經曰暌火動而上澤動而下二女同居其志不同行又曰睽者乖也蓋睽以異而不同乖而不和為義夫婦宜同且和也否則暌焉苟無夫道之智而婦無以資之則睽矣故曰女承筐無實苟失婦道之順而夫不能御之亦睽矣故曰士刲羊無血夫婦胥失則無以宜其家矣故無攸利蓋未娶謂之士未嫁謂之女不言夫而言士不言婦而言女則以眀其失夫婦之道也筐宜有物也承之而無實則言夫之不智而無以為婦之所資也羊物之狠者而血言隂之傷則狠而不可勝矣此言婦之不順而夫不能御之也無攸利則言夫婦不和而無以宜其家也蓋上六之于六三夫婦之象也六三陽位則夫也乃以隂虛居下則婦無以資之之象也上六隂位則婦也乃以隂狠居上則夫不能御之之象也兩爻本正應而無剛柔相濟之義則不能宜其家之象也是皆睽之義也然睽之本體言天地萬物之睽而是爻所以言夫婦之睽而已故為歸妹之睽而與其本體異焉且睽之歸妹則始于疑次以怨既而疑釋怨和終于親焉故始曰睽孤終曰婚媾歸妹之睽則本于夫之帥婦之從乃婦無以資其夫夫不不能御其婦終于乖焉故卦為歸妹而士女皆無攸利離下震上豐初九遇其配主雖旬無咎往有尚此豐之小過也而爻辭云爾者夫王業尚大必君臣相與而後可以有為蓋君以禮而來章臣以道而遇主者豐之時也然初九之所應者九四則所遇者同德合志剛動之主也同德合志則才與之均而未有咎且必往而得尚焉然以剛自任則吾之才雖眀可與均而不可過也故以小過為戒小過者人臣過越而有為也而其六二則曰不及其君臣不可過蓋臣宜不及其君而過之則不可臣不及其君可矣與之均亦無咎自均以上則過之矣故變體為小過而曰遇其配主雖旬無咎往有尚而夫子釋之曰雖旬無咎過旬災也旬之為言其義為均才與之均則非不及其君也宜若有咎然君臣同德合志則雖與之均而無咎矣其以剛自任則不可過之爾小過猶不可而况大過之乎所謂過句則小過之而已夫小過言小者過越而有為也豐則王者尚大之時王者尚大而君臣相遇則小之過大尤非所宜矣故為豐之小過而與其本體異焉六二豐其蔀日中見斗往得疑疾有孚發若吉此豐之大壯也而爻辭云爾者豐本眀盛之時而言豐其蔀者居位之隂也然以中正之德遇眀盛之世則才足以正時矣故曰日中見斗六五來章之主而二言往得疑疾者非應之正也然以中正之德應來章以得君則勢之盛也孰禦焉此變體之所以為大壯歟豐其蔀者豐大也蔀者蔽覆光眀之物也日中者言眀盛之世也斗者幽而能正時也疑疾言未能自信也有孚發若言誠足以達乎上也然大壯本體主言四陽之並興而是爻則言才足以正時而誠足以得君故為豐之大壯而與大壯之本體異焉九三豐其沛日中見沫折其右肱無咎此豐之震也而爻辭云爾者震之三畫一陽而二隂陽不足而隂有餘陽在下而隂在上以陽不足故言沛而不言澤沛者澤之困乎水者也以隂有餘故日中而見沫沫者晦而不眀也易之六爻上為右而下為左故眀夷入于左腹言六四之比九三焉震二隂在上弱而不强以上下言之于體為右故曰折其右肱豐之成卦本為光眀盛大而六三乃如此者爻言乎其變也又變體為震而未至乎離之文眀故爻辭如此蓋若動而未眀非所謂雷電皆至也屯之彖所謂剛柔始交而難生者亦與此同義且震之所以動者初九也至六三之爻則有隂盛之義焉爾自九三之爻言之陽者能澤物之象也過中則大之象也承乘皆莫我比則無上下之交而澤物之用不足之象也故曰豐其沛主上六之隂晦則所主不眀而隂晦之象也雖當眀盛之時而不免乎晦故曰日中見沫所主不眀則雖有强力之才終不見用之象也故曰折其右肱然有其才而人莫我知則非其罪也故曰無咎夫震本動也在豐則欲動而眀是爻全為震體則動而未眀之象故為豐之震而與震之本體異焉震之六三變而為豐爻辭乃戒其過中蓋取日中則昃與時消息之義焉以一陽二隂而震之卦已具故也豐之九三變而為震爻辭乃言其不及蓋取動而未眀敷𣪚而未蕃鮮之義焉以方具震體而豐之卦未備故也各觀其爻辭之義則可見矣九四豐其蔀日中見斗遇其夷主吉此豐之明夷也而爻辭云爾者眀盛之時尚大之世也而以陽居隂則幽暗之地也當眀盛之時有昭眀之德而其所居則蔽而不通所遇則幽而不眀所以變體為眀夷也然有正時之才處近君之地而遇至德之主有來章之德則又若所謂獲眀夷之心于出門庭也故曰豐其蔀日中見斗遇其夷主吉蓋九四所居雖幽而其材則剛以動有能正時之象也六五柔中而得尊位以柔下賢而九四比之則遇至德之君之象也經曰易簡之善配至德蓋所謂夷主者如此夫眀夷本體蓋遇昏暗之世而君子于是晦其眀乃取眀入地中為象豐乃日中而照天下光眀盛大之時而若九四者乃以位不當而有幽晦之象故為豐之眀夷而與其本體異焉且眀夷之豐者舍幽暗之主而歸眀盛之國所謂入于左腹也然而非無眀夷也故言于出門庭以原其始焉豐之眀夷者遇眀盛之時而居幽暗之地所謂日中見斗也然而無害于豐也故言遇其夷主以要其終焉六五來章有慶譽吉此豐之革也而爻辭云爾者夫離形頓革乃謂之變蓋革言變之始變言革之終故革至九五然後言虎變上六然後言豹變人君居眀盛之時成尚大之業于是以剛健中正之德正君臣上下之分乃其所也然盈矣而不可不持成矣而不可以不守持盈守成則必以謙沖下下然後足以來章美之才以保其慶而永其譽焉此所謂變而通之者也故六五變體為革而有來章慶譽之辭蓋六五當豐之盛而以仁柔居之乃下應乎二而比乎四則下賢以來之之象也六二以同德應之九四以剛德成之則章美之才來遊來歌矣至于六居五位之尊而無悔咎之辭則有慶譽而吉可知矣然革之本體以去故為義而是爻則當豐大之時能變通而不窮故為豐之革而與革之本體異焉且革之豐者因通其變而成眀盛之世若曰變而通之以盡利也豐之革者欲持其盈而盡變通之宜若曰窮則變變則通通則久也然則所謂變通者其王業之所成始而成終者歟上六豐其屋蔀其家窺其户闃其無人三嵗不覿凶此豐之離也而爻辭云爾者離外眀而內晦故曰豐其屋蔀其家離外實而內虛故曰窺其户闃其無人三嵗不覿凶豐其屋者髙大而見乎外也此象位之上言不能謙以下賢也蔀其家者幽昏而處乎隂也此象爻之隂言不能明以知賢也無下賢之禮知賢之智則賢者相與全身逺害自藏于畎畝而不仕無與共保其國矣故曰三嵗不覿凶蓋六五以柔居中故來章而有慶譽上六反乎是故其象其辭如此夫離火也故外眀而內晦離麗也故外實而內虛今乃處光眀盛大之極不能知賢而下之以相與持盈而守成則有晦且虛之義故為豐之離而與離之本體異焉夫豐之為卦兼震與離六三有動義而眀未至也故全體為震上六無動義有離之義而已故全體為離艮下離上旅初六旅瑣瑣斯其所取災此旅之離也而爻辭云爾者離之為言麗也初六變體為離言麗乎下而不移若所謂居下流者也凡以其志卑而不趨乎髙其志小而不趨乎大故九四雖為剛柔之正應而不能上比則九四亦處乎上而莫肯下從此小人之親寡而自取之者也故曰旅瑣瑣斯其所取災瑣言小瑣瑣者小之至也災言九四莫之應也斯其所取災者以初自絶于九四故九四莫之應以自取其失所之災為旅之離而與離之本體異焉且離之旅者于離麗之世而無承無應為君子之旅旅之離者于旅寓之際而趨卑執下為小人之麗然君子之道宜不終于寡助故有履錯然之辭者六二自上而來交際以禮也小人之道必終于失所故有志窮之辭言九四旅于處終莫之應也六二旅即次懷其資得童僕貞此旅之鼎也而爻辭云爾者鼎有取新之義以象人材之美也君子之才足以利物苟旅而失所則止而未進雖有利物之才亦藏器于身而已藏器之道謙而無所與順而有所屬則終無尤矣故言旅即次者止而未進也懷其資者才足以利物而藏器于身也得童僕貞者童言未有與僕言有所屬也蓋六二隂而無應旅居而未安之象故曰旅即次中正則有德而利物之象居隂則藏器而未用之象故曰懷其資介乎初六九三之間不以剛健與下而柔順以承上故曰得童僕貞夫鼎以用才為義故象亨飪之用而幽至于享上帝眀足以養聖賢是爻則即次以懷資而其才未可用也故為旅之鼎而與其本體異焉且鼎之旅言君子之可用旅之鼎言君子之失所各以本體為主也九三旅焚其次喪其童僕貞厲此旅之晉也而爻辭云爾者晉之為言進也進而當其義則所謂柔進而上行苟非其事則所謂進必有所傷乃若不以柔進而剛過中則又若所謂晉其角者矣夫旅柔得中而後亨九三無柔中之道而剛過以自處則傷之者至矣故曰旅焚其次此蓋與進必有所傷同義焉旅順乎剛而後亨九三乃不以卑順承上而反以剛過與下則身必危矣故曰喪其童僕貞厲此蓋與晉其角同義焉夫當可進之時盡能進之義則自昭眀德順而麗乎大眀可也此晉之六二所以衆允悔亡也旅非可進之時九三又無可進之義于是而妄作則非晉之進也是旅之進而已故與其本體異焉且晉之旅者言當晉之時而有能進之道則雖旅可亨也故曰衆允悔亡旅之晉者言當羇旅之時而違可進之義則其進必傷矣故曰旅焚其次九四旅于處得其資斧我心不快此旅之艮也而爻辭云爾者艮之才本乎止而時行則行所謂旅于處未得位也者以未得位故止其所處而未出也所謂得其資斧心未快也者有其德矣有其才矣欲行其志而未可也蓋九四所居隂也故旅處而未出其才陽也故剛動而欲進然以陽居隂故未得行其所志而心未快也是皆艮之義也資言其有剛實之德而仁足以利物斧言其有剛斷之才而義足以制事然艮之所謂時止時行者天人之所同而是爻則當旅之時而有時止而止欲行未進之義故為旅之艮而與艮之本體異焉夫旅之為卦兼艮與離而後成初六有麗著而不移之義而已無時止時行之義也故全體為離九四有時止而欲行之義而已無柔麗剛之義也故全體為艮六五射雉一矢亡終以譽命此旅之遁也而爻辭云爾者有聖人之道是以致文眀之治而時不見用則其德隱矣故曰射雉一矢亡上以天下之譽而命之以政則非自知之也亦歸于隱而已故曰終以譽命蓋旅之六五居六爻之尊旅之盛也于體為離可以致文眀之沼也然上無與下無應則時不見用而其德隱也故曰射雉一矢亡若乃居一卦之盛處衆爻之尊則譽不可掩而上以命逮之也故曰終以譽命雉文明之物也射雉言致文眀之盛治也一矢亡言道不見用而文眀不可致也終以譽命則莊子所謂君非自知我而彖之所謂小亨也此聖人遁世之道跡雖旅也而道非旅故在旅之六爻而獨不言旅焉若孔子者其盡之乎蓋厯聘當時之諸侯一君無所任用特以溫良恭儉願聞其政故為旅之遁莊子所謂雖不在山林之中而其德隱者也故為旅之遁而與遁之本體異焉夫祿隱而無上下之交故失所而為旅此以遁為主而言止乎內也遊聘而非行可之仕故隱德而為遁此以旅為主而言麗乎外也上九鳥焚其巢旅人先笑後號咷喪牛于易凶此旅之小過也而爻辭云爾者小者之過上逆而下順故其卦辭曰飛鳥遺之音其彖辭曰有飛鳥之象初六則曰飛鳥以凶上六則曰飛鳥離之凶而旅之小過亦有鳥焚其巢之辭蓋剛亢上窮者靡不自貽其禍大者且然而况小者乎居者且然而况旅者乎旅之為道當柔中而順乎剛而上九之爻乃剛亢而上窮是其旅也復為小者之過故不止乎下順上逆而又有焚如之禍焉蓋旅之居猶飛鳥之巢也如鳥之焚其巢則不止乎失所而已方其剛亢而過中則如鳥之巢乎髙而自以為樂及其被焚如之禍則如鳥之焚其巢而悲且懼矣故曰旅人先笑後號咷方其居上而無難乃失柔中而順乎剛之道是亦猶飛鳥之上逆也至于以剛亢上窮而自取其禍則亦猶巢之焚也故曰喪牛于易凶蓋言上九乘六五之柔而平易無難乃剛過乎中而居一卦之極則失其所謂順且當九三之剛而內失其應也故變體為小過而爻辭如此然小過卦爻所主本非旅人之事凡以言小者之過而已若夫旅人如此則其過已甚而禍亦甚矣故為旅之小過焉巽下巽上巽初六進退利武人之貞此巽之小畜也而爻辭云爾者凡大者果而善斷小者疑而不果大畜之畜賢固無疑矣大有之有賢亦無疑焉凡以果而善斷故也小過雖小者之事而能過越以有為亦可以無疑矣若夫小畜則以小畜大以臣畜君進則疑於過分退則疑于不及不及則若彖所謂密雲不雨自我西郊過分則若九三所謂輿說輻夫妻反目孟子曰畜君何尤畜君者好君也何尤者疑之之辭以疑其有尤故以好君之義斷之也夫㢲之本體已有進退不果之象矣况變體為小畜乎故言于初六以隂居下有優柔不斷之義若夫利武人之貞則于進退之辭又變而無窮矣猶出納之吝在君子為惡而有司為善也未濟卦辭亦曰小狐汔濟蓋狐己志不果而小又才不足所以且進且退幾濟而未也蓋與巽之小畜同義焉夫小畜之本體所主之義唯臣畜君㢲之小畜則非臣畜君也唯取疑而不果之義故為巽之小畜而與本體異焉九二㢲在牀下用史巫紛若吉無咎此㢲之漸也而爻辭云爾者㢲伏而善入體至卑矣而漸之為言以漸進也事人之禮所以致恭者理宜以漸觀乎君臣之禮則知以漸進而事人矣豈無其序而遽為足恭之行哉苟不能然則若㢲在牀下者有之矣事神之禮所以致恭者亦宜以漸觀乎祭祀之禮則知以漸進而事神矣豈無其序而遽啓徼福之心哉苟能知此則用史巫紛若可也蓋九二為㢲下體而以陽居隂故有事人以㢲而不以漸進之象雖以陽居隂而剛未失中故有事神以㢲而漸進之象然漸以漸進為主而是爻則以㢲為主㢲欲以漸而否則非禮故九二兼此二義為㢲之漸而與漸之本體異焉㢲之漸者㢲欲漸也漸之巽者漸而㢲也九三頻㢲吝此㢲之渙也而爻辭云爾者渙者離散之謂也蓋過中而不㢲則難必至矣不得已而後巽然後難乃𣪚焉蓋以九居三其剛過中當巽之時而不㢲者也傲為凶德則傷之者至矣然居巽之體猶在下卦是不得已而能㢲者也過而能改則人必恕之故變體為渙而曰頻㢲吝頻與頻復同義不得已之貌也過而憚改故吝然終能改也是以不至乎凶焉然渙卦所主言天下之難散而此則言不巽而有難巽而後難散故為巽之渙而與渙之本體異焉六四悔亡田獲三品此㢲之姤也而爻辭云爾者姤之為言柔遇剛也蓋六四以一柔乘二剛不能無悔唯柔㢲以正上遇九五剛健中正之君而得所附焉則乘剛之悔亡矣且以己之德資五之才以己之位資五之勢于是近而相得反得所乘之助以興大事而功崇焉非柔剛遇則不能爾故變體為姤而曰六四悔亡田獲三品而夫子釋之曰有功也夫姤之本體以天道言則隂出而遇陽故為柔遇剛而有自然之數焉是爻則以㢲不失正而後上遇剛健中正之君故為㢲之姤而與姤之本體異矣九五貞吉悔亡無不利無初有終先庚三日後庚三日吉此㢲之蠱也而爻辭云爾者九五居乎尊位而當用㢲之時苟從衆而用㢲則于君道不能無悔惟剛㢲乎中正則以貞致吉而用㢲之悔亡矣貞吉悔亡則何不利之有然有悔故不善其始而無其初貞吉悔亡則能善其後而有其終無初而有終故所以治天下之蠱者不一于巽而斷之于義義兼于仁而事待以斷者也先之以圖其始後之以保其終則飭其蠱于前而俾勿壞于後矣故變體為蠱而曰先庚三日後庚三日吉夫蠱之先甲後甲指六五之柔中言之㢲之先庚後庚于九五之剛正言之者飭蠱之道本于仁柔而仁柔所不能斷者必濟以義之剛焉于蠱之本體言仁者立本也于㢲之變體言義者趣時也二卦之義固相為先後矣且蠱之㢲以幹父之蠱為本而其所主者子道若文王之繼王季也故以柔中而有譽㢲之蠱以巽乎中正為本而其所主者君道若西伯之戡黎也故以剛正而致吉蓋二爻各言其一焉爾然蠱者事也其六爻莫不言蠱至上九然後言髙尚其事㢲于九五獨變為蠱則言剛㢲乎中正為治蠱之道而已故為㢲之蠱而與其本體異焉上九㢲在牀下喪其資斧貞凶此㢲之井也而爻辭云爾者上九剛過上窮居一卦之終㢲之極者也處㢲之極而不適乎中則無禮以節之矣蓋所謂恭而無禮則勞非所謂恭而安者也故曰㢲在牀下身安然後國可保國可保然後能養人居人民之上而身且不能安則雖有資斧仁義之德亦不足以養人矣夫井之為道自養而不窮然後施于養物者亦至于無窮矣苟不能自安則豈能養人也哉故曰喪其資斧蓋資言德之仁斧言德之義德惟善政政在養民故言喪其資斧言失養人之道然苟能改是則猶能安身而修其政豈固終不能養人而不窮哉故曰貞凶言以此為正則凶不以此為正則未必凶也此又與井收勿幕同義蓋井而幕之則廢其養人之用矣勿幕然後養而不窮也然卦之所主在井故六爻皆言井之義㢲獨于上九變而為井則言㢲極而不安故雖有養人之才亦不足以有行也惟不以是為正則庶乎可矣故為巽之井而與其本體異焉兑下兑上兑初九和兑吉此兑之困也而爻辭云爾者兑為澤坎為水坎居兑之下則澤已無水而為困矣况初九又居坎之下乎君子居下而困則似之矣居下而困則人見惡之時也其可不與之和以致其說哉和其光者雖至人之所貴然與人和以為說則未免處乎嫌疑之間唯其和而不同姑以免禍而非為邪則其行無可疑而志可得焉初九本體為兑變體為困而與九二同德相比非近而不相得者也其義如此故曰和兑吉言能和光取說以是道處困而已且和者禮之用尤處困之所宜故下繫舉九卦言處困之道必先言履和而至而又曰履以和行也九二孚兑吉悔亡此兑之隨也而爻辭云爾者隨之為言下隨上也六三以柔不中乘二剛之上九二以剛居其下當兑說之時可不從權以說之乎權以說之所謂動而說隨以下隨上者也然非詭隨也非志在隨人也磨而不磷涅而不淄外雖有可疑之迹而內實自信其志焉故于兑之時變體為隨而有孚兑之辭而夫子釋之以信志也夫隨之為義言君隨天之時而天下乃隨君之時又六爻所言皆有隨義而是爻獨言君子隨小人而說之故為兑之隨而與其本體異焉夫經有曰兌說也又曰動而悅隨然則說未至於隨隨則說可知矣故隨復為兌則其說已甚且以柔居之故唯小人是說而不足以事君子故其爻曰係小子失文夫而兑之九五所謂孚于剝者亦似之矣兑變為隨則說而後隨也且以陽剛居之故雖小人是隨而不害其為君子故其爻曰孚兑吉悔亡而隨之九四所謂隨有獲貞凶有孚在道以眀何咎者亦似之矣六三來兑凶此兑之夬也而爻辭云爾者夬之為卦一隂乘五陽之上而其義為決者五剛決一柔而去之也兑之六三柔過乎中為小人之象內乘二剛以為說若小人乘君子之上也于是二剛自下而進則決之之禍至矣故變體為夬而曰來兑凶夫孔子嘗曰舉枉錯諸直則民不服謂舉而錯之于其上也小人而居君子之上則害治以傷民君子其容之哉蓋易以往為之外以來為之內一隂宜避二陽以去乃敢之內以乘剛故人所不服而為二剛所決焉此與需于血同其所以異者需之四在一體之下而兑之三居一體之上也故至于凶焉甚于需矣雖然夬以一隂乘五陽乃為五陽決而去之是爻一隂乘二陽而亦有是義者彼以六爻之全體言之而此止以下卦之變體言之故為兑之夬而已蓋與夬之全體異焉且夬之兑者君子以決小人為夬而所以說之者道之權也豈終與之悅哉兑之夬者小人以乘君子自悅而所以決之者義之正也故直以來兑為凶焉九四商兑未寧介疾有喜此兑之節也而爻辭云爾者節之為言止也九四介乎六三九五之間正有所未足斷有所未至于上下邪正之際擇利而為之未安于其所處則疑于所說而未能止也然六三不正而在已之下有乘剛之難而不我能即乃能一志以從上而止焉故方其為兑則曰商兑未寧變而為節則曰介疾有喜也夫節止也艮亦止也此不取艮而取節者艮之止自然也節則制之而後止也始也商兑而未止至于介疾而後止焉此其所以為節歟夫節之六四亦曰安節之亨承上道也蓋兑之九四剛而不正故商兑而後能承上節之六四柔順而正故志在承上而安節焉然此利而行之與彼安而行之者不同故為兑之節而已九五孚于剝有厲此兑之歸妹也而爻辭云爾者歸妹之卦說以動者也妹言少女也以柔而順乎剛者也人君以謙虛接下則君子至而小人退矣以剛健自居則君子退而小人進焉小人者讒諂面諛以說其上害君子而剝之人君乃不特說之而又信之不特信之而又孚焉則其說之至矣所以然者小人有妾婦之道以順為正而從其君故也以順為正而從其君則歸妹之義似之矣蓋小人變君子謂之剝其說而孚之者君也以順為正者妾婦之道其納而主之者夫也故為兑之婦妹而曰孚于剝焉然歸妹之本體六爻皆言嫡娣夫婦之道而歸妹之實也是卦則于九五之孚于剝取歸妹之義而已故為兑之歸妹而與其本體異焉且歸妹與兑皆以柔為貴歸妹之兑六五之柔也以謙而厚下者也故承己者說焉兑之歸妹九五之剛也以健而喜佞者也故善柔者歸焉上六引兌此兑之履也而爻辭云爾者經曰君子非禮弗履又曰物畜然後有禮故受之以履然則履之為言禮也夫不待招而往非禮也召之而不至亦非禮也引而後說乃所謂禮然非不召之臣也故兑雖合于禮而于道則未光焉蓋九五以剛居尊非以柔下下者也人君不能尊德樂道之象也不應乎二而近乎上上與之近而相得引而遂說不違乎禮也故變體為履而有引兑之辭然九五非尊德樂道之君而上六非不召之臣故夫子以未光釋之夫履之本體以涉世為主而涉世之道必以禮而後亨故以柔履剛以說應乾而後能全其身是爻則以引而後悅不違于禮故為兑之履而與其本體異焉
