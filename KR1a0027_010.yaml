body:
  text: 易變體義卷十宋都潔撰下經四井至艮巽下坎上井初六井泥不食舊井無禽此井之需也而爻辭云爾者九三言井泄而初言井泥六四言修井而初言舊井井雖泥而尚全人猶望其泄泄之則復可食矣井雖舊而未廢人猶望其修修之則莫可舍矣猶之性也聰明不開人猶待其明而有以啓之其有過也未能自新人猶待其改而有以正之所以然者君子善救人而無棄人蓋以人人有食人之道也故言井泥不食舊井無禽而變體為需需蓋言其有所待焉夫井以上出為用然後養而不窮初六體巽而才隂則有重濁之資無應而在下則無上出之用故曰井泥不食下也井泥則人舍之矣泥而且舊則禽亦不至焉雖然猶可修也見棄于一時而已故曰舊井無禽時舍也夫需言險在前有待而後進此則以井泥且舊而寓有待之義以為地無棄井而可需其泄也世無棄人而可需其修也故為井之需而與需之本體異焉且需于郊而小象曰未失常此蓋因其善而戒之使持以久也故為需之井井泥不食而小象曰時舍此蓋因其不善而勉之使復其初也故為井之需九二井谷射鮒甕敝漏此井之蹇也而爻辭云爾者蹇之彖曰蹇難也險在前也見險而能止知矣哉蓋九二以不正之資旁出而比乎初初以隂在下小物之象則旁行而所志小矣此言其難也故有井谷射鮒之辭下比乎初不能上應乎五五以剛在上而莫為之應則雖上出而莫為用矣此若險在前也故有甕敝漏之辭蓋谷言出射言入鮒言小物之在下甕受水之器而敝且漏則不能受而用之之象也然蹇之本體以險在前而以能止為義此乃以井谷射鮒甕敝漏而有蹇之義故為井之蹇而與蹇之本體異焉九三井泄不食為我心惻可用汲王明並受其福此井之坎也而爻辭云爾者水性本流遇險而止然過中而盈則離險而上出焉井之泄者如水本流也泄而不食者如遇險而止也終可用汲而王明並受其福則猶水之盈而上出以致潤物之用也九三以陽居陽陽氣輕清則其性修而其行潔井泄之象也井貴上出而未離乎下體則泄而不食之象也泄非泥也宜食而否則其行可哀而有為我心惻者矣雖在下體而居下體之上且有應於上而上有大成之功則如井之汲乎上養而不窮也故有可用汲王明並受其福之辭焉然坎莫非水也井則水之在井者而在九三之義則猶之坎焉故為井之坎而與坎之本體異矣且井之為卦兼巽與坎所謂巽乎水而上水也至九三則居巽體之上無巽而入之義矣井泄不食則既有陷乎險之義矣至於用汲而王明則又有出乎險之義下而陷乎險上而出乎險故變體而全為坎焉坎之與井皆水之所在也然坎之水自上而下盈則復出故經言坎陷而其為水淺矣井之水自下而上汲然後出故經言井通而其為水深矣坎之井則自淺之深故無可出之義而曰來之坎坎險且枕入于坎窞勿用井之坎則自深而之淺故有可出之義而曰井泄不食為我心惻可用汲王明並受其福六四井甃無咎此井之大過也而爻辭云爾者經曰大過棟橈本末弱也而其九四亦曰棟隆之吉不橈乎下也井之六四一柔介乎二剛之間而初六莫為之應其在於井有頽壞之義故於變體為大過若棟橈乎下者頽壞橈弱如此可不修而甃之乎六四體隂有靜之義以隂居隂有正之義靜則不散正則不傾甃而修之如此則橈弱頽壞之咎亡矣修性之道亦然此蓋所謂善補過者也蓋不能自強以養其性至於動散而傾危則修之使復靜而正其可已乎然大過則以世之弱棟之橈為義而是爻則言性之不可不修井之不可不甃有大過橈弱之象故為井之大過而與大過之本體異焉九五井冽寒泉食此井之升也而爻辭云爾者序卦曰聚而上者謂之升故受之以升又曰困乎上者必反下故受之以井然則井以深為貴其義為下升者降之反其義為上井之體深矣而以上出為用故初則曰井泥不食二則曰井谷射鮒三則泄而不食四則甃而無咎方且修之矣此蓋或居下體或居上體之下而然也至五居一卦之盛故於井言冽居六位之尊故於寒泉言食寒泉在乎下而人得以食之則上出可知矣此彖所謂巽乎水而上水象所謂木上有水者也變體為升其謂是歟夫以取象之義言之井猶之性泉猶之道道則性之所成也九五居一卦之盛則盡性而道成之象居六位之尊則以道養人之象故井冽以喻其盡性寒泉之食喻其以道養人盡性者剛而正也養人者剛而中也盡性而以道養人猶井之上出也且升之本體主言君子自下而升也此為井之升則取上出之義而已故與本體異焉夫升以位言蓋自下而上行井以道言蓋自下而上出皆自下以上而所異者道與位也升之井者言道足以稱其位井之升者言位足以行其道上六井收勿幕有孚元吉此井之巽也而爻辭云爾者巽之體伏而其用則入上六居卦之終井道大成故有井收之辭然井以養物為功以上出為用在卦之外而變體為巽疑其伏而絶物則無上出之用乏養物之功矣故言勿幕以戒之收有成物之意幕有絶物之意收而勿幕則又若巽以行權無入而不自得也故有孚則人信其養之道而元吉則人被其養之功變體為巽其以此歟且井以喻性上六居卦之極則若道以性成故因之以井收于爻為隂則疑以道絶物故戒之以勿幕九三應之故曰有孚以柔應下故曰元吉有孚而元吉則上出而顯諸仁矣所謂上出者顯仁之意也然莫非巽也其在于井則取其伏取其入取其行權之義而已故為井之巽焉夫井兼坎巽而後成卦今獨為巽之全體者以下則入水而上水以上則行權而稱物焉然則井之所以上出者雖本乎水而非巽不能成上出之用故歸功于巽而已離下兑上革初九鞏用黃牛之革此革之咸也而爻辭云爾者革者有為之時咸者感應之謂初體離而炎上則有志之象畫竒而純剛則有才之象在卦之下則未得位之象有才有志而未得位苟惟感非應則躁進犯分有妄作之凶矣已雖非中順之質而能資九二之中順與之相比是亦中順之道中不躁進順不犯分以此自固其志則不求九四之應而貽妄作之凶矣故變體為咸而曰鞏用黃牛之革鞏固也黃牛之革言中順之道也孔子釋之以不可以有為言無妄作之凶也咸之所謂感者上感而下應自然之情也今欲革故以有為而求上之感則為革之咸而與咸之本體異焉夫遁之六二戒其徇於所遇而中變其志革之初九戒其苟求所應而妄有所為故皆欲以中順之道自固焉然六二柔不得時而中順在已則固之為易故曰執之用黃牛之革初九剛不得志而中順資人則固之為難是以稱鞏焉六二已日乃革之征吉無咎此革之夬也而爻辭云爾者夬之為言決也剛決柔也唯柔乃能從唯剛乃能決六二柔順中正固能從而不敢先矣或失于優柔而不斷故勉以決而後得其志焉蓋君倡而已事然後臣可從而和事莫不然而况于革乎若六二者能如此故曰已日乃革之然以柔居柔或于革之道為不足故又勉之以征征而後吉矣六二柔不失中而能上應乎五則其于革非一于柔而不能決者也故曰征吉無咎然夬以決小人為主而是爻則言革有貴乎能決者故為革之夬而與夬之本體異焉九三征凶貞厲革言三就有孚此革之隨也而爻辭云爾者隨之彖曰天下隨時隨時之義大矣哉言君能隨天之時則人亦隨君之時由是觀之則臣能隨君民亦隨之矣九三之才以剛過中而趨革之時一於剛過則我不隨上而下莫我隨矣故戒之以征凶則言不可進而上也又戒之以貞厲則言又不可止其所也此言為人臣者不可不隨君之時也至于上應乎上六則既非征而凶又非貞而厲矣故九二承之九四比之上六應之而上下皆我隨焉故曰革言三就言就之者衆以見動而説隨者不一也雖然莫非隨也天而君隨之君而臣隨之是爻則由革去故而上下皆從故為革之隨而與隨之本體異焉九四悔亡有孚改命吉此革之既濟也而爻辭云爾者既濟者無不濟之謂君雖賢矣不得忠臣以弼之未既濟也臣雖忠矣不得明君以任之未既濟也九四雖德不稱然無承無應一志以承同德之主九五剛健中正以大人之道下比乎同德之臣故君得臣以規正而道行于上臣得君以信任而道行于下故變體為既濟而曰悔亡有孚改命吉改命者雖君命之未允亦可諫之使改焉改者革之一端非盡革而去之也雖成命而能諍之使改則格其心之非者固可知矣夫革與因對而改為革之一端位居六爻之一而命乃人君之所出也故言改而己且既濟之本體言天下無不濟也此主改命言之則君命之未允者得臣諫之以濟臣志之欲行者得君信之以濟若水在火上兩相濟焉故為革之既濟而與其本體異矣九五大人虎變未占有孚此革之豐也而爻辭云爾者豐之彖曰豐大也明以動故豐豐者光明盛大之時革之為卦文明以説而至九五剛健中正有大人之才下應離體成文明之治故變體為豐而曰大人虎變虎之為物剛健而文明者也非剛健不足以有革非革故不足以成文明之治而虎變文炳又視君子為大焉是皆豐之義也然豐之本體因明以動而是爻之義則因革而明且大焉故為革之豐而與本體異矣上六君子豹變小人革面征凶居貞吉此革之同人也而爻辭云爾者同人之卦以六二之下體應九五之上體以成焉故曰柔得位得中而應乎乾曰同人革之上六以兑説之才居一卦之上雖未若大人之得尊位大中是亦君子之能革者也必能使小人舍其所習而同我所為故變體為同人而曰君子豹變小人革面革面以同我亦可也苟責之已甚則怨故曰征凶止于革面亦可故曰居貞吉所以然者有德而未及大中有位而不若至正故也且革之上體唯九五上六有應故九五曰未占有孚而上六曰小人革面二爻所以不同者德位有間也且九五居上卦之中故以有孚言之上六居一卦之外故以革面言之然同人之本體以柔應乾而爻則革而後同故為革之同人而與同人之本體異焉巽下離上鼎初六鼎顛趾利出否得妾以其子無咎此鼎之大有也而爻辭云爾者大有者遏惡而揚善大者有賢而衆賢並進之時也以其遏惡故有顛趾出否之象以其揚善故有得妾以其子之象且妾不貴色而所貴者賢妾且貴賢而况于子乎此亦有賢之義也且妻一而已妾乃衆焉妾已衆矣而况其子乎雜卦曰大有衆也此亦變體之義蓋于卦為鼎才之象也在下而應上反常之象故有鼎顛趾之辭焉反常然後能去弊舍下而應上則去弊之象故有利出否之辭焉反常以去弊則詭正之象故有得妾之辭焉詭正疑若有咎功成則咎可免矣二陽在前近而比之則成功之象故有以其子無咎之辭焉古人以得賢子謂之有子蓋子而不賢焉能為有利出否以從貴者子賢然後可貴子賢而貴則母以從子貴矣子賢然後可以為有唯其賢而衆多此其所以為大有歟是爻所言皆初應乎四之義也大有言時而鼎言舉才之人鼎言才而大有言用才之效其言無交害者得人而後舉也其言得妾以其子者用才而成功也九二鼎有實我仇有疾不我能即吉此鼎之旅也而爻辭云爾者經曰親寡旅也孔子所以為旅人者無上下之交而一君無所鉤用雖有聖人之才終為旅人而已矣九二有剛中之才而居下卦之位初六在其下而自應乎四莫我承也九三在其上而自應乎上莫我與也無上下之交者似之矣故曰鼎有實慎所之也若夫六五在上為剛柔之正應乃有乘剛之難而乖相與之志焉所謂一君無所鉤用者又似之然六五之不我應者以九四為之難則四雖非承乘相應之爻亦有害于已矣夫居六位之間而五爻俱莫我與豈非所謂親寡之旅乎雖然六五之來應未必不為禍其不來應也乃所以致福故曰我仇有疾不我能即吉而夫子釋之曰終無尤也慎所之者承乘皆非所與也我仇有疾者以九居二任已甚矣五又益之以事則力少而任尤重雖若愛之是乃所以為仇也夫旅之本體謂君子之失所也於用才之時君子宜不失所而九二所居之地適然故為鼎之旅而與旅之本體異矣九三鼎耳革其行塞雉膏不食方雨虧悔終吉此鼎之未濟也而爻辭云爾者水上火下有濟之道所以未濟者處未當爾然終有濟之道故非終不濟也鼎耳革言未濟之因而雉膏不食則言未濟也方雨言將濟也至于虧悔終吉則濟矣此其變所以為未濟蓋鼎之有耳以虛受鉉則鉉可以貫其耳而舉之也猶人臣之義柔中以事君則君可舉其才而用苟剛過中則君安得而舉之哉九三剛過之象也故有鼎耳革之辭鉉之舉鼎將錯之可用之地耳乃革而不受則不可以有行人才亦猶是也故有其行塞之辭如是則雖有文明潤澤至美之膳不成亨飪之功不可得而享矣猶之人臣不為上所舉而不得行其志則上雖有文明之德潤澤之恩不及于已而不得受其禒位矣故有雉膏不食之辭然九三雖剛過中猶能體巽而居下體終能應上上亦附麗之而不棄將有交泰而和悅之道焉故有方雨之辭方雨者言將雨也將雨則和矣如是則剛過之悔亡而終有君臣相悅之吉焉上九剛實居上玉鉉之象也于體為離而又居上卦之上雉膏之象也以能附麗于九三而方雨終吉亦離之象也然火在水上之本體主言天下之未濟此爻則以人才為主而言臣之未遇其君故為鼎之未濟而與其本體異焉九四鼎折足覆公餗其形渥凶此鼎之蠱也而爻辭云爾者蠱之為言壞也左氏曰于文皿蟲為蠱此言器之壞易曰山下有風蠱此言物之壞而事謂之蠱者以其難成而易壞也所謂鼎折足者與皿蠱同義所謂覆公餗者與山下有風同義折足而覆餗則亦敗乃事矣此與事謂之蠱同義敗乃事則為身之纍矣故曰其形渥凶經曰周流六虛蓋位虛而爻實之也蓋九四位本柔而爻乃剛其象則力少任重不能勝其任而其才困矣鼎足之折似之下應于初而不能上承于五其象則其事敗也公餗之覆似之于體為離內虛外盈其象則為身之纍而危且辱矣其形渥似之渥者公餗既覆霑濡于外之謂也變體為蠱其謂是歟夫剛上柔下巽而止者事之所由壞而蠱之所以成卦也此乃以才力不足以敗其事故為鼎之蠱而與其本體異焉且凡才與事相為表裏事非才不成才非事不顯蠱主事言六四事有餘而才不足才不任其事矣故曰裕父之蠱往見吝鼎主才言九四才不足而事有餘事反纍其才矣故曰鼎折足覆公餗其形渥凶蠱之鼎家事也父子主恩故吝而已鼎之蠱國事也君臣主義故至于凶焉蠱之上九以剛在上父也而六四以柔在上體之下故言父之事有餘而子之才不足鼎之九四則以四言才不足以九為事有餘也六五鼎黃耳金鉉利貞此鼎之姤也而爻辭云爾者姤之為義自天道言則隂出遇陽自卦爻言則柔出遇剛此以不足而遇有餘若莊子所謂子之先生遇我也故六五於體為柔則能以虛受人之象柔不失中則能有節于內之象謙虛而不失中以資九二之剛實則已之才不足而資諸人以為才有柔遇剛之義矣然九二以剛實之才而上應謙虛之君則又有臣遇君之義君下資乎臣而臣有益于君乃天地相遇之義若湯之於伊尹學焉而後臣之若髙宗之于傅説命之以朝夕納誨者也故變體為姤而曰鼎黃耳金鉉利貞夫子釋之曰中以為實也黃言五色之中耳言虛而聽受金言剛鉉言實耳以虛而受鉉言六五之資九二也鉉以實而貫耳言九二之應六五也所謂利貞則居位之尊而用德之謙疑其勉強以行之欲持之以久而已然姤之本體言天地隂陽剛柔之義是爻乃言人君遇賢臣而資之以為才故為鼎之姤而與姤之本體異焉上九鼎玉鉉大吉無不利此鼎之恆也而爻辭云爾者恆之為言久而不已也常久而不已者終始如一也此道之所以體恆而聖人之所以立本也孟子曰集大成也者金聲而玉振之也蓋金聲既洪而纎如射之能中此智者之所以盡變玉振之也者玉聲終始如一如射之能至此聖人之所以體常上九有體常立本而終始如一之義者以九之剛資六五之柔剛柔中節而居卦之終也故有玉之象焉居位之上則能舉才而用之之義也故有鉉之象焉以聖人體常之道舉天下之才而用之則天人俱祐而大吉無不利矣然莫非恆也是爻乃以體恆之道而用天下之才故為鼎之恆而與恆之本體異焉震下震上震初九震來虩虩後笑言啞啞吉此震之豫也而爻辭云爾者豫之象曰雷出地奮豫夫雷之出也足以驚逺懼邇而聞之者莫不恐焉然不先有以震驚之則動而蟄者無自而啓植而甲者無自而坼蟄者未啓甲者未坼則安有生成之漸哉故先有以震之然後有生成之福也人以恐而致福者亦然故震之初爻變體為豫而曰震來虩虩後笑言啞啞吉也蓋初九之時隂猶盛而陽宜知險過此以往則隂浸衰而陽乃上行是亦恐懼于其初而得志于其後之象也然豫之本體本乎順動順以動則豫矣而此則以恐而致福故為震之豫而與豫之本體異也六二震來厲億喪貝躋于九陵勿逐七日得此震之歸妹也而爻辭云爾者震動也兑説也説以動者歸妹之道也夫歸妹之道亦時義而已行而宜謂之義當其可謂之時二之于初非正應也苟惟比之則失其義而有乘剛之危矣故曰震來厲其于五正應也止而不往則失其時而喪可依之利矣故曰億喪貝夫唯既不趨乎內以乘初又不安其居以絶五而自下以應之則得歸妹之道故曰躋于九陵所謂勿逐七日得者能躋于九陵則所喪之貝不待逐而復得也夫震以起為體以動為用或來而之乎內或安而止其所皆非震之道唯上應乎五則動與起之義得矣臣之歸其君蓋似之若二老避紂于海濵則非震來厲矣起海濵而歸周則非億喪貝矣歸于文王則躋于九陵而合歸妹之道所謂進必有所歸得其所歸必大也來言之內也億言安也喪貝言失其利也髙平曰阜大阜曰陵九陵則至髙九五居尊位之象也七日者是二至五而往反之數也然歸妹本體言其實而震之歸妹特取其義故為震之歸妹而與本體異焉六三震蘇蘇震行無眚此震之豐也而爻辭云爾者震動也豐大也動以成其大所以變而為豐豐而過乎中則搖動而不安矣苟知其過中而不固以執則可以無患焉豐之彖曰豐亨勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况于人乎六三柔過乎中矣而變體為豐則日中而昃之時有搖動不安之象故曰震蘇蘇于是過而不守則有天地盈虛與時消息之道故曰震行無眚經曰三多凶其柔危其剛勝邪夫諸卦至于三遇吉者罕矣故變體為豐者有六而此特在六三之位所以蘇蘇而不安不能凝而不動也然猶在下體而以柔居之則非固其位也故以震行無眚終焉然豐者光明盛大王假之之時是爻則以動而過中有大之義故為震之豐而與本體異焉九四震遂泥此震之復也而爻辭云爾者莊子曰反無非傷動無非邪蓋震言動復言反動而致逺然後言旋宜矣若夫無致逺之才動而遂泥于是而不復則若胡為乎泥中者也然傷于外者必反于家故震而遂泥則其勢必復而其變體如此蓋四其畫為九必有其才而可動之象以九居四則失位之象在卦之下則不中之象此所以雖動而不能致逺其在四隂之間不能致逺而遂泥之象焉然復卦之義自姤至復凡七日之久是爻則方動而泥若及門而反者故為震之復而與復之本體異也震在四時之首方動之意遂泥則動未幾而止也復之震者于宜靜之時動而能趨寂也故曰中行獨復震之復者有能動之才而不能致逺也故曰震遂泥不能趨寂故言行而變體為震不能致逺故言泥而變體為復六五震往來厲億無喪有事此震之隨也而爻辭云爾者蓋有隨人者有隨于人者君主出令宜止而隨于人臣主從命宜動而隨人故孔子曰天下之動貞夫一者也君而隨人則是上與下同道故曰震往來厲止而隨于人則居尊而無失位任衆而有成功焉故曰億無喪有事蓋六五于體為震有好動之才者也往則上未必可恃來則二未必相應動則致危之象也故有震往來厲之辭然而其位至尊有能止之義者也于是上六畏鄰戒而來比六二躋九陵而來應有得無失之象也故有億無喪有事之辭是皆隨于人而不隨人之義也此變體之所以為隨歟然隨之本體主言天下隨君之時故為震之隨而與隨之本體異焉上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言此震之噬嗑也而爻辭云爾者頤中有物其名為噬嗑蓋頤上下實而中虛噬嗑則九四實其中而向也虛今也實則有間矣上六居震之極而道未得中方索索以求之未免乎懼也尚可以有征乎故曰震索索視矍矍征凶于是不執己之窮極而資六五之中焉故曰不于其躬于其鄰無咎則言震之本體也若夫上之與三本同德之應也而九四者乃以一剛間乎羣柔之中六三為四所阻而不能應乎上上六為四所阻而不能應乎三九四為之間如此則頤中有物之象故曰婚媾有言夫噬嗑卦或言有間或言除間晉初六震上六無除間之辭以在噬嗑初上之爻故也然噬嗑本體以動而明能除間是爻乃以動而未能無間故為震之噬嗑而與其本體異焉艮下艮上艮初六艮其趾無咎利永貞此艮之賁也而爻辭云爾者夫艮止也與行為對艮靜也與動為對凡靜而止者上道也動而行者下道也居動而有行之地乃遇艮之時宜若不正而有咎矣然體隂而止乃得正而無咎焉所以變體為賁賁者飾也自飾之道以正而已正而能久則其自飾也至矣故曰艮其趾無咎利永貞而夫子釋之以未失正也經曰物不可苟合而已故受之以賁賁飾也賁之本體以與物合而致飾是爻乃以止其所行為自飾之正故為艮之賁而與本體異焉六二艮其腓不拯其隨其心不快此艮之蠱也而爻辭云爾者夫蠱之彖曰剛上而柔下巽而止蠱蓋剛柔以立本而變通以趨時然後上下交而功勳成矣苟唯剛者止乎上而不下濟柔者止乎下而不上行則經所謂上下不交而非變通可久之道也與夫所謂上下交而功勳成者異矣此其所以謂蠱也艮之為言止也六二以柔居下欲上隨於九三九三乃以剛過中而不拯其隨之之志則隨上之志止而不行與夫蠱之所謂剛上柔下巽而止者何以異哉故變體如此而曰艮其腓不拯其隨然所以致此者非二之志也二欲隨三而不拯焉也故曰其心不快然艮之卦象立本而貴于止故行其庭不見其人而不為咎其在于爻則宜通其變而或不以止為貴故六二欲以柔隨三三不見拯而變體為蠱焉是六二柔不止乎下而九三剛止乎上然六二終以九三之不隨而亦止焉故為艮之蠱而與其本體異矣九三艮其限列其夤厲熏心此艮之剝也而爻辭云爾者剝之為言下危上也夫君之所賴者大臣也大臣之所以安上者必恃上下羣臣同寅而協恭焉艮之九三剛過乎中已乖乎事上之義矣居下體之上二自下體欲應乎五而間之使不得應故曰艮其限連上體之下四居上體欲承乎五而離之使不得承故曰列其夤上下羣臣皆不承其君則其君孤立而危厲及之矣故曰危熏心限居下體又在其上而艮焉則不接乎上矣夤居上體實接乎限而列焉則不接乎下矣心居上體之中央體之主也上下不相連屬則危厲之漸自下以及其主矣此其所以變體為剝也然剝以下不厚而上乃危故有剝落之象而是爻乃以衆爻各止其所而俱不上比以致六五孤立之危故為艮之剝而與剝之本體異焉六四艮其身無咎此艮之旅也而爻辭云爾者夫君子居近君之位任大臣之職矣其內必有臣妾而其外必有寮屬又引其類以同升于朝豈旅人比而乃變體為旅者蓋內有臣妾外有寮屬而又引類以同升者迹與人同也若乃其心則不然知事主而已不知吾君之外有何人知委質而已不知吾身之外有何物其內則忘家矣不知其有親族其外則散羣喪朋矣不知其有儕類是其為心也止乎其身委質而無二焉則近其君也亦且寄焉爾是何異於旅哉艮之六四位近于五而爻實至隂隂則靜矣止之至也故變體為旅而曰艮其身無咎然旅之本體言寡而失所是爻則以其心止諸躬而有忘家喪朋之義故為艮之旅而與其本體異焉六五艮其輔言有序悔亡此艮之漸也而爻辭云爾者君子之言動莫不有漸非特進有漸也而言語亦有漸焉此卒然之問梁王所以見非於孟子而子路率爾而對夫子所以哂之也夫唯言欲有漸故艮之六五為艮之漸而曰艮其輔言有序悔亡蓋五為君道宜出命以尹衆者也以隂居陽則以淵默為主而大中至正則時然後言之象也所謂艮其輔言有序者如此且以六居五有位不當之悔焉語默皆當其宜則其悔亡矣輔在上體近于頰舌出命之象也昔公叔文子之使曰夫子時然後言人不厭其言蓋不言者艮其輔時然後言者言有序也又不厭其言則何悔之有夫漸之本體言進之有漸而此乃言之有漸言欲有漸者必以止為主故是爻為艮之漸而與漸之本體異焉上九敦艮吉此艮之謙也而爻辭云爾者書曰惟民生厚因物有遷夫艮之言止也始于厚而終于厚則止于厚而不遷所以為謙厚之至易之言謙曰勞而不伐有功而不德厚之至也蓋傲于德為凶謙于德為吉艮之上九居艮之終而以剛實在上于是止于厚以終焉乃為厚之至故變體為謙而曰敦艮之吉以厚終蓋厚未至于敦而敦為厚之至也夫謙以地中有山為象則言德盛而禮恭焉是爻則言始于厚而終于厚始終之以厚故為艮之謙而與謙之本體異矣
