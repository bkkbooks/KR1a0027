body:
  text: 易變體義卷八宋都潔撰下經二家人至益離下巽上家人初九間有家悔亡此家人之漸也而爻辭云爾者漸之象曰山上有本漸君子以居賢德善俗夫善國人之俗猶宜以漸况閨門之內恩勝義者哉恆之初爻曰浚恆之凶始求深也夫始於淺而終乎深者自然之常理於始而求深則無自而可况施於閨門之內乎然則善其內之道固宜有漸則所以禁其不善者亦當防微杜漸正之於始也此家人之初爻故欲待之以漸而變體如此所謂間有家悔亡者欲間其不善而歸之於善莫不貴漸焉也然此以齊家為主故為家人之漸則與漸之進異矣與居賢德善俗亦異矣六二無攸遂在中饋貞吉此家人之小畜也而爻辭云爾者夫大者乃得遂事而専之小者從之而已故所謂無攸遂者婦之所以從夫而小者之道也饘酏酒醴以至稻黍梁秫唯其所欲焉可不畜之以待用乎故在中饋為小畜之義而婦之所以事舅姑者此也詩曰無非無儀唯酒食是議唯其所欲而議其所宜亦必多畜而後無乏矣事舅姑如此則事其夫者從可知矣然國之所以燕饗者所畜之物盛家之所以饋餉者所畜之物微故家人六二不取大畜而取小畜且序卦者曰物畜然後有禮故受之以履物畜而後可養故大畜而受之以頥蓋履者禮也禮之所貴以敬愛為主而已頥者養也養之所貴則以充實為至焉此小大之義所以殊也然小畜卦爻本臣畜君也而此特取物畜然後有禮之義故為家人之小畜而與小畜之本體異焉小畜之九二主言臣道家人之六二主言婦道臣道至於牽復則宜濟以敬家人而順以巽則敬可知矣婦道職乎中饋則必主乎愛物畜而後有禮則愛可知矣故小畜之家人取順巽之義家人之小畜取物畜之義焉九三家人嗃嗃悔厲吉婦子嘻嘻終吝此家人之益也而爻辭云爾者閨門之內以恩勝義則威嚴過中非所宜也故家人嗃嗃不免於悔厲婦子嘻嘻不免於終吝然悔厲而終至於吉吝而不及於凶者蓋與其不嚴而弛不若過於嚴而肅與其無威而亂不若過乎威而治故彖曰家人有嚴君焉父母之謂上九曰威如之吉反身之謂然則威嚴之過中是乃所以有益老氏所謂物或損之而益者其以此歟孔子以禮與奢寧儉喪與易寧戚而孟子以有法家拂士為生於憂患亦與此同義雖然天施地生天地所以益萬物也損上益下聖人所以益萬民也家人之益則有益於其家而已故與益之本體異矣六四富家大吉此家人之同人也而爻辭云爾者蓋孰不有家而大夫乃稱家者有臣妾焉家之盛者也夫自道以觀身已為我纍矣而况有家乎有家已為纍矣而况富而多事乎然其有家也姑以同乎人而已不以家為纍也其家之富也亦以同乎人而已不以富為樂也蓋其極髙明而道中庸制行不已以及中人所不能免者皆與之同而不去所以為中人法故雖有家而未嘗異於無家家雖富而未嘗異於不富要當如此而後無纍故於家人之同人而言富家大吉謂賢人之有家而至於富者特以同乎人而不可以是為纍也此主有家者言之故為家人之同人而與同人之本體異焉同人之家人則以乘墉而困未能忘其家也此衆人之事家人之同人則雖有家而富姑以同乎人而已此賢人之事九五王假有家勿恤吉此家人之賁也而爻辭云爾者賁之彖曰文明以止人文也聖人觀乎人文以化成天下蓋人文者致飾之本也觀人文以化之所以致飾也至於成天下則飾之道盡矣夫所謂人文者父子之親君臣之義夫婦之别長幼之序朋友之信也然化自本以及末治自內以及外九五為家人一卦之主剛得尊位大中至正則德足以正己而位足以正人始也盡有家之道而極其至則父子夫婦長幼莫不致飾以禮矣至於自本及末自內及外自貴及賤自近及逺則君臣朋友之際亦各有致飾之禮焉然後人文之化行乎天下而天下化成則賁飾之道成矣古之人所以刑於寡妻至于兄弟以御於家邦者此也故九五變體為賁而曰王假有家勿恤吉蓋假有家則家人之至而賁之始也勿恤吉者言既假有家則勿憂天下之不正而天下正矣然後為賁飾之至此彖所謂正家而天下定者也然賁之所謂人文總五典而言也是爻則以假有家為本然後能化成天下故為家人之賁而與其本體異焉賁之家人取聘賢而起家之義家人之賁取化民而賁飾之義上九有孚威如終吉此家人之既濟也而爻辭云爾者既之為言盡也既濟言無不濟無不濟則無事而天下定故雜卦曰既濟定也而家人彖曰正家而天下定夫天下之本在國國之本在家家之本在身反身而誠而善其言行以率之則孰敢不聽而父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定至于上九則家道成矣天下定矣父子兄弟夫婦莫不安分循理而天下化之無事而定矣故變體為既濟而曰有孚威如反身之謂蓋始於言有物行有恆反身而誠以率之至是功成而莫不濟莫不濟而天下定矣然既濟之定則要其終而家人則原其始故為家人之既濟而與既濟之本體異焉兑下離上睽初九悔亡喪馬勿逐自復見惡人無咎九二遇主于巷無咎六三見輿曳其牛掣其人天且劓無初有終九四睽孤遇元夫交孚厲無咎六五悔亡厥宗噬膚往何咎上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪冦婚媾往遇雨則吉艮下坎上蹇初六往蹇來譽六二王臣蹇蹇匪躬之故九三往蹇來反六四往蹇來連九五大蹇朋來上六往蹇來碩吉利見大人坎下震上解初六無咎此解之歸妹也而爻辭云爾者當解之初未能全無難而以柔居下在我者有所不足則將疇依乎此所以未能無咎也然以柔在下而上應乎剛則九四之才足依而可以免難故於變體為歸妹而曰無咎然於難散之時以柔上應乎剛僅取歸妹之義非歸妹之實也故為解之歸妹焉九二田獲三狐得黃矢貞吉此解之豫也而爻辭云爾者方難散之初羣心危疑而未恱也興事而得衆則可恱矣衆能得所附則可恱矣為臣得衆而不失乎中直之道則中不過分直能循理而為之君者亦恱矣故變體為豫而曰田獲三狐得黃矢貞吉田言興事之大也三言衆也狐言疑而未恱也黃言中矢言直也然豫以順動而後人心恱矣此則因解而得衆衆亦得所附且以中直之道而君臣無疑故為解之豫與豫之本體異矣六三負且乘致寇至貞吝此解之恆也而爻辭云爾者蓋不恆其德則難之所由生以此為正而不改則吝而難未弭也唯改是而不以為正則恆其德而難散矣蓋或負而為小人或乘而為君子此不恆其德而難所由生此所以致戎以為之寇也故曰負且乘致冦至以此為正則不恆而成吝苟反是而不為正則恆其德而難散矣然以不恆其德而難生恆其德而難散故於此言解之恆而與恆之本體異焉恆之解者言不能守常而難未解也解之恆者言難生於不恆而欲復其恆也彼言因有過而生難此言因有難而改過九四解而拇朋至斯孚此解之師也而爻辭云爾者位不足故所解者微矣而曰解而拇才有餘故得朋而人信之而曰朋至斯孚夫得朋而後人信之然於變體為師者才德雖有餘而可以用師必得同心同德之臣而人信之然後贊其智謀而可用焉湯得伊尹然後可以征葛文王得呂望然後可以伐崇漢祖得蕭何張良而後可以勝楚若是之類多矣如是而後所解者廣焉然師之卦爻專言用師是爻則言所解者小大而用師則所解者廣故為解之師而與師之本體異焉六五君子維有解吉有孚于小人此解之困也而爻辭云爾者難之未散也小人勢盛而可以困君子至是而君子得位則小人不得為我困矣難之已散也君子勢盛而可以困小人然君子不為已甚乃與之更始而莫之困焉六五柔得尊位大中君子勢盛而難散之時也凡可以更始者赦過宥罪而咸與維新故曰君子維有解吉推其赤心置人腹中而人皆心恱而誠服故曰有孚于小人然困之本體多言君子之遇困而此爻乃言解之時小人嘗以困君子而至是有所不行解之終君子可以困小人而於是有所不忍故為解之困而與困之本體異矣小象言君子有解小人退者君子赦小人而小人退聽然後可以與之更始如其不肯退聽則殺無赦可也然所以退者亦有困矣上六公用射隼于髙墉之上獲之無不利此解之未濟也而爻辭云爾者險難已散天下咸望其施矣而上慢下暴悖而未順者未除則上或不能施其惠下有不能被其澤猶為一時之難而未既濟也故必獲而去之以解其難然後無上慢者而上之德意奉行而不怠無下暴者而下之人民康乂而無虞然則方其公用射隼之時猶未濟也故變體之義與爻辭如此且既濟之下體猶未濟也而曰髙宗伐鬼方未濟之上體實未濟也而曰震用伐鬼方蓋天下之民有必待乎征伐而後濟者況不仁而在髙位者苟不能去之則未濟可知矣書曰大邦畏其力而後小邦懷其德𫝊言仁而不武無能逹也故誅不仁然後可以行仁去不義然後可以行義乃自然之理歟然此爻以六三有上慢下暴之悖故天下猶未濟而公用射隼以解而去之故為解之未濟而與未濟之本體異焉兑下艮上損初九已事遄往無咎酌損之此損之蒙也而爻辭云爾者蒙之彖曰蒙亨以亨行時中也初筮告以剛中也其九二以剛中益六五而六五以柔中資之蓋陽道常饒若教者損有餘以教人隂道常乏若學者以不足而受教然則教者既已成已不可不遄往而應學者之求也故損初九曰已事遄往遄往者簡而無傲之意然以臣誨君以君而受臣之教必當量而後入乃無以下拂上臣過其君之嫌故曰酌損之酌已之有餘而益君之不足者量而後入之義也至於學焉而後臣之則與上合志矣然此言損己之有餘而應求者之不足故為損之蒙而與蒙之本體異焉夫蒙之損言學者之事損之蒙言教者之事九二利貞征凶弗損益之此損之頤也而爻辭云爾者頥之為言養也而養正則吉九二以剛居中矣蓋剛或失之過當以中為正而養之故曰利貞不以中為正而養之則過矣故言征凶以戒之過乎中則不可復損矣故言弗損以美之未過中則欲損己之有餘以助上之不足過乎中而弗損則上不疑之而且報其德焉故曰益之損不過中而以此為正則得養正之道矣然此因損己以助上而戒之以養正故為損之頥而與頥之本體異焉六三三人行則損一人一人行則得其友此損之大畜也而爻辭云爾者蓋惟一足以畢萬惟一足以行萬一者萬之所自出也故為物不二則生物不測而有萬不同矣是以天地合而致一則萬物化醇男女合而致一則萬物化生然則致一不二則所畜大矣不然則乃所以致損故損之大畜而曰三人行則損一人一人行則得其友三人者不一也一人者致一也此因言不一則損其友致一則得其友而三以隂居陽有不一之義然與上相應又有致一之義故或二或因而所言如此然知不一以致損然後能致一而得友故為損之大畜而與大畜之本體異焉六四損其疾使遄有喜無咎此損之聧也而爻辭云爾者凡利於己者欲益以近之而害於己者欲損以逺之蓋一隂一陽而適平焉是之謂道或偏乎陽或偏乎隂而失其平是之謂疾六四以隂居隂已偏乎隂矣而承乘皆隂疾莫甚焉必損而遠之以下應初九之陽則去所惡而就所喜矣夫害於己者疾也乃能損而遠之是若火上澤下而火之能遠於澤也此其所以為睽歟然睽以火上澤下其睽自然而此則損其承乘之隂以遠之然後成睽故為損之睽而與睽之本體異焉六五或益之十朋之龜弗克違元吉此損之中孚也而爻辭云爾者六五居尊以柔柔不失中而損己以應下則在己者孚矣然物或損之而益則彼必以孚而應焉九二應之上九比之是也益之者不一則賢者智者莫不從矣非至誠孰能與此哉故變體為中孚而曰或益之十朋之龜弗克違然中孚之義以柔在內而剛得中說而巽焉為主此則一以柔中居尊損己益下而上下莫不與之然後為孚故為損之中孚而與中孚之本體異焉上九弗損益之無咎貞吉利有攸往得臣無家此損之臨也而爻辭云爾者蓋自損以下人然後能得人得人以為之臣然後可以有臨矣損至於上爻則損之極而可止矣自損至此則人益之矣故曰弗損益之至言利有攸往則將以臨蒞天下也得忘我之臣則賢者歸之而民將焉往于是臨蒞天下則臣民之所歸也此變體所以為臨而爻辭如此然臨之本體以剛浸而長說而順為主而此則因能自損而有臨人之道故為損之臨而與臨之本體異焉然臨人而後損己者損其在我之勢不自有其尊也損己而後臨人者損其在我之德不自有其美也此二卦之變體所以異歟震下巽上益初九利用為大作元吉無咎此益之觀也而爻辭云爾者初九在一卦之下民之象也當興利之時有剛動之才仁民之德則利用之以興大事矣然民可與樂成難與慮始必陳上之德意播告以示之使民觀聽而信之然後知上之所以有作者本以仁民而下之所以觀化者亦知非厲已而可與成功矣唯示之於上而觀聽之於下故變體為觀而曰利用為大作元吉無咎孔子釋之以下不厚事言下不事以此為厚而從之輕也元仁德也吉言有成功也無咎言人無厲已之咎也然觀之主意本以觀天之神道設教而至於天下服今乃因益以興利而言觀示上之德意者有不可已故為益之觀與觀之本體異焉六二或益之十朋之龜弗克違永貞吉王用享于帝吉此益之中孚也而爻辭云爾者左氏曰忠德之正也莊子曰當而不知以為信六二正當者也有忠信之象忠信可以行蠻貊而況中國乎所以或益之十朋之龜弗克違者人以忠信應之二隂比之之象也至於以隂居隂則永以為正之象也王用享于帝則九五應之之象也永以為貞誠以守己也王用享于帝誠以格天也是皆中孚之義也損之五益之二皆言或益之十朋之龜弗克違而變體皆為中孚然損之五誠乎謙益之二誠乎正損主益上故言於上體益主益下故言於下體且上體本艮艮止而無為上道也下體本震震動而有為下道也元吉君道也永貞吉臣道也自上祐君能得天也王用享于帝君以臣格天也此二爻之所以異至於為損為益而與中孚之本體異則其義一也六三益之用凶事無咎有孚中行告公用圭此益之家人也而爻辭云爾者夫益之盛而至此則過中矣於是而用凶事則安不忘危足以保其家而無咎唯國之本在家於是乎有國而告公用圭焉蓋大夫以上稱家則家之盛也而諸侯有國則家在其中唯王者樂天以保天下而諸侯則畏天以保其國益之用凶事所以畏天也至於有孚而非僞為中行而無大過則非特保家而已又至於有國之盛焉故變體為家人而曰告公用圭而夫子釋之曰益用凶事固有之也夫家人之正體本言正家而天下定益用凶事以保其家則為益之家人而與其本體異焉六四中行告公從利用為依遷國此益之無妄也而爻辭云爾者蓋無妄所貴者正不正則為妄故其彖曰大亨以正天之命也其匪正有眚不利有攸往益之九五以剛居剛而其六四以柔居柔剛柔各得其正四雖柔正而不若九五之中然與六三皆居中爻之中故皆曰中行唯柔而以中行故九五告之使從從者以柔順中正而從剛健中正之君也以柔正而從剛正則其志日進無疆矣故告之使從所以益其志也以柔從剛則雖依之以遷國可矣故曰利用為依遷國夫有所依者有依之者剛為所依者也柔則依之者也告公從為益其志則以為所依而賴之以遷國為益其事矣然無妄之道本乎正也此則欲益其志而使之以正從正故為益之無妄而與無妄之本體異焉九五有孚惠心勿問元吉有孚惠我德此益之頤也而爻辭云爾者蓋頥之為言養也養正則吉唯自養正則所養亦正矣所養正則彼亦以正助成王政矣易以正為有孚所謂惠德之正也九五剛健中正者也六二柔順中正者也五下應乎二所謂有孚惠心蓋必自養正而後以正養人所謂民心罔中惟爾之中也二上應乎五所謂有孚惠我德蓋所養正而彼復以正助成王政所謂出乎爾而反乎爾也勿問元吉言上之益下無方大得志者言下之益上亦無方蓋上以正施乎下下以正報乎上以正交相養有頥之義焉然此以益為主而所益以養正為貴故為益之頥而與頥之本體異矣夫頥之益者六五才不足而資人以養德然後為學日益而緝熙于光明蓋成王之事似之益之頥者九五才有餘而損己以益下然後以善養人而無思不服蓋武王之事似之故頥益之名一也才不足則養己以致益才有餘則養人以益之然上養於下非常道也故曰拂經雖拂經而終吉上益乎下乃常道也故曰勿問元吉而終於大得志焉上九莫益之或擊之立心勿恆凶此益之屯也而爻辭云爾者凡屯有不幸而遇之者有自取而得之者屯之諸爻不幸而遇之者也是爻為益之屯乃自取而得之者也蓋居益之終猶以剛在上是不知盛衰之理終始之數以益為常而不知變則人孰益之哉故曰莫益之非唯莫益之而已又且或擊之矣莫益之而又擊之則屯孰甚焉然其體為巽而於下有應非罔有悛心而以此為可久者也猶可戒焉故曰立心勿恆若夫以此為可久則凶矣小象所謂或擊之自外來者益而不已必決也故序卦於益之後受之以夬
